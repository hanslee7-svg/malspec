const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: { autoRefreshToken: true, persistSession: true, detectSessionInUrl: false, storage: window.localStorage, flowType: 'implicit' },
});

async function rawFetch(path, options) {
  options = options || {};
  const url = SUPABASE_URL + '/rest/v1/' + path;
  const headers = {
    'apikey': SUPABASE_KEY,
    'Content-Type': 'application/json',
    'Prefer': options.returnRepresentation ? 'return=representation' : 'return=minimal',
  };
  Object.assign(headers, options.headers || {});
  try {
    const tokenKeys = Object.keys(localStorage).filter(k => k.startsWith('sb-') && k.endsWith('-auth-token'));
    if (tokenKeys.length > 0) {
      const sessionRaw = localStorage.getItem(tokenKeys[0]);
      if (sessionRaw) {
        const session = JSON.parse(sessionRaw);
        if (session && session.access_token) headers['Authorization'] = 'Bearer ' + session.access_token;
      }
    }
  } catch (e) {}
  const response = await fetch(url, {
    method: options.method || 'GET',
    headers: headers,
    body: options.body ? JSON.stringify(options.body) : undefined,
  });
  if (!response.ok) {
    const text = await response.text().catch(function() { return ''; });
    throw new Error(text || 'HTTP ' + response.status);
  }
  // 빈 응답 처리 (201 Created with no body, 204 No Content 등)
  if (response.status === 204) return null;
  const text = await response.text();
  if (!text) return null;
  try { return JSON.parse(text); } catch (e) { return null; }
}

function isAdmin(user, profile) {

  if (user && user.email && ADMIN_EMAILS.indexOf(user.email.toLowerCase()) >= 0) return true;
  return false;
}

function relTime(iso) {
  try {
    const d = new Date(iso);
    const diff = (Date.now() - d.getTime()) / 1000;
    if (diff < 60) return '방금';
    if (diff < 3600) return Math.floor(diff/60) + '분';
    if (diff < 86400) return Math.floor(diff/3600) + '시간';
    return d.toISOString().slice(5,10).replace('-','/');
  } catch (e) { return ''; }
}

const useState = React.useState;
const useEffect = React.useEffect;
const useRef = React.useRef;
const h = React.createElement;
const Fragment = React.Fragment;

function App() {
  const [user, setUser] = useState(null);
  const [profile, setProfile] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(function() {
    sb.auth.getSession().then(function(res) {
      const u = res.data.session ? res.data.session.user : null;
      setUser(u);
      if (u) loadProfile(u.id);
      else setLoading(false);
    }).catch(function() { setLoading(false); });

    const sub = sb.auth.onAuthStateChange(function(event, session) {
      const u = session ? session.user : null;
      setUser(u);
      if (u) loadProfile(u.id);
      else { setProfile(null); setLoading(false); }
    });
    return function() {
      try { sub.data.subscription.unsubscribe(); } catch (e) {}
    };
  }, []);

  async function loadProfile(userId) {
    try {
      const profs = await rawFetch('profiles?select=*&id=eq.' + userId);
      setProfile(profs && profs[0] ? profs[0] : null);
    } catch (e) {}
    setLoading(false);
  }

  if (loading) return h('div', { className: 'loading-screen' }, '불러오는 중...');
  if (!user) return h(LoginScreen);
  return h(ChatRoom, { user: user, profile: profile });
}

function LoginScreen() {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState('');

  async function handleLogin() {
    if (!email || !password) { setError('이메일과 비밀번호를 입력해주세요'); return; }
    setSubmitting(true); setError('');
    try {
      const res = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, password: password }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.msg || data.error_description || '로그인 실패');
      const sessionData = {
        access_token: data.access_token,
        refresh_token: data.refresh_token,
        expires_in: data.expires_in,
        expires_at: data.expires_at || Math.floor(Date.now()/1000) + (data.expires_in || 3600),
        token_type: data.token_type || 'bearer',
        user: data.user,
      };
      localStorage.setItem('sb-' + SUPABASE_URL.replace('https://', '').split('.')[0] + '-auth-token', JSON.stringify(sessionData));
      await sb.auth.setSession({ access_token: data.access_token, refresh_token: data.refresh_token });
    } catch (e) {
      setError(e.message);
    } finally {
      setSubmitting(false);
    }
  }

  function goToMainSignup() {
    if (window.opener && !window.opener.closed) {
      window.opener.focus();
      alert('회원가입은 메인 사이트에서 진행해주세요. 메인 창에서 가입 후 다시 로그인 부탁드립니다.');
    } else {
      window.open('https://www.sapfiori.co.kr', '_blank');
    }
  }

  return h('div', { className: 'login-screen' },
    h('div', { className: 'login-card' },
      h('h2', null, '💬 말톡 로그인'),
      h('p', null, '말툴스 회원만 참여 가능한 채팅방입니다.'),
      error ? h('div', { className: 'error-msg' }, error) : null,
      h('div', { className: 'input-group' },
        h('label', null, '이메일'),
        h('input', { type: 'email', value: email, onChange: function(e) { setEmail(e.target.value); }, placeholder: 'name@example.com', disabled: submitting, onKeyDown: function(e) { if (e.key === 'Enter') handleLogin(); } }),
      ),
      h('div', { className: 'input-group' },
        h('label', null, '비밀번호'),
        h('input', { type: 'password', value: password, onChange: function(e) { setPassword(e.target.value); }, placeholder: '비밀번호', disabled: submitting, onKeyDown: function(e) { if (e.key === 'Enter') handleLogin(); } }),
      ),
      h('button', { className: 'btn-primary', onClick: handleLogin, disabled: submitting }, submitting ? '로그인 중...' : '로그인'),
      h('div', { className: 'login-footer' },
        '회원이 아니신가요? ',
        h('a', { onClick: goToMainSignup }, '말툴스에서 회원가입'),
      ),
    ),
  );
}

function ChatRoom(props) {
  const user = props.user;
  const profile = props.profile;
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [sending, setSending] = useState(false);
  const [loading, setLoading] = useState(true);
  const [showParticipants, setShowParticipants] = useState(false);
  const [participants, setParticipants] = useState([]);
  const [showEmojiPicker, setShowEmojiPicker] = useState(false);
  const [deleteMode, setDeleteMode] = useState(false);
  const [selectedIds, setSelectedIds] = useState([]);
  const [activeTab, setActiveTab] = useState('chat'); // 'chat', 'members', 'dm:userId'
  const [expandedMemberId, setExpandedMemberId] = useState(null);
  const [dmTabs, setDmTabs] = useState([]); // [{userId, profile}]
  const [dmMessages, setDmMessages] = useState({}); // {userId: [messages]}
  const scrollRef = useRef(null);
  const inputRef = useRef(null);

  function getDMRoomId(a, b) {
    return 'dm:' + [a, b].sort().join(':');
  }

  function openDM(otherProfile) {
    if (otherProfile.id === user.id) return;
    setDmTabs(function(prev) {
      if (prev.find(function(t) { return t.userId === otherProfile.id; })) return prev;
      return prev.concat([{ userId: otherProfile.id, profile: otherProfile }]);
    });
    setActiveTab('dm:' + otherProfile.id);
    loadDMMessages(otherProfile.id);
    setExpandedMemberId(null);
  }

  function closeDM(userId) {
    setDmTabs(function(prev) { return prev.filter(function(t) { return t.userId !== userId; }); });
    if (activeTab === 'dm:' + userId) setActiveTab('chat');
  }

  async function loadDMMessages(otherUserId) {
    const roomId = getDMRoomId(user.id, otherUserId);
    try {
      const msgs = await rawFetch('chat_messages?select=*&room_id=eq.' + encodeURIComponent(roomId) + '&order=created_at.asc&limit=100');
      const enriched = (msgs || []).map(function(m) {
        const author = m.user_id === user.id ? profile : (otherUserId === m.user_id ? dmTabs.find(function(t){return t.userId===otherUserId;})?.profile : null);
        return Object.assign({}, m, { author: author });
      });
      setDmMessages(function(prev) { 
        const newMap = Object.assign({}, prev);
        newMap[otherUserId] = enriched;
        return newMap;
      });
      setTimeout(function() { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, 100);
    } catch (e) {
      console.error('DM 로드 실패:', e);
    }
  }

  async function sendDM(otherUserId, content) {
    const roomId = getDMRoomId(user.id, otherUserId);
    await rawFetch('chat_messages', {
      method: 'POST',
      body: { user_id: user.id, content: content, room_id: roomId },
    });
    // 즉시 로컬 추가
    const newMsg = { 
      id: 'tmp_' + Date.now(), 
      user_id: user.id, 
      content: content, 
      room_id: roomId, 
      created_at: new Date().toISOString(),
      author: profile,
    };
    setDmMessages(function(prev) {
      const newMap = Object.assign({}, prev);
      newMap[otherUserId] = (newMap[otherUserId] || []).concat([newMsg]);
      return newMap;
    });
    // 잠시 후 재로드 (실제 ID 반영)
    setTimeout(function() { loadDMMessages(otherUserId); }, 500);
  }

  useEffect(function() {
    loadMessages();
    loadParticipants();
    setTimeout(function() { if (inputRef.current) inputRef.current.focus(); }, 200);

    const channel = sb.channel('maltalk_' + Date.now())
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_messages', filter: 'room_id=eq.general' }, async function(payload) {
        const newMsg = payload.new;
        let author = null;
        try {
          const profs = await rawFetch('profiles?select=*&id=eq.' + newMsg.user_id);
          author = profs && profs[0] ? profs[0] : null;
        } catch (e) {}
        setMessages(function(prev) {
          if (prev.find(function(m) { return m.id === newMsg.id; })) return prev;
          return prev.concat([Object.assign({}, newMsg, { author: author })]);
        });
        setTimeout(function() { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, 50);
      })
      .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'chat_messages' }, function(payload) {
        const id = payload.old ? payload.old.id : null;
        if (id) setMessages(function(prev) { return prev.filter(function(m) { return m.id !== id; }); });
      })
      .subscribe();

    const pollTimer = setInterval(loadMessages, 15000);

    return function() {
      try { sb.removeChannel(channel); } catch (e) {}
      clearInterval(pollTimer);
    };
  }, []);

  async function loadMessages() {
    try {
      const msgs = await rawFetch('chat_messages?select=*&room_id=eq.general&order=created_at.asc&limit=100');
      const userIds = [];
      (msgs || []).forEach(function(m) { if (userIds.indexOf(m.user_id) < 0) userIds.push(m.user_id); });
      let profileMap = {};
      if (userIds.length > 0) {
        const profs = await rawFetch('profiles?select=*&id=in.(' + userIds.join(',') + ')').catch(function() { return []; });
        (profs || []).forEach(function(p) { profileMap[p.id] = p; });
      }
      setMessages((msgs || []).map(function(m) { return Object.assign({}, m, { author: profileMap[m.user_id] || null }); }));
      setTimeout(function() { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, 100);
    } catch (e) {
      console.error('로드 실패:', e);
    }
    setLoading(false);
  }

  async function loadParticipants() {
    try {
      const msgs = await rawFetch('chat_messages?select=user_id&room_id=eq.general&limit=500');
      const uniqueIds = [];
      (msgs || []).forEach(function(m) { if (uniqueIds.indexOf(m.user_id) < 0) uniqueIds.push(m.user_id); });
      if (uniqueIds.length === 0) { setParticipants([]); return; }
      const profs = await rawFetch('profiles?select=*&id=in.(' + uniqueIds.join(',') + ')');
      setParticipants(profs || []);
    } catch (e) {}
  }

  async function sendMessage() {
    if (!input.trim() || sending) return;
    setSending(true);
    const content = input.trim();
    setInput('');
    try {
      // 활성 탭이 DM이면 DM 전송, 아니면 general
      if (activeTab && activeTab.startsWith('dm:')) {
        const otherUserId = activeTab.substring(3);
        await sendDM(otherUserId, content);
      } else {
        await rawFetch('chat_messages', {
          method: 'POST',
          body: { user_id: user.id, content: content, room_id: 'general' },
        });
      }
    } catch (e) {
      alert('전송 실패: ' + e.message);
      setInput(content);
    } finally {
      setSending(false);
      setTimeout(function() { if (inputRef.current) inputRef.current.focus(); }, 50);
    }
  }

  // 활성 DM 탭이 바뀌면 메시지 로드 + 입력창 포커스
  useEffect(function() {
    if (activeTab && activeTab.startsWith('dm:')) {
      const otherUserId = activeTab.substring(3);
      loadDMMessages(otherUserId);
    }
    if (activeTab === 'chat' || (activeTab && activeTab.startsWith('dm:'))) {
      setTimeout(function() { if (inputRef.current) inputRef.current.focus(); }, 100);
    }
  }, [activeTab]);

  // 활성 DM 탭 폴링 (10초)
  useEffect(function() {
    if (!activeTab || !activeTab.startsWith('dm:')) return;
    const otherUserId = activeTab.substring(3);
    const timer = setInterval(function() { loadDMMessages(otherUserId); }, 10000);
    return function() { clearInterval(timer); };
  }, [activeTab]);

  async function deleteSelected() {
    if (selectedIds.length === 0) return;
    if (!confirm(`선택한 ${selectedIds.length}개 메시지를 삭제하시겠어요?`)) return;
    let failed = 0;
    for (const id of selectedIds) {
      try {
        await rawFetch('chat_messages?id=eq.' + id, { method: 'DELETE' });
      } catch (e) { failed++; }
    }
    setMessages(function(prev) { return prev.filter(function(m) { return selectedIds.indexOf(m.id) < 0; }); });
    setSelectedIds([]);
    setDeleteMode(false);
    if (failed > 0) alert(failed + '개 삭제 실패');
  }

  function toggleSelect(id) {
    setSelectedIds(function(prev) {
      if (prev.indexOf(id) >= 0) return prev.filter(function(x) { return x !== id; });
      return prev.concat([id]);
    });
  }

  function exitDeleteMode() {
    setDeleteMode(false);
    setSelectedIds([]);
  }

  async function handleLogout() {
    if (!confirm('말톡에서 로그아웃하시겠어요?')) return;
    try { await sb.auth.signOut(); } catch (e) {}
    Object.keys(localStorage).filter(function(k) { return k.startsWith('sb-'); }).forEach(function(k) { localStorage.removeItem(k); });
    window.location.reload();
  }

  return h(Fragment, null,
    h('div', { className: 'header' },
      h('div', { className: 'header-title' },
        h('div', null,
          h('h1', null, '💬 말톡'),
          h('div', { className: 'header-sub' }, (profile && (profile.nickname || profile.name)) || user.email.split('@')[0]),
        ),
        h('div', { style: { fontSize: 28 } }, '🐎'),
      ),
      h('div', { style: { display: 'flex', gap: 6 } },
        h('button', { className: 'header-btn', onClick: function() { setDeleteMode(function(s) { return !s; }); setSelectedIds([]); setActiveTab('chat'); }, title: '삭제 모드', style: deleteMode ? { background: '#C0392B' } : {} }, '🗑'),
        h('button', { className: 'header-btn', onClick: handleLogout, title: '로그아웃' }, '로그아웃'),
      ),
    ),
    deleteMode ? h('div', { style: { background: '#C0392B', color: 'white', padding: '10px 14px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontSize: 12, fontWeight: 600, flexShrink: 0 } },
      h('span', null, '🗑 삭제할 메시지를 클릭하세요'),
      h('div', { style: { display: 'flex', gap: 8 } },
        h('button', { onClick: exitDeleteMode, style: { background: 'rgba(255,255,255,0.2)', border: 'none', color: 'white', padding: '4px 10px', borderRadius: 4, cursor: 'pointer', fontSize: 11, fontFamily: 'inherit' } }, '취소'),
        selectedIds.length > 0 ? h('button', { onClick: deleteSelected, style: { background: 'white', border: 'none', color: '#C0392B', padding: '4px 10px', borderRadius: 4, cursor: 'pointer', fontSize: 11, fontWeight: 700, fontFamily: 'inherit' } }, '선택한 ' + selectedIds.length + '개 삭제') : null,
      ),
    ) : null,
    // 탭 바
    h('div', { className: 'tab-bar' },
      h('button', { 
        className: 'tab-btn' + (activeTab === 'members' ? ' active' : ''),
        onClick: function() { setActiveTab('members'); if (participants.length === 0) loadParticipants(); }
      }, '👥 회원'),
      h('button', { 
        className: 'tab-btn' + (activeTab === 'chat' ? ' active' : ''),
        onClick: function() { setActiveTab('chat'); }
      }, '💬 전체'),
      dmTabs.map(function(tab) {
        return h('div', { key: tab.userId, style: { display: 'flex', alignItems: 'center', borderRight: '1px solid #E5E0D5' } },
          h('button', { 
            className: 'tab-btn' + (activeTab === 'dm:' + tab.userId ? ' active' : ''),
            style: { borderRight: 'none', flex: 'none', padding: '12px 10px 12px 14px' },
            onClick: function() { setActiveTab('dm:' + tab.userId); loadDMMessages(tab.userId); }
          }, '💌 ' + (tab.profile.nickname || tab.profile.name || '익명').substring(0, 8)),
          h('button', { 
            onClick: function(e) { e.stopPropagation(); closeDM(tab.userId); },
            style: { background: 'none', border: 'none', cursor: 'pointer', fontSize: 14, color: '#8B8B8B', padding: '0 8px 0 0' },
            title: '탭 닫기',
          }, '✕'),
        );
      }),
    ),
    // 회원관리 탭
    activeTab === 'members' ? h('div', { className: 'members-tab' },
      participants.length === 0 
        ? h('div', { className: 'empty-state' },
            h('div', { className: 'emoji' }, '👥'),
            h('div', { className: 'title' }, '아직 회원이 없어요'),
            h('div', { className: 'desc' }, '첫 메시지가 등록되면 표시됩니다'),
          )
        : h('div', null,
            h('div', { style: { fontSize: 11, color: '#5D5D5D', fontWeight: 700, marginBottom: 10, padding: '0 4px' } }, '👥 말톡 참여 회원 (' + participants.length + '명)'),
            participants.map(function(p) {
              const isAdminP = p.is_admin || (p.email && ADMIN_EMAILS.indexOf(p.email.toLowerCase()) >= 0);
              const isMeP = p.id === user.id;
              const isExpanded = expandedMemberId === p.id;
              return h('div', { key: p.id },
                h('div', { 
                  className: 'member-card' + (isMeP ? ' me' : ''),
                  style: { cursor: 'pointer' },
                  onClick: function() { setExpandedMemberId(isExpanded ? null : p.id); },
                },
                  h('div', { className: 'member-avatar' + (isAdminP ? ' admin' : '') }, (p.nickname || p.name || '?').charAt(0).toUpperCase()),
                  h('div', { className: 'member-info' },
                    h('div', { className: 'member-name' },
                      (p.nickname || p.name || '익명'),
                      isMeP ? h('span', { style: { fontSize: 10, marginLeft: 6, color: '#E67E22', fontWeight: 600 } }, '(나)') : null,
                      isAdminP ? h('span', { className: 'admin-badge', style: { fontSize: 10 } }, '운영자') : null,
                    ),
                    p.company || p.sap_module || p.title 
                      ? h('div', { className: 'member-meta' }, 
                          [p.company, p.title, p.sap_module].filter(function(x) { return !!x; }).join(' · ')
                        )
                      : null,
                  ),
                  h('div', { style: { fontSize: 14, color: '#8B8B8B' } }, isExpanded ? '▲' : '▼'),
                ),
                isExpanded ? h('div', { 
                  style: { 
                    background: 'white', 
                    margin: '-8px 0 8px 0',
                    padding: '12px 14px',
                    borderRadius: '0 0 8px 8px',
                    border: '1px solid rgba(230,126,34,0.2)',
                    borderTop: 'none',
                  }
                },
                  // 상세 정보 그리드
                  h('div', { style: { display: 'grid', gridTemplateColumns: '70px 1fr', gap: '4px 12px', fontSize: 12 } },
                    p.name ? h(React.Fragment, null,
                      h('div', { style: { color: '#8B8B8B', fontWeight: 600 } }, '이름'),
                      h('div', null, p.name),
                    ) : null,
                    p.nickname && p.nickname !== p.name ? h(React.Fragment, null,
                      h('div', { style: { color: '#8B8B8B', fontWeight: 600 } }, '닉네임'),
                      h('div', null, p.nickname),
                    ) : null,
                    p.company ? h(React.Fragment, null,
                      h('div', { style: { color: '#8B8B8B', fontWeight: 600 } }, '회사'),
                      h('div', null, p.company),
                    ) : null,
                    p.title ? h(React.Fragment, null,
                      h('div', { style: { color: '#8B8B8B', fontWeight: 600 } }, '직책'),
                      h('div', null, p.title),
                    ) : null,
                    p.sap_module ? h(React.Fragment, null,
                      h('div', { style: { color: '#8B8B8B', fontWeight: 600 } }, 'SAP 모듈'),
                      h('div', null, p.sap_module),
                    ) : null,
                    p.role ? h(React.Fragment, null,
                      h('div', { style: { color: '#8B8B8B', fontWeight: 600 } }, '역할'),
                      h('div', null, p.role),
                    ) : null,
                    p.email && (isMeP || isAdmin(user, profile)) ? h(React.Fragment, null,
                      h('div', { style: { color: '#8B8B8B', fontWeight: 600 } }, '이메일'),
                      h('div', { style: { fontSize: 11 } }, p.email),
                    ) : null,
                  ),
                  // 1:1 메시지 보내기 버튼
                  !isMeP ? h('button', {
                    onClick: function() { openDM(p); },
                    style: {
                      marginTop: 12,
                      width: '100%',
                      padding: '10px',
                      background: 'linear-gradient(135deg, #E67E22, #D35400)',
                      color: 'white',
                      border: 'none',
                      borderRadius: 6,
                      cursor: 'pointer',
                      fontSize: 13,
                      fontWeight: 600,
                      fontFamily: 'inherit',
                      display: 'flex',
                      alignItems: 'center',
                      justifyContent: 'center',
                      gap: 6,
                    }
                  }, '💌 1:1 메시지 보내기') : h('div', {
                    style: { marginTop: 12, fontSize: 11, color: '#8B8B8B', textAlign: 'center', fontStyle: 'italic' }
                  }, '본인 프로필 입니다. 메인 사이트에서 정보 편집 가능합니다.'),
                ) : null,
              );
            }),
          ),
    ) : null,
    // 채팅 탭 또는 DM 탭
    (activeTab === 'chat' || activeTab.startsWith('dm:')) ? h('div', { className: 'messages', ref: scrollRef },
      (function() {
        const isDM = activeTab.startsWith('dm:');
        const dmUserId = isDM ? activeTab.substring(3) : null;
        const currentMessages = isDM ? (dmMessages[dmUserId] || []) : messages;
        const dmTab = isDM ? dmTabs.find(function(t) { return t.userId === dmUserId; }) : null;
        if (loading && currentMessages.length === 0) {
          return h('div', { style: { textAlign: 'center', padding: 40, color: '#8B8B8B', fontSize: 13 } }, '불러오는 중...');
        }
        if (currentMessages.length === 0) {
          return h('div', { className: 'empty-state' },
            h('div', { className: 'emoji' }, isDM ? '💌' : '💬'),
            h('div', { className: 'title' }, isDM ? ((dmTab && dmTab.profile && (dmTab.profile.nickname || dmTab.profile.name)) || '익명') + '님과 1:1 대화' : '아직 메시지가 없어요'),
            h('div', { className: 'desc' }, '첫 메시지를 보내보세요!'),
          );
        }
        return currentMessages.map(function(msg) {
          const isMine = msg.user_id === user.id;
          const isAdminMsg = (msg.author && msg.author.is_admin) || (msg.author && msg.author.email && ADMIN_EMAILS.indexOf(msg.author.email.toLowerCase()) >= 0);
          const canDelete = isMine || isAdmin(user, profile);
          const isSelected = selectedIds.indexOf(msg.id) >= 0;
          const inDeleteMode = deleteMode && canDelete;
          const bubbleStyle = isSelected ? { outline: '3px solid #C0392B', outlineOffset: 2, transform: 'scale(0.98)' } : {};
          return h('div', { key: msg.id, className: 'msg-row' + (isMine ? ' mine' : ''),
            style: inDeleteMode ? { cursor: 'pointer' } : {},
            onClick: inDeleteMode ? function() { toggleSelect(msg.id); } : null,
          },
            h('div', { className: 'msg-bubble', style: bubbleStyle },
              !isMine ? h('div', { className: 'msg-author' + (isAdminMsg ? ' admin' : '') },
                (msg.author && (msg.author.nickname || msg.author.name)) || '익명',
                isAdminMsg ? h('span', { className: 'admin-badge' }, '운영자') : null,
              ) : null,
              h('div', { className: 'msg-content' }, msg.content),
            ),
            h('div', { style: { display: 'flex', flexDirection: 'column', alignItems: isMine ? 'flex-end' : 'flex-start', gap: 2 } },
              h('div', { className: 'msg-time' }, relTime(msg.created_at)),
              inDeleteMode ? h('div', { style: { fontSize: 14, color: isSelected ? '#C0392B' : '#CCC' } }, isSelected ? '☑' : '☐') : null,
            ),
          );
        });
      })(),
    ) : null,
    (activeTab === 'chat' || activeTab.startsWith('dm:')) ? h('div', { className: 'input-area' },
      showEmojiPicker ? h('div', { className: 'emoji-picker' },
        h('div', { style: { fontSize: 11, fontWeight: 600, color: '#5D5D5D', marginBottom: 6, display: 'flex', justifyContent: 'space-between' } },
          h('span', null, '이모지 선택'),
          h('button', { onClick: function() { setShowEmojiPicker(false); }, style: { background: 'none', border: 'none', cursor: 'pointer', color: '#8B8B8B', fontSize: 12 } }, '✕'),
        ),
        h('div', { className: 'emoji-grid' },
          COMMON_EMOJIS.map(function(emoji) {
            return h('button', { key: emoji, onClick: function() { setInput(function(p) { return p + emoji; }); setShowEmojiPicker(false); setTimeout(function() { if (inputRef.current) inputRef.current.focus(); }, 50); } }, emoji);
          }),
        ),
      ) : null,
      h('div', { className: 'input-row' },
        h('button', { className: 'emoji-btn' + (showEmojiPicker ? ' active' : ''), onClick: function() { setShowEmojiPicker(function(s) { return !s; }); }, title: '이모지 선택' }, '😊'),
        h('input', {
          ref: inputRef,
          className: 'input-msg',
          type: 'text',
          value: input,
          onChange: function(e) { setInput(e.target.value); },
          onKeyDown: function(e) { if (e.key === 'Enter') { e.preventDefault(); sendMessage(); } },
          placeholder: '메시지를 입력하세요...',
          disabled: sending,
          maxLength: 1000,
        }),
        h('button', { className: 'send-btn', onClick: sendMessage, disabled: !input.trim() || sending, title: '전송' }, '➤'),
      ),
    ) : null,
  );
}

const rootEl = document.getElementById('root');
const root = ReactDOM.createRoot(rootEl);
root.render(h(App));
</script>

</body>
</html>
