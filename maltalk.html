<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://ivbubhfkavaputcgovpk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2YnViaGZrYXZhcHV0Y2dvdnBrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2OTA5NzYsImV4cCI6MjA5NTI2Njk3Nn0.CtDl9Svev0kne1dgHFs0mNOFzzNzOMLHWd6GZilEyj4';

const COMMON_EMOJIS = [
  '😀','😄','😆','😅','🤣','😊','😍','🥰','😘','😎',
  '🤔','🤨','😐','😑','😶','🙄','😏','😣','😖','😫',

  '💬','📝','📌','💡','⚡','🚀','🐎','🦄','🎯','📋',
];

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: {
    autoRefreshToken: true,
    persistSession: true,
    detectSessionInUrl: false,
    storage: window.localStorage,
    flowType: 'implicit',
  },
});

// Raw fetch helper
async function rawFetch(path, options = {}) {
  const url = `${SUPABASE_URL}/rest/v1/${path}`;
  const headers = {
    'apikey': SUPABASE_KEY,
    'Content-Type': 'application/json',
    'Prefer': options.returnRepresentation ? 'return=representation' : 'return=minimal',
    ...(options.headers || {}),
  };
  try {
    const tokenKeys = Object.keys(localStorage).filter(k => k.startsWith('sb-') && k.endsWith('-auth-token'));
    if (tokenKeys.length > 0) {
      const sessionRaw = localStorage.getItem(tokenKeys[0]);
      if (sessionRaw) {
        const session = JSON.parse(sessionRaw);
        if (session?.access_token) {
          headers['Authorization'] = `Bearer ${session.access_token}`;
        }
      }
    }
  } catch (e) {}
  const response = await fetch(url, {
    method: options.method || 'GET',
    headers,
    body: options.body ? JSON.stringify(options.body) : undefined,
  });
  if (!response.ok) {
    const text = await response.text().catch(() => '');
    throw new Error(text || `HTTP ${response.status}`);
  }
  if (response.status === 204 || response.headers.get('content-length') === '0') return null;
  return await response.json();
}

function isAdmin(user, profile) {
  if (profile?.is_admin) return true;
  if (user?.email && ADMIN_EMAILS.includes(user.email.toLowerCase())) return true;
  return false;
}

function relTime(iso) {
  try {
    const d = new Date(iso);
    const diff = (Date.now() - d.getTime()) / 1000;
    if (diff < 60) return '방금';
    if (diff < 3600) return Math.floor(diff/60) + '분';
    if (diff < 86400) return Math.floor(diff/3600) + '시간';
    return d.toISOString().slice(5,10).replace('-','/');
  } catch { return ''; }
}

// ============ App ============
const { useState, useEffect, useRef } = React;

function App() {
  const [user, setUser] = useState(null);
  const [profile, setProfile] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    // 세션 확인
    supabase.auth.getSession().then(({ data }) => {
      const u = data.session?.user || null;
      setUser(u);
      if (u) loadProfile(u.id);
      else setLoading(false);
    });

    // 세션 변경 감지
    const { data: { subscription } } = supabase.auth.onAuthStateChange((event, session) => {
      const u = session?.user || null;
      setUser(u);
      if (u) loadProfile(u.id);
      else { setProfile(null); setLoading(false); }
    });

    return () => subscription?.unsubscribe();
  }, []);

  async function loadProfile(userId) {
    try {
      const profiles = await rawFetch(`profiles?select=*&id=eq.${userId}`);
      setProfile(profiles?.[0] || null);
    } catch (e) {} finally {
      setLoading(false);
    }
  }

  if (loading) {
    return React.createElement('div', { className: 'loading-screen' }, '불러오는 중...');
  }
  if (!user) {
    return React.createElement(LoginScreen);
  }
  return React.createElement(ChatRoom, { user, profile });
}

// ============ Login ============
function LoginScreen() {
  const [mode, setMode] = useState('login'); // 'login' or 'signup'
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState('');

  async function handleLogin() {
    if (!email || !password) { setError('이메일과 비밀번호를 입력해주세요'); return; }
    setSubmitting(true); setError('');
    try {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.msg || data.error_description || '로그인 실패');
      // 세션 저장
      const sessionData = {
        access_token: data.access_token,
        refresh_token: data.refresh_token,
        expires_in: data.expires_in,
        expires_at: data.expires_at || Math.floor(Date.now()/1000) + (data.expires_in || 3600),
        token_type: data.token_type || 'bearer',
        user: data.user,
      };
      localStorage.setItem(`sb-${SUPABASE_URL.replace('https://', '').split('.')[0]}-auth-token`, JSON.stringify(sessionData));
      await supabase.auth.setSession({ access_token: data.access_token, refresh_token: data.refresh_token });
    } catch (e) {
      setError(e.message);
    } finally {
      setSubmitting(false);
    }
  }

  function goToMainSignup() {
    if (window.opener && !window.opener.closed) {
      window.opener.focus();
      alert('회원가입은 메인 사이트에서 진행해주세요. 메인 창에서 가입 후 다시 로그인 부탁드립니다.');
    } else {
      window.open('https://www.sapfiori.co.kr', '_blank');
    }
  }

  return React.createElement('div', { className: 'login-screen' },
    React.createElement('div', { className: 'login-card' },
      React.createElement('h2', null, '💬 말톡 로그인'),
      React.createElement('p', null, '말툴스 회원만 참여 가능한 채팅방입니다.'),
      error && React.createElement('div', { className: 'error-msg' }, error),
      React.createElement('div', { className: 'input-group' },
        React.createElement('label', null, '이메일'),
        React.createElement('input', {
          type: 'email', value: email, onChange: e => setEmail(e.target.value),
          placeholder: 'name@example.com', disabled: submitting,
          onKeyDown: e => { if (e.key === 'Enter') handleLogin(); }
        }),
      ),
      React.createElement('div', { className: 'input-group' },
        React.createElement('label', null, '비밀번호'),
        React.createElement('input', {
          type: 'password', value: password, onChange: e => setPassword(e.target.value),
          placeholder: '비밀번호', disabled: submitting,
          onKeyDown: e => { if (e.key === 'Enter') handleLogin(); }
        }),
      ),
      React.createElement('button', {
        className: 'btn-primary', onClick: handleLogin, disabled: submitting,
      }, submitting ? '로그인 중...' : '로그인'),
      React.createElement('div', { className: 'login-footer' },
        '회원이 아니신가요? ',
        React.createElement('a', { onClick: goToMainSignup }, '말툴스에서 회원가입'),
      ),
    ),
  );
}

// ============ Chat Room ============
function ChatRoom({ user, profile }) {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [sending, setSending] = useState(false);
  const [loading, setLoading] = useState(true);
  const [showParticipants, setShowParticipants] = useState(false);
  const [participants, setParticipants] = useState([]);
  const [showEmojiPicker, setShowEmojiPicker] = useState(false);
  const scrollRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => {
    loadMessages();
    setTimeout(() => inputRef.current?.focus(), 200);

    const channel = supabase
      .channel('maltalk_general_' + Date.now())
      .on('postgres_changes',
        { event: 'INSERT', schema: 'public', table: 'chat_messages', filter: 'room_id=eq.general' },
        async (payload) => {
          const newMsg = payload.new;
          let author = null;
          try {
            const profiles = await rawFetch(`profiles?select=*&id=eq.${newMsg.user_id}`);
            author = profiles?.[0] || null;
          } catch (e) {}
          setMessages(prev => {
            if (prev.find(m => m.id === newMsg.id)) return prev;
            return [...prev, { ...newMsg, author }];
          });
          setTimeout(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, 50);
        }
      )
      .on('postgres_changes',
        { event: 'DELETE', schema: 'public', table: 'chat_messages' },
        (payload) => {
          const id = payload.old?.id;
          if (id) setMessages(prev => prev.filter(m => m.id !== id));
        }
      )
      .subscribe();

    const pollTimer = setInterval(loadMessages, 15000);

    return () => {
      try { supabase.removeChannel(channel); } catch (e) {}
      clearInterval(pollTimer);
    };
  }, []);

  async function loadMessages() {
    try {
      const msgs = await rawFetch('chat_messages?select=*&room_id=eq.general&order=created_at.asc&limit=100');
      const userIds = [...new Set((msgs || []).map(m => m.user_id))];
      let profileMap = {};
      if (userIds.length > 0) {
        const profs = await rawFetch(`profiles?select=*&id=in.(${userIds.join(',')})`).catch(() => []);
        (profs || []).forEach(p => profileMap[p.id] = p);
      }
      setMessages((msgs || []).map(m => ({ ...m, author: profileMap[m.user_id] || null })));
      setTimeout(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, 100);
    } catch (e) {
      console.error('로드 실패:', e);
    } finally {
      setLoading(false);
    }
  }

  async function loadParticipants() {
    try {
      const msgs = await rawFetch('chat_messages?select=user_id&room_id=eq.general&limit=500');
      const uniqueIds = [...new Set((msgs || []).map(m => m.user_id))];
      if (uniqueIds.length === 0) { setParticipants([]); return; }
      const profs = await rawFetch(`profiles?select=*&id=in.(${uniqueIds.join(',')})`);
      setParticipants(profs || []);
    } catch (e) {}
  }

  async function sendMessage() {
    if (!input.trim() || sending) return;
    setSending(true);
    const content = input.trim();
    setInput('');
    try {
      await rawFetch('chat_messages', {
        method: 'POST',
        body: { user_id: user.id, content, room_id: 'general' },
      });
    } catch (e) {
      alert('전송 실패: ' + e.message);
      setInput(content);
    } finally {
      setSending(false);
      setTimeout(() => inputRef.current?.focus(), 50);
    }
  }

  async function deleteMessage(id, isMine) {
    if (!confirm(isMine ? '이 메시지를 삭제하시겠어요?' : '관리자 권한으로 삭제하시겠어요?')) return;
    try {
      await rawFetch(`chat_messages?id=eq.${id}`, { method: 'DELETE' });
      setMessages(prev => prev.filter(m => m.id !== id));
    } catch (e) { alert('삭제 실패: ' + e.message); }
  }

  async function handleLogout() {
    if (!confirm('말톡에서 로그아웃하시겠어요?')) return;
    try { await supabase.auth.signOut(); } catch (e) {}
    Object.keys(localStorage).filter(k => k.startsWith('sb-')).forEach(k => localStorage.removeItem(k));
    window.location.reload();
  }

  return React.createElement(React.Fragment, null,
    // 헤더
    React.createElement('div', { className: 'header' },
      React.createElement('div', { className: 'header-title' },
        React.createElement('div', { style: { fontSize: 28 } }, '🐎'),
        React.createElement('div', null,
          React.createElement('h1', null, '💬 말톡'),
          React.createElement('div', { className: 'header-sub' }, `${profile?.nickname || profile?.name || user.email.split('@')[0]} 님`),
        ),
      ),
      React.createElement('div', { style: { display: 'flex', gap: 6 } },
        React.createElement('button', { 
          className: 'header-btn', 
          onClick: () => { setShowParticipants(s => !s); if (!showParticipants) loadParticipants(); },
          title: '참석자 보기'
        }, '☰'),
        React.createElement('button', { className: 'header-btn', onClick: handleLogout, title: '로그아웃' }, '로그아웃'),
      ),
    ),
    
    // 참석자 패널
    showParticipants && React.createElement('div', { className: 'participants' },
      React.createElement('div', { className: 'participants-header' },
        React.createElement('span', null, `👥 참석자 (${participants.length}명)`),
        React.createElement('button', { 
          onClick: () => setShowParticipants(false), 
          style: { background: 'none', border: 'none', cursor: 'pointer', color: 'var(--ink-muted)', fontSize: 14 }
        }, '▲'),
      ),
      participants.length === 0 
        ? React.createElement('div', { style: { fontSize: 11, color: 'var(--ink-muted)', textAlign: 'center', padding: 10 } }, '아직 참석자가 없어요')
        : participants.map(p => {
            const isAdminP = p.is_admin || ADMIN_EMAILS.includes((p.email || '').toLowerCase());
            const isMeP = p.id === user.id;
            return React.createElement('div', { key: p.id, className: 'participant-item' + (isMeP ? ' me' : '') },
              React.createElement('div', { className: 'participant-avatar' + (isAdminP ? ' admin' : '') },
                (p.nickname || p.name || '?').charAt(0).toUpperCase()
              ),
              React.createElement('div', { className: 'participant-info' },
                React.createElement('div', { className: 'participant-name' },
                  p.nickname || p.name || '익명',
                  isMeP && React.createElement('span', { style: { fontSize: 9, marginLeft: 4, color: 'var(--accent)' } }, '(나)'),
                  isAdminP && React.createElement('span', { className: 'admin-badge' }, '운영자'),
                ),
                p.company && React.createElement('div', { className: 'participant-meta' }, `${p.company}${p.sap_module ? ' · ' + p.sap_module : ''}`),
              ),
            );
          }),
    ),
    
    // 메시지 영역
    React.createElement('div', { className: 'messages', ref: scrollRef },
      loading 
        ? React.createElement('div', { style: { textAlign: 'center', padding: 40, color: 'var(--ink-muted)', fontSize: 13 } }, '불러오는 중...')
        : messages.length === 0
          ? React.createElement('div', { className: 'empty-state' },
              React.createElement('div', { className: 'emoji' }, '💬'),
              React.createElement('div', { className: 'title' }, '아직 메시지가 없어요'),
              React.createElement('div', { className: 'desc' }, '첫 메시지를 남겨보세요!'),
            )
          : messages.map(msg => {
              const isMine = msg.user_id === user.id;
              const isAdminMsg = msg.author?.is_admin || ADMIN_EMAILS.includes((msg.author?.email || '').toLowerCase());
              const canDelete = isMine || isAdmin(user, profile);
              return React.createElement('div', { key: msg.id, className: 'msg-row' + (isMine ? ' mine' : '') },
                React.createElement('div', { className: 'msg-bubble' },
                  !isMine && React.createElement('div', { className: 'msg-author' + (isAdminMsg ? ' admin' : '') },
                    msg.author?.nickname || msg.author?.name || '익명',
                    isAdminMsg && React.createElement('span', { className: 'admin-badge' }, '운영자'),
                  ),
                  React.createElement('div', { className: 'msg-content' }, msg.content),
                ),
                React.createElement('div', { style: { display: 'flex', flexDirection: 'column', alignItems: isMine ? 'flex-end' : 'flex-start', gap: 2 } },
                  React.createElement('div', { className: 'msg-time' }, relTime(msg.created_at)),
                  canDelete && React.createElement('button', { 
                    className: 'msg-delete', 
                    onClick: () => deleteMessage(msg.id, isMine),
                    title: isMine ? '내 메시지 삭제' : '관리자 권한으로 삭제'
                  }, '🗑 삭제'),
                ),
              );
            }),
    ),
    
    // 입력 영역
    React.createElement('div', { className: 'input-area' },
      showEmojiPicker && React.createElement('div', { className: 'emoji-picker' },
        React.createElement('div', { style: { fontSize: 11, fontWeight: 600, color: 'var(--ink-soft)', marginBottom: 6, display: 'flex', justifyContent: 'space-between' } },
          React.createElement('span', null, '이모지 선택'),
          React.createElement('button', { 
            onClick: () => setShowEmojiPicker(false),
            style: { background: 'none', border: 'none', cursor: 'pointer', color: 'var(--ink-muted)', fontSize: 12 }
          }, '✕'),
        ),
        React.createElement('div', { className: 'emoji-grid' },
          COMMON_EMOJIS.map(emoji => React.createElement('button', {
            key: emoji,
            onClick: () => { 
              setInput(p => p + emoji); 
              setShowEmojiPicker(false);
              setTimeout(() => inputRef.current?.focus(), 50);
            }
          }, emoji)),
        ),
      ),
      React.createElement('div', { className: 'input-row' },
        React.createElement('button', {
          className: 'emoji-btn' + (showEmojiPicker ? ' active' : ''),
          onClick: () => setShowEmojiPicker(s => !s),
          title: '이모지 선택',
        }, '😊'),
        React.createElement('input', {
          ref: inputRef,
          className: 'input-msg',
          type: 'text',
          value: input,
          onChange: e => setInput(e.target.value),
          onKeyDown: e => { if (e.key === 'Enter') { e.preventDefault(); sendMessage(); } },
          placeholder: '메시지를 입력하세요...',
          disabled: sending,
          maxLength: 1000,
        }),
        React.createElement('button', {
          className: 'send-btn',
          onClick: sendMessage,
          disabled: !input.trim() || sending,
          title: '전송',
        }, '➤'),
      ),
    ),
  );
}

// React UMD bundled
const reactScript = document.createElement('script');
reactScript.src = 'https://unpkg.com/react@18/umd/react.production.min.js';
reactScript.onload = () => {
  const reactDOMScript = document.createElement('script');
  reactDOMScript.src = 'https://unpkg.com/react-dom@18/umd/react-dom.production.min.js';
  reactDOMScript.onload = () => {
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  };
  document.head.appendChild(reactDOMScript);
};
document.head.appendChild(reactScript);
</script>

</body>
</html>
