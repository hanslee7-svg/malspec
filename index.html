// ============================================
// 비밀번호 게이트 (Password Gate)
// ============================================
// 비밀번호를 바꾸려면:
//   1. 새 비밀번호를 정한다 (예: "myNewPassword2026")
//   2. 터미널에서:  echo -n "myNewPassword2026" | sha256sum
//   3. 출력된 해시값을 아래 해시에 붙여넣기
// 현재 비번:
//   - 말스펙: malspec2025
//   - 말코딩: 1234567890
//   - 말옵스: malops2026
const PASSWORD_HASH = '34b312c1c7abc91f777d299bd9f205362ef26409e3e75248792437dafeedebc0';
const PASSWORD_HASH_MC = 'c775e7b757ede630cd0aa1113bd102661ab38829ca52a6422ab782862f268646';
const PASSWORD_HASH_MO = '935389c52d400a34cd678a331b1c613406aaf54d3e306df4b0cd166c2d9ef9a9';

async function sha256(text) {
  // 우선 native crypto.subtle 사용 (HTTPS 환경)
  if (typeof crypto !== 'undefined' && crypto.subtle && crypto.subtle.digest) {
    try {
      const buffer = new TextEncoder().encode(text);
      const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
      return Array.from(new Uint8Array(hashBuffer))
        .map(b => b.toString(16).padStart(2, '0'))
        .join('');
    } catch (e) {
      console.warn('crypto.subtle failed, falling back to pure JS:', e);
    }
  }
  // 폴백: 순수 JS SHA-256 (HTTP/iOS Safari 등 secure context 아닐 때)
  return sha256Pure(text);
}

// Pure JS SHA-256 (ASCII 입력 가정 — 비밀번호 용도)
function sha256Pure(ascii) {
  function rightRotate(value, amount) { return (value >>> amount) | (value << (32 - amount)); }
  const mathPow = Math.pow;
  const maxWord = mathPow(2, 32);
  let i, j, result = '';
  const words = [];
  const asciiBitLength = ascii.length * 8;
  let hash = sha256Pure.h = sha256Pure.h || [];
  const k = sha256Pure.k = sha256Pure.k || [];
  let primeCounter = k.length;
  const isComposite = {};
  for (let candidate = 2; primeCounter < 64; candidate++) {
    if (!isComposite[candidate]) {
      for (i = 0; i < 313; i += candidate) isComposite[i] = candidate;
      hash[primeCounter] = (mathPow(candidate, 0.5) * maxWord) | 0;
      k[primeCounter++] = (mathPow(candidate, 1/3) * maxWord) | 0;
    }
  }
  ascii += '\x80';
  while (ascii.length % 64 - 56) ascii += '\x00';
  for (i = 0; i < ascii.length; i++) {
    j = ascii.charCodeAt(i);
    if (j >> 8) return null; // non-ASCII (한글 등) — 비번엔 ASCII 권장
    words[i >> 2] |= j << ((3 - i) % 4) * 8;
  }
  words[words.length] = ((asciiBitLength / maxWord) | 0);
  words[words.length] = (asciiBitLength);
  for (j = 0; j < words.length;) {
    const w = words.slice(j, j += 16);
    const oldHash = hash;
    hash = hash.slice(0, 8);
    for (i = 0; i < 64; i++) {
      const w15 = w[i - 15], w2 = w[i - 2];
      const a = hash[0], e = hash[4];
      const temp1 = hash[7]
        + (rightRotate(e, 6) ^ rightRotate(e, 11) ^ rightRotate(e, 25))
        + ((e & hash[5]) ^ ((~e) & hash[6]))
        + k[i]
        + (w[i] = (i < 16) ? w[i] : (
          w[i - 16]
          + (rightRotate(w15, 7) ^ rightRotate(w15, 18) ^ (w15 >>> 3))
          + w[i - 7]
          + (rightRotate(w2, 17) ^ rightRotate(w2, 19) ^ (w2 >>> 10))
        ) | 0);
      const temp2 = (rightRotate(a, 2) ^ rightRotate(a, 13) ^ rightRotate(a, 22))
        + ((a & hash[1]) ^ (a & hash[2]) ^ (hash[1] & hash[2]));
      hash = [(temp1 + temp2) | 0].concat(hash);
      hash[4] = (hash[4] + temp1) | 0;
    }
    for (i = 0; i < 8; i++) hash[i] = (hash[i] + oldHash[i]) | 0;
  }
  for (i = 0; i < 8; i++) {
    for (j = 3; j + 1; j--) {
      const b = (hash[i] >> (j * 8)) & 255;
      result += ((b < 16) ? 0 : '') + b.toString(16);
    }
  }
  return result;
}

function Gate({ onUnlock, onBack, toolName }) {
  // toolName: 'malspec' | 'malcoding' | 'malops' | undefined (legacy)
  const branding = toolName === 'malcoding'
    ? { ko: ['말', '코', '딩'], en: ['MAL_', 'Coding'], color: '#9B59B6' }
    : toolName === 'malops'
    ? { ko: ['말', '옵', '스'], en: ['MAL_', 'Ops'], color: '#E74C3C' }
    : { ko: ['말', '스', '펙'], en: ['MAL', 'sPEC'], color: '#E67E22' };
  const [pw, setPw] = useState('');
  const [error, setError] = useState('');
  const [checking, setChecking] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => {
    if (inputRef.current) inputRef.current.focus();
  }, []);

  async function trySubmit(e) {
    if (e) e.preventDefault();
    if (!pw || checking) return;
    setChecking(true);
    setError('');
    try {
      const hash = await sha256(pw);
      if (!hash) {
        setError('해시 계산 실패 (비밀번호에 ASCII 외 문자 포함됨)');
        return;
      }
      const targetHash = toolName === 'malcoding' ? PASSWORD_HASH_MC
                       : toolName === 'malops' ? PASSWORD_HASH_MO
                       : PASSWORD_HASH;
      const storageKey = toolName === 'malcoding' ? 'malcoding_unlocked'
                       : toolName === 'malops' ? 'malops_unlocked'
                       : 'malspec_unlocked';
      if (hash === targetHash) {
        try { sessionStorage.setItem(storageKey, '1'); } catch (e) { /* ignore */ }
        onUnlock();
      } else {
        setError('비밀번호가 틀렸습니다');
        setPw('');
        if (inputRef.current) inputRef.current.focus();
      }
    } catch (err) {
      console.error('Gate error:', err);
      setError('오류: ' + (err.message || String(err)));
    } finally {
      setChecking(false);
    }
  }

  return (
    <div className="gate">
      <div className="gate-card">
        <img
          src={HORSE_IMG}
          alt="말머리 마스코트"
          style={{ width: 84, height: 'auto', margin: '0 auto 4px', display: 'block' }}
        />
        <div className="gate-title">
          {branding.ko[0]}<span style={{ fontSize: '0.5em', verticalAlign: '0.3em', color: branding.color }}>{branding.ko[1]}</span>{branding.ko[2]}
        </div>
        <div className="gate-subtitle">
          {toolName === 'malcoding' ? (
            <>MAL_<span style={{ color: branding.color }}>Coding</span> · 비밀번호를 입력하세요</>
          ) : toolName === 'malops' ? (
            <>MAL_<span style={{ color: branding.color }}>Ops</span> · 비밀번호를 입력하세요</>
          ) : (
            <>MAL<span style={{ color: branding.color }}>s</span>PEC · 비밀번호를 입력하세요</>
          )}
        </div>
        <form onSubmit={trySubmit}>
          <input
            ref={inputRef}
            type="password"
            className="gate-input"
            value={pw}
            onChange={e => setPw(e.target.value)}
            placeholder="비밀번호"
            disabled={checking}
            autoComplete="current-password"
          />
          <button
            type="submit"
            className="gate-btn"
            disabled={!pw || checking}
          >
            {checking ? '확인 중...' : '입장'}
          </button>
        </form>
        {error && <div className="gate-error">{error}</div>}
        {(toolName === 'malcoding' || toolName === 'malops') ? (
          <div style={{ marginTop: 20, padding: 14, background: 'rgba(230,126,34,0.06)', border: '1px dashed rgba(230,126,34,0.3)', borderRadius: 6, fontSize: 12, color: 'var(--ink-soft)', lineHeight: 1.7, textAlign: 'left' }}>
            <strong style={{ color: 'var(--accent)' }}>🔒 베타 회원 전용 도구</strong><br />
            현재 <strong>{toolName === 'malcoding' ? '말코딩' : '말QnA'}</strong>는 베타 회원만 사용 가능합니다.
            <br /><br />
            <strong>처음이세요?</strong> 홈에서 <strong>🚀 베타 신청</strong> 메뉴를 이용해주세요.
            신청 후 1~2일 내 비밀번호를 메일로 받으실 수 있어요.
          </div>
        ) : (
          <div className="gate-footer">
            접근 권한이 필요하면 관리자에게 문의하세요.
          </div>
        )}
        {onBack && (
          <button
            type="button"
            onClick={onBack}
            style={{ background: 'none', border: 'none', color: 'var(--ink-muted)', fontSize: 12, marginTop: 18, cursor: 'pointer', padding: 0 }}
          >← 처음으로</button>
        )}
      </div>
    </div>
  );
}

// ===== 관리자 대시보드 =====
function AdminDashboard({ user, profile, isLoggedIn, onGoLogin }) {
  const [members, setMembers] = useState([]);
  const [stats, setStats] = useState({
    totalMembers: 0, todaySignups: 0, weekSignups: 0,
    roleDist: {}, moduleDist: {},
    totalPosts: 0, totalComments: 0,
    totalQnA: 0, totalAnswers: 0, resolvedQnA: 0,
  });
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState('');
  const [search, setSearch] = useState('');
  const [filterRole, setFilterRole] = useState('all');
  const [filterModule, setFilterModule] = useState('all');
  const [sortBy, setSortBy] = useState('newest'); // newest | oldest | name

  const ROLE_LABELS = {
    consultant: '컨설턴트', developer: '개발', operations: '운영',
    business: '현업', other: '기타',
  };
  const SAP_MODULES = ['FI', 'CO', 'MM', 'SD', 'PP', 'HR', 'WM', 'QM', 'PS', 'BASIS', 'ABAP', '기타'];

  useEffect(() => {
    if (isLoggedIn && isAdminUser(user, profile)) loadAll();
  }, [isLoggedIn, profile?.is_admin, user?.email]);

  async function loadAll() {
    if (!supabase) return;
    setLoading(true);
    setError('');
    try {
      console.log('[Admin] loadAll 시작 (raw fetch)');
      // Raw fetch — Supabase JS 우회
      const [allMembers, allPosts, allComments, allQna, allAnswers] = await Promise.all([
        rawSupabaseFetch('profiles?select=*&order=created_at.desc').catch(() => []),
        rawSupabaseFetch('posts?select=id&limit=10000').catch(() => []),
        rawSupabaseFetch('comments?select=id&limit=10000').catch(() => []),
        rawSupabaseFetch('qna_questions?select=id,is_resolved&limit=10000').catch(() => []),
        rawSupabaseFetch('qna_answers?select=id&limit=10000').catch(() => []),
      ]);

      setMembers(allMembers || []);

      // 통계 계산
      const now = new Date();
      const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);

      const todaySignups = (allMembers || []).filter(m => new Date(m.created_at) >= todayStart).length;
      const weekSignups = (allMembers || []).filter(m => new Date(m.created_at) >= weekAgo).length;

      const roleDist = {};
      const moduleDist = {};
      (allMembers || []).forEach(m => {
        const r = m.role || 'other';
        roleDist[r] = (roleDist[r] || 0) + 1;
        const mod = m.sap_module || '기타';
        moduleDist[mod] = (moduleDist[mod] || 0) + 1;
      });

      setStats({
        totalMembers: (allMembers || []).length,
        todaySignups, weekSignups,
        roleDist, moduleDist,
        totalPosts: (allPosts || []).length,
        totalComments: (allComments || []).length,
        totalQnA: (allQna || []).length,
        totalAnswers: (allAnswers || []).length,
        resolvedQnA: (allQna || []).filter(q => q.is_resolved).length,
      });
      console.log('[Admin] 완료');
    } catch (e) {
      setError('데이터 로드 실패: ' + e.message);
    } finally {
      setLoading(false);
    }
  }

  // 권한 체크
  if (!isLoggedIn) {
    return (
      <div className="board-page">
        <div className="vision-section-title">🛠 관리자 대시보드</div>
        <div style={{ maxWidth: 560, margin: '40px auto', padding: 40, background: 'rgba(0,0,0,0.02)', border: '1px dashed var(--line)', borderRadius: 8, textAlign: 'center' }}>
          <div style={{ fontSize: 36, marginBottom: 10 }}>🔒</div>
          <div style={{ fontSize: 14, color: 'var(--ink-soft)', marginBottom: 14 }}>관리자만 접근 가능합니다</div>
          <button className="btn btn-primary" onClick={onGoLogin} style={{ background: '#E67E22', borderColor: '#E67E22' }}>로그인</button>
        </div>
      </div>
    );
  }
  if (!isAdminUser(user, profile)) {
    return (
      <div className="board-page">
        <div className="vision-section-title">🛠 관리자 대시보드</div>
        <div style={{ maxWidth: 560, margin: '40px auto', padding: 40, background: 'rgba(231,76,60,0.06)', border: '1px solid rgba(231,76,60,0.2)', borderRadius: 8, textAlign: 'center' }}>
          <div style={{ fontSize: 36, marginBottom: 10 }}>⛔</div>
          <div style={{ fontSize: 14, color: '#A02C1F' }}>관리자 권한이 없습니다</div>
        </div>
      </div>
    );
  }

  // 필터링 + 정렬
  let filteredMembers = members.filter(m => {
    if (search) {
      const s = search.toLowerCase();
      const match = (m.name || '').toLowerCase().includes(s) ||
                    (m.email || '').toLowerCase().includes(s) ||
                    (m.company || '').toLowerCase().includes(s);
      if (!match) return false;
    }
    if (filterRole !== 'all' && m.role !== filterRole) return false;
    if (filterModule !== 'all' && m.sap_module !== filterModule) return false;
    return true;
  });
  if (sortBy === 'oldest') filteredMembers = [...filteredMembers].sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
  else if (sortBy === 'name') filteredMembers = [...filteredMembers].sort((a, b) => (a.name || '').localeCompare(b.name || '', 'ko'));

  async function toggleAdmin(member) {
    if (member.id === user.id) { alert('본인은 변경 불가'); return; }
    const action = member.is_admin ? '해제' : '지정';
    if (!window.confirm(`${member.name || member.email}님을 관리자로 ${action}하시겠습니까?`)) return;
    try {
      const { error } = await supabase.from('profiles').update({ is_admin: !member.is_admin }).eq('id', member.id);
      if (error) throw error;
      loadAll();
    } catch (e) { alert('실패: ' + e.message); }
  }

  function downloadCSV() {
    const headers = ['이름', '닉네임', '이메일', '회사', '직책', 'SAP 모듈', '직무', '관리자', '가입일'];
    const rows = filteredMembers.map(m => [
      m.name || '', m.nickname || '', m.email || '', m.company || '', m.title || '',
      m.sap_module || '', ROLE_LABELS[m.role] || m.role || '',
      m.is_admin ? 'Y' : '',
      new Date(m.created_at).toLocaleDateString('ko-KR'),
    ]);
    const csv = [headers, ...rows].map(r => r.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\n');
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `말툴스_회원목록_${new Date().toISOString().slice(0,10)}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // 통계 카드 컴포넌트
  const StatCard = ({ icon, label, value, sub, color }) => (
    <div style={{
      flex: '1 1 200px', background: 'var(--paper)', border: '1px solid var(--line)',
      borderRadius: 6, padding: 20, borderLeft: `3px solid ${color || '#E67E22'}`,
    }}>
      <div style={{ fontSize: 11, color: 'var(--ink-muted)', letterSpacing: '0.05em', fontFamily: "'JetBrains Mono', monospace", marginBottom: 6, textTransform: 'uppercase' }}>{icon} {label}</div>
      <div style={{ fontSize: 28, fontWeight: 700, color: 'var(--ink)', fontFamily: "'Noto Serif KR', serif", lineHeight: 1.1 }}>{value}</div>
      {sub && <div style={{ fontSize: 11, color: 'var(--ink-muted)', marginTop: 4 }}>{sub}</div>}
    </div>
  );

  // 분포 바
  const DistBar = ({ label, count, total, color }) => {
    const pct = total > 0 ? (count / total) * 100 : 0;
    return (
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6 }}>
        <div style={{ width: 80, fontSize: 12, color: 'var(--ink-soft)', flexShrink: 0 }}>{label}</div>
        <div style={{ flex: 1, height: 18, background: 'rgba(0,0,0,0.05)', borderRadius: 2, position: 'relative', overflow: 'hidden' }}>
          <div style={{ width: `${pct}%`, height: '100%', background: color || '#E67E22', transition: 'width 0.3s' }} />
        </div>
        <div style={{ width: 50, textAlign: 'right', fontSize: 12, color: 'var(--ink-soft)', fontFamily: "'JetBrains Mono', monospace", flexShrink: 0 }}>
          {count} <span style={{ fontSize: 10, color: 'var(--ink-muted)' }}>({pct.toFixed(0)}%)</span>
        </div>
      </div>
    );
  };

  return (
    <div className="board-page" style={{ maxWidth: 1400 }}>
      <div className="vision-section-title">🛠 관리자 대시보드</div>
      <div className="vision-section-subtitle">회원·콘텐츠 운영 현황 한눈에 보기</div>

      {error && (
        <div style={{ maxWidth: 1200, margin: '0 auto 16px', padding: 12, background: 'rgba(231,76,60,0.08)', border: '1px solid rgba(231,76,60,0.3)', borderRadius: 4, color: '#A02C1F', fontSize: 13 }}>⚠ {error}</div>

      {loading ? (
        <div style={{ padding: 60, textAlign: 'center', color: 'var(--ink-muted)' }}>🦄 불러오는 중...</div>
      ) : (
        <div style={{ maxWidth: 1200, margin: '0 auto' }}>
          {/* 통계 카드 */}
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 12, marginBottom: 32 }}>
            <StatCard icon="👥" label="총 회원" value={stats.totalMembers} sub={`+${stats.todaySignups} 오늘`} color="#E67E22" />

            <StatCard icon="❓" label="Q&A 질문" value={stats.totalQnA} sub={`답변 ${stats.totalAnswers} · 해결 ${stats.resolvedQnA}`} color="#9B59B6" />
          </div>
