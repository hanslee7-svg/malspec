<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>말스펙 (MALsPEC_v0.2)</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
:root{
  --bg:#F6F2EA;
  --paper:#FDFBF6;
  --ink:#1A1D24;
  --ink-soft:#4A5060;
  --ink-muted:#8B91A2;
  --line:#E2DBCB;
  --line-soft:#EDE7D8;
  --accent:#7A4A22;
  --accent-soft:#C19A6B;
  --accent-bg:#F1E6D2;
  --error:#A8423B;
  --success:#4A6B3D;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:'IBM Plex Sans KR',-apple-system,sans-serif;font-size:14px;line-height:1.65;min-height:100vh;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:inherit;font-size:inherit;color:inherit}

.app{max-width:980px;margin:0 auto;padding:48px 32px 120px}

/* Header */
.header{margin-bottom:32px;padding-bottom:32px;border-bottom:1px solid var(--line)}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.2em;color:var(--accent);text-transform:uppercase;margin-bottom:12px}
.title{font-family:'Noto Serif KR',serif;font-size:36px;font-weight:600;letter-spacing:-0.02em;line-height:1.2}
.subtitle{color:var(--ink-soft);margin-top:8px;font-size:14px}

/* Check list (파일 업데이트 항목) */
.check-list{display:flex;flex-direction:column;gap:0;margin-top:12px}
.check-row{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:3px;cursor:pointer;transition:background 0.1s;border-bottom:1px solid #F0E9D8}
.check-row:last-child{border-bottom:none}
.check-row:hover{background:#FCFAF4}
.check-row.checked{background:#FAF5EA}
.check-row.lv2{padding-left:36px}
.check-row input[type="checkbox"]{width:16px;height:16px;cursor:pointer;accent-color:#7A4A22;flex-shrink:0}
.check-num{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-muted);min-width:36px;flex-shrink:0}
.check-row.checked .check-num{color:var(--accent);font-weight:600}
.check-title{flex:1;font-size:14px;color:var(--ink-soft)}
.check-row.checked .check-title{color:var(--ink);font-weight:500}
.check-divider{font-family:'Noto Serif KR',serif;font-size:14px;font-weight:600;color:var(--accent);font-style:italic;padding:14px 0 6px 4px;margin-top:8px;border-top:1px dashed var(--line)}

/* Domain picker */
.domain-picker{margin-bottom:28px}
.domain-picker-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.15em;color:var(--ink-muted);text-transform:uppercase;margin-bottom:10px;font-weight:500}
.domain-chips{display:flex;gap:8px;flex-wrap:wrap}
.domain-chip{background:var(--paper);border:1px solid var(--line);border-radius:3px;padding:10px 14px;display:flex;flex-direction:column;align-items:flex-start;gap:2px;cursor:pointer;transition:all 0.15s;min-width:108px;text-align:left}
.domain-chip:hover{border-color:var(--accent-soft);background:#FCFAF4}
.domain-chip.active{background:var(--ink);border-color:var(--ink)}
.domain-chip.active .domain-name{color:var(--paper)}
.domain-chip.active .domain-label{color:var(--accent-soft)}
.domain-icon{font-size:16px;margin-bottom:2px}
.domain-name{font-family:'Noto Serif KR',serif;font-size:14px;font-weight:600;color:var(--ink);transition:color 0.15s;line-height:1.2}
.domain-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.1em;color:var(--ink-muted);text-transform:uppercase;transition:color 0.15s}

/* Password gate */
.gate{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px}
.gate-card{background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:40px 48px 32px;width:100%;max-width:380px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.04)}
.gate-title{font-family:'Noto Serif KR',serif;font-size:30px;font-weight:600;margin-top:12px;color:#3A3F48;line-height:1.2}
.gate-subtitle{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.08em;color:var(--ink-muted);margin:8px 0 28px;text-transform:uppercase}
.gate-input{width:100%;background:#FCFAF4;border:1px solid var(--line);border-radius:3px;padding:11px 14px;font-size:14px;font-family:'JetBrains Mono',monospace;letter-spacing:0.05em;box-sizing:border-box}
.gate-input:focus{outline:none;border-color:var(--accent-soft)}
.gate-btn{margin-top:12px;width:100%;background:var(--ink);color:var(--paper);border:none;padding:12px 20px;font-size:13px;font-weight:600;cursor:pointer;border-radius:3px;letter-spacing:0.05em;font-family:'IBM Plex Sans KR',sans-serif}
.gate-btn:hover:not(:disabled){background:#000}
.gate-btn:disabled{opacity:0.4;cursor:not-allowed}
.gate-error{color:#C0392B;font-size:12px;margin-top:14px}
.gate-footer{font-size:11px;color:var(--ink-muted);margin-top:24px;padding-top:18px;border-top:1px solid var(--line)}

/* Settings panel */
.settings-panel{background:#FAF5EA;border:1px solid var(--accent-soft);border-radius:3px;padding:22px 24px;margin-bottom:24px}
.settings-panel a{text-decoration:none;border-bottom:1px dotted}
.settings-panel a:hover{text-decoration:underline}
.settings-panel select{cursor:pointer}
.settings-panel select:focus{outline:none;border-bottom-color:var(--accent)}

/* Meta inputs */
.meta-card{background:var(--paper);border:1px solid var(--line);border-radius:2px;padding:28px;margin-bottom:32px;box-shadow:0 1px 0 rgba(122,74,34,0.04)}
.meta-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px 28px}
.field{display:flex;flex-direction:column;gap:6px}
.label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.15em;color:var(--ink-muted);text-transform:uppercase;font-weight:500}
.input{background:transparent;border:none;border-bottom:1px solid var(--line);padding:6px 0;font-size:15px;transition:border-color 0.2s}
.input:focus{outline:none;border-bottom-color:var(--accent)}

/* Section */
.section{background:var(--paper);border:1px solid var(--line);border-radius:2px;margin-bottom:16px;overflow:hidden;transition:border-color 0.2s}
.section.expanded{border-color:var(--accent-soft)}
.section-header{display:flex;align-items:center;gap:16px;padding:18px 24px;cursor:pointer;transition:background 0.15s}
.section-header:hover{background:rgba(122,74,34,0.025)}
.section-num{font-family:'Noto Serif KR',serif;font-size:18px;font-weight:600;color:var(--accent);min-width:44px}
.section-num.lv2{font-size:14px;color:var(--ink-muted);min-width:44px;padding-left:14px}
.section-title{flex:1;font-family:'Noto Serif KR',serif;font-size:16px;font-weight:500}
.section.lv2 .section-title{font-size:14px;color:var(--ink-soft)}
.section-status{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.1em;padding:3px 8px;border-radius:2px;text-transform:uppercase}
.status-empty{background:#F0EBE0;color:var(--ink-muted)}
.status-draft{background:#FBF1DC;color:var(--accent)}
.status-done{background:#E3EBDB;color:var(--success)}
.caret{color:var(--ink-muted);font-size:12px;transition:transform 0.2s;font-family:'JetBrains Mono',monospace}
.section.expanded .caret{transform:rotate(90deg)}

.section-body{padding:0 24px 24px;border-top:1px solid var(--line-soft);display:none}
.section.expanded .section-body{display:block}
.hint{font-size:12px;color:var(--ink-muted);margin:14px 0 10px;font-style:italic;line-height:1.5}
.textarea-wrap{position:relative;margin-bottom:14px}
.textarea-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.15em;color:var(--ink-muted);text-transform:uppercase;margin-bottom:6px;display:block}
textarea{width:100%;background:#FCFAF4;border:1px solid var(--line);border-radius:2px;padding:12px 14px;font-size:14px;line-height:1.6;resize:vertical;min-height:80px;transition:border-color 0.2s;font-family:inherit}
textarea:focus{outline:none;border-color:var(--accent-soft)}
textarea.draft{min-height:140px;background:var(--paper);font-family:'IBM Plex Sans KR',sans-serif}

.section-tools{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.btn{padding:8px 14px;border-radius:2px;font-size:12px;font-weight:500;letter-spacing:0.02em;transition:all 0.15s;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--ink);color:var(--paper)}
.btn-primary:hover{background:#000}
.btn-primary:disabled{background:var(--ink-muted);cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--line)}
.btn-ghost:hover{border-color:var(--accent-soft);color:var(--accent)}
.btn-accent{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-soft)}
.btn-accent:hover{background:var(--accent-soft);color:white}
.btn-accent:disabled{opacity:0.5;cursor:not-allowed}

.divider{display:flex;align-items:center;gap:14px;margin:32px 0 16px;color:var(--accent);font-family:'Noto Serif KR',serif;font-size:13px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--line)}

/* Sticky toolbar */
.toolbar{position:sticky;bottom:24px;background:var(--ink);border-radius:4px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 8px 32px rgba(26,29,36,0.25);margin-top:32px;z-index:10}
.toolbar-info{color:var(--paper);font-size:13px;display:flex;gap:18px;align-items:center;flex-wrap:wrap}
.toolbar-info span{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.05em;color:#C8CDD6}
.toolbar-info strong{color:var(--accent-soft);font-weight:500}
.toolbar-actions{display:flex;gap:8px}
.btn-download{background:var(--accent-soft);color:var(--ink);padding:9px 18px;font-weight:600}
.btn-download:hover{background:#D4B188}

/* Loader */
.loader{display:inline-block;width:12px;height:12px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:12px 20px;border-radius:2px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,0.2);z-index:100;animation:fadein 0.2s}
.toast.error{background:var(--error)}
@keyframes fadein{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}

/* Mode pill */
.intro-note{background:var(--accent-bg);border-left:3px solid var(--accent);padding:14px 18px;margin-bottom:24px;font-size:13px;color:var(--ink-soft);line-height:1.6}
.intro-note strong{color:var(--accent)}

@media (max-width:640px){
  .app{padding:24px 16px 100px}
  .title{font-size:28px}
  .meta-grid{grid-template-columns:1fr}
  .section-header{padding:14px 16px;gap:10px}
  .section-num{font-size:15px;min-width:36px}
  .section-num.lv2{font-size:12px;min-width:36px;padding-left:10px}
  .toolbar{flex-direction:column;gap:10px;align-items:stretch;padding:14px}
  .toolbar-info{justify-content:center}
  .toolbar-actions{justify-content:center}
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo, useRef } = React;

// Common SAP module FS sections (matches user's 개발요청서 FS-TS통합 template)

// General IT FS sections (simpler, non-SAP)

// Storage helper: handles both standalone (localStorage) and artifact (window.storage) environments
const STORAGE_KEY = 'sap_fi_fs_state_v1';
const API_CONFIG_KEY = 'sap_fi_fs_api_config_v1';
const Storage = {
  async get(key) {
    try {
      if (window.storage && window.storage.get) {
        const r = await window.storage.get(key);
        return r && r.value ? JSON.parse(r.value) : null;
      }
      if (window.localStorage) {
        const v = window.localStorage.getItem(key);
        return v ? JSON.parse(v) : null;
      }
    } catch (e) { return null; }
    return null;
  },
  async set(key, value) {
    try {
      const json = JSON.stringify(value);
      if (window.storage && window.storage.set) {
        await window.storage.set(key, json);
      } else if (window.localStorage) {
        window.localStorage.setItem(key, json);
      }
    } catch (e) { /* silently ignore quota/access errors */ }
  },
  async clear(key) {
    try {
      if (window.storage && window.storage.delete) {
        await window.storage.delete(key);
      } else if (window.localStorage) {
        window.localStorage.removeItem(key);
      }
    } catch (e) { /* ignore */ }
  }
};

      try {
        if (saved && saved.meta) setMeta(prev => ({ ...prev, ...saved.meta }));

        if (apiCfg && apiCfg.apiKey) setApiKey(apiCfg.apiKey);
        if (apiCfg && apiCfg.apiModel) setApiModel(apiCfg.apiModel);

    })();
    return () => { cancelled = true; };

  function formatSavedAt(iso) {

    try {
      const d = new Date(iso);
      const h = String(d.getHours()).padStart(2, '0');
      const m = String(d.getMinutes()).padStart(2, '0');
      const s = String(d.getSeconds()).padStart(2, '0');
      return `${h}:${m}:${s}`;
    } catch (e) { return ''; }
  }

  // Direct Claude API call (requires user-provided API key, browser-direct)
  async function callClaude(prompt, maxTokens) {
    if (!apiKey || !apiKey.trim()) {
      throw new Error('API 키가 설정되지 않았습니다. 설정에서 등록해주세요.');
    }
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey.trim(),
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: apiModel || 'claude-sonnet-4-6',
        max_tokens: maxTokens || 4096,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    if (!resp.ok) {
      let errMsg = 'API 호출 실패 (HTTP ' + resp.status + ')';
      try {
        const errJson = await resp.json();
        if (errJson.error && errJson.error.message) errMsg += ': ' + errJson.error.message;
      } catch (e) { /* no JSON body */ }
      throw new Error(errMsg);
    }
    const data = await resp.json();
    const text = (data.content || []).map(c => c.type === 'text' ? c.text : '').join('\n').trim();
    if (!text) throw new Error('빈 응답');
    // Strip outer code fence if model wrapped output in ```...```
    let cleaned = text;
    const fenceMatch = cleaned.match(/^```(?:\w+)?\s*\n([\s\S]*)\n```\s*$/);
    if (fenceMatch) cleaned = fenceMatch[1];
    return cleaned;
  }

  // AI generate for one section — calls API and fills Draft directly
  async function aiGenerateSection(section) {
    const note = (notes[section.id] || '').trim();
    if (!note) {
      showToast('먼저 러프 메모를 입력해주세요', true);
      return;
    }
    if (!apiKey.trim()) {
      showToast('API 키가 등록되지 않았습니다. 설정에서 등록해주세요.', true);
      setShowSettings(true);
      return;
    }
    setGenerating(prev => ({ ...prev, [section.id]: true }));
    try {
      const text = await callClaude(buildSectionPrompt(section, note), 2048);
      setDrafts(prev => ({ ...prev, [section.id]: text }));
      showToast('✓ 초안 생성 완료');
    } catch (e) {
      showToast('생성 실패: ' + e.message, true);
    } finally {
      setGenerating(prev => ({ ...prev, [section.id]: false }));
    }
  }

  async function downloadWord() {
    if (!window.docx || !window.saveAs) {
      showToast('라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요.', true);
      return;
    }
    
    const {
      Document, Paragraph, TextRun, HeadingLevel, AlignmentType,
      Packer, Table, TableRow, TableCell, WidthType, BorderStyle,
      LevelFormat, convertInchesToTwip
    } = window.docx;
    
    const FONT = '맑은 고딕';
    const children = [];

    // === [개정 이력 (Revision History)] ===
    children.push(new Paragraph({
      children: [new TextRun({ text: '개정 이력', font: FONT, size: 32, bold: true, color: '1A1D24' })],
      alignment: AlignmentType.CENTER,
      spacing: { before: 200, after: 320 }
    }));

    // Revision history table - shows current entry + empty rows for future revisions
    const revYy = String(new Date(meta.date || Date.now()).getFullYear()).slice(-2);
    const revMm = String(new Date(meta.date || Date.now()).getMonth() + 1).padStart(2, '0');
    const revDd = String(new Date(meta.date || Date.now()).getDate()).padStart(2, '0');
    const revDate = `${revYy}.${revMm}.${revDd}`;

    const revHeader = ['NO.', '변경일자', '변경사유', '변경내용', '작성자', '검토자'];
    const revRowsData = [
      ['1', revDate, '신규작성', '신규작성', meta.author || '', ''],
    ];
    // Add empty rows for future revisions (matches template: ~15 empty rows)
    for (let i = 2; i <= 16; i++) {
      revRowsData.push([String(i), '', '', '', '', '']);
    }

    const revColWidths = [700, 1200, 1500, 3200, 1300, 1100];
    const revMakeRow = (cells, isHeader) => new TableRow({
      tableHeader: isHeader,
      children: cells.map((c, i) => new TableCell({
        width: { size: revColWidths[i], type: WidthType.DXA },
        shading: isHeader ? { fill: 'EDE7D8', type: 'clear' } : undefined,
        margins: { top: 80, bottom: 80, left: 100, right: 100 },
        children: [new Paragraph({
          children: [new TextRun({ text: c, font: FONT, size: 16, bold: !!isHeader })],
          alignment: i === 0 ? AlignmentType.CENTER : AlignmentType.LEFT
        })]
      }))
    });

    children.push(new Table({
      rows: [revMakeRow(revHeader, true), ...revRowsData.map(r => revMakeRow(r, false))],
      columnWidths: revColWidths,
      width: { size: 9000, type: WidthType.DXA },
      borders: {
        top:    { style: BorderStyle.SINGLE, size: 6, color: '888888' },

    headerTableRows.push(new TableRow({
      cantSplit: true,

    // [6] 작성자 — nested 1-row × 6-col (PI label/value | 컨설턴트 label/value | 개발자 label/value)
    const authorNested = new Table({
      rows: [new TableRow({
        children: [
          new TableCell({ width: { size: 900,  type: WidthType.DXA }, shading: { fill: 'F5F0E2', type: 'clear' }, margins: { top: 60, bottom: 60, left: 80, right: 80 }, children: [para('PI', { align: AlignmentType.CENTER, bold: true, size: 16 })] }),
          new TableCell({ width: { size: 1600, type: WidthType.DXA }, margins: { top: 60, bottom: 60, left: 80, right: 80 }, children: [para(meta.pi || '', { size: 16 })] }),
          new TableCell({ width: { size: 1200, type: WidthType.DXA }, shading: { fill: 'F5F0E2', type: 'clear' }, margins: { top: 60, bottom: 60, left: 80, right: 80 }, children: [para('컨설턴트', { align: AlignmentType.CENTER, bold: true, size: 16 })] }),
          new TableCell({ width: { size: 1600, type: WidthType.DXA }, margins: { top: 60, bottom: 60, left: 80, right: 80 }, children: [para(meta.author || '', { size: 16 })] }),
          new TableCell({ width: { size: 900,  type: WidthType.DXA }, shading: { fill: 'F5F0E2', type: 'clear' }, margins: { top: 60, bottom: 60, left: 80, right: 80 }, children: [para('개발자', { align: AlignmentType.CENTER, bold: true, size: 16 })] }),
          new TableCell({ width: { size: 1300, type: WidthType.DXA }, margins: { top: 60, bottom: 60, left: 80, right: 80 }, children: [para(meta.developer || '', { size: 16 })] }),
        ]
      })],
      columnWidths: [900, 1600, 1200, 1600, 900, 1300],
      width: { size: META_VALUE_W, type: WidthType.DXA },
      borders: nestedBorders
    });
    headerTableRows.push(new TableRow({
      cantSplit: true,
      children: [
        metaLabel('작성자'),
        new TableCell({
          width: { size: META_VALUE_W, type: WidthType.DXA },
          margins: { top: 0, bottom: 0, left: 0, right: 0 },
          children: [authorNested, new Paragraph({ children: [] })]
        })
      ]
    }));

    // [7] Type(RICEF) — nested 3-row × 3-col
    const ricefItems = [
      ['(    ) Form',      '(    ) Report',    '(    ) Interface'],
      ['(    ) Migration', '(    ) User-Exit', '(    ) Function'],
      ['(    ) On-Line',   '(    )',           '(    )'],
    ];
    const ricefNested = new Table({
      rows: ricefItems.map(row => new TableRow({

          width: { size: 2500, type: WidthType.DXA },
          margins: { top: 50, bottom: 50, left: 100, right: 100 },
          children: [para(item, { size: 16 })]
        }))
      })),
      columnWidths: [2500, 2500, 2500],
      width: { size: META_VALUE_W, type: WidthType.DXA },
      borders: nestedBorders
    });
    headerTableRows.push(new TableRow({
      cantSplit: true,
      children: [
        metaLabel('Type(RICEF)'),
        new TableCell({
          width: { size: META_VALUE_W, type: WidthType.DXA },
          margins: { top: 0, bottom: 0, left: 0, right: 0 },
          children: [ricefNested, new Paragraph({ children: [] })]
        })
      ]
    }));

    children.push(new Table({
      rows: headerTableRows,
      columnWidths: [META_LABEL_W, META_VALUE_W],
      width: { size: META_TOTAL_W, type: WidthType.DXA },
      borders: {
        top:    { style: BorderStyle.SINGLE, size: 8, color: '444444' },
        bottom: { style: BorderStyle.SINGLE, size: 8, color: '444444' },
        left:   { style: BorderStyle.SINGLE, size: 6, color: '444444' },
        right:  { style: BorderStyle.SINGLE, size: 6, color: '444444' },
        insideHorizontal: { style: BorderStyle.SINGLE, size: 4, color: '666666' },
        insideVertical:   { style: BorderStyle.SINGLE, size: 4, color: '666666' },
      }
    }));
    children.push(new Paragraph({ children: [new TextRun({ text: '' })], spacing: { after: 280 } }));

    // === [프로그램의 목적] — 양식의 큰 박스 형태로 렌더 ===
    children.push(new Paragraph({
      children: [new TextRun({ text: '프로그램의 목적', font: FONT, size: 18 })],
      spacing: { before: 200, after: 80 }
    }));

    const purposeText = (meta.programPurpose && meta.programPurpose.trim()) || '';
    const purposeContent = purposeText
      ? purposeText.split('\n').map(line => new Paragraph({
          children: [new TextRun({ text: line || ' ', font: FONT, size: 18, bold: true })],
          spacing: { after: 60 },
          indent: { left: 280 },
        }))
      : [new Paragraph({
          children: [new TextRun({ text: '■ Text', font: FONT, size: 17, italics: true, color: '8B91A2' })],
          indent: { left: 280 },
        })];

    // Modest padding so meta table + 프로그램의 목적 fits on page 2
    for (let i = 0; i < 4; i++) {
      purposeContent.push(new Paragraph({
        children: [new TextRun({ text: '', font: FONT, size: 18 })]
      }));
    }

    children.push(new Table({
      rows: [new TableRow({
        cantSplit: true,
        children: [new TableCell({
          width: { size: META_TOTAL_W, type: WidthType.DXA },
          margins: { top: 100, bottom: 100, left: 160, right: 160 },
          children: purposeContent
        })]
      })],
      columnWidths: [META_TOTAL_W],
      width: { size: META_TOTAL_W, type: WidthType.DXA },
      borders: {
        top:    { style: BorderStyle.SINGLE, size: 6, color: '444444' },
        bottom: { style: BorderStyle.SINGLE, size: 6, color: '444444' },
        left:   { style: BorderStyle.SINGLE, size: 6, color: '444444' },
        right:  { style: BorderStyle.SINGLE, size: 6, color: '444444' },
        insideHorizontal: { style: BorderStyle.NONE, size: 0, color: 'FFFFFF' },
        insideVertical:   { style: BorderStyle.NONE, size: 0, color: 'FFFFFF' },
      }
    }));

    // === [<개발 요건 정의>] — 새 페이지에서 시작 ===
    children.push(new Paragraph({
      pageBreakBefore: true,
      children: [new TextRun({ text: '< 개발 요건 정의 >', font: FONT, size: 24, bold: true, italics: true, color: '7A4A22' })],
      alignment: AlignmentType.LEFT,
      spacing: { before: 0, after: 240 }
    }));

    // Helper: parse content to paragraphs
    function contentToParagraphs(text) {
      // 외곽 ``` 래퍼 자동 제거 (AI가 출력 전체를 코드블록으로 감쌌을 때 대응)
      // 예: "```\n# 1. 섹션\n...\n```" → "# 1. 섹션\n..."
      let cleaned = (text || '').trim();
      {
        const tmpLines = cleaned.split('\n');
        if (tmpLines.length >= 2) {
          const first = tmpLines[0].trim();
          const last = tmpLines[tmpLines.length - 1].trim();
          if (/^`{3,}(\w+)?$/.test(first) && /^`{3,}$/.test(last)) {
            cleaned = tmpLines.slice(1, -1).join('\n');
          }
        }
      }

      const out = [];
      const lines = cleaned.split('\n');
      const MONO = 'Consolas';
      
      let state = 'NORMAL';  // NORMAL | IN_CODE | IN_TABLE
      let codeBuffer = [];
      let tableBuffer = [];

      // Parse cells from a markdown table row: "| a | b | c |" → ['a','b','c']
      function parseCells(line) {
        const parts = line.split('|');
        if (parts.length > 0 && parts[0].trim() === '') parts.shift();
        if (parts.length > 0 && parts[parts.length - 1].trim() === '') parts.pop();
        return parts.map(p => p.trim());
      }

      // Inline parser: **bold**, `code`, and plain text → array of TextRun
      function makeRuns(s, baseOpts) {
        const opts = baseOpts || { font: FONT, size: 20 };
        const runs = [];
        let i = 0;
        let buf = '';
        const pushBuf = () => {
          if (buf) { runs.push(new TextRun(Object.assign({}, opts, { text: buf }))); buf = ''; }
        };
        while (i < s.length) {
          if (s[i] === '*' && s[i+1] === '*') {
            const end = s.indexOf('**', i + 2);
            if (end !== -1) {
              pushBuf();
              runs.push(new TextRun(Object.assign({}, opts, { text: s.substring(i + 2, end), bold: true })));
              i = end + 2;
              continue;
            }
          }
          if (s[i] === '`') {
            const end = s.indexOf('`', i + 1);
            if (end !== -1) {
              pushBuf();
              runs.push(new TextRun({ text: s.substring(i + 1, end), font: MONO, size: 18, color: '7A4A22' }));
              i = end + 1;
              continue;
            }
          }
          buf += s[i];
          i++;
        }
        pushBuf();
        return runs.length ? runs : [new TextRun(Object.assign({}, opts, { text: '' }))];
      }

      function flushCode() {
        if (codeBuffer.length === 0) return;
        codeBuffer.forEach(ln => {
          out.push(new Paragraph({
            children: [new TextRun({ text: ln || ' ', font: MONO, size: 18, color: '3A4050' })],
            spacing: { after: 40, line: 280 },
            indent: { left: 360 },
            shading: { fill: 'F2EDE2' }
          }));
        });
        out.push(new Paragraph({ children: [new TextRun({ text: '', size: 4 })], spacing: { after: 120 } }));
        codeBuffer = [];
      }

      function flushTable() {
        if (tableBuffer.length === 0) return;

        const headerCells = parseCells(tableBuffer[0]);
        // Skip separator row if present (e.g. | --- | --- |)
        const dataStartIdx = (tableBuffer.length > 1 && /^[\s\-:|]+$/.test(tableBuffer[1])) ? 2 : 1;
        const dataLines = tableBuffer.slice(dataStartIdx);

        const colCount = headerCells.length;
        if (colCount === 0) { tableBuffer = []; return; }

        // Use DXA (twips) for reliable width. 9000 twips ≈ 6.25" fits standard page.
        const TOTAL_WIDTH = 9000;
        const colWidth = Math.floor(TOTAL_WIDTH / colCount);
        const columnWidths = Array(colCount).fill(colWidth);

        const makeRow = (cells, isHeader) => {
          const padded = cells.slice();
          while (padded.length < colCount) padded.push('');
          return new TableRow({
            tableHeader: isHeader,
            children: padded.slice(0, colCount).map(c => new TableCell({
              width: { size: colWidth, type: WidthType.DXA },
              margins: { top: 100, bottom: 100, left: 120, right: 120 },
              shading: isHeader ? { fill: 'EDE7D8' } : undefined,
              children: [new Paragraph({
                children: makeRuns(c, { font: FONT, size: 18, bold: !!isHeader })
              })]
            }))
          });
        };

        const rows = [makeRow(headerCells, true)];
        dataLines.forEach(dl => {
          const cells = parseCells(dl);
          rows.push(makeRow(cells, false));
        });

        out.push(new Table({
          rows: rows,
          columnWidths: columnWidths,
          width: { size: TOTAL_WIDTH, type: WidthType.DXA },
          borders: {
            top:    { style: BorderStyle.SINGLE, size: 8, color: '8B7A5E' },
            bottom: { style: BorderStyle.SINGLE, size: 8, color: '8B7A5E' },
            left:   { style: BorderStyle.SINGLE, size: 4, color: 'C19A6B' },
            right:  { style: BorderStyle.SINGLE, size: 4, color: 'C19A6B' },
            insideHorizontal: { style: BorderStyle.SINGLE, size: 4, color: 'C19A6B' },
            insideVertical:   { style: BorderStyle.SINGLE, size: 4, color: 'C19A6B' },
          }
        }));
        out.push(new Paragraph({ children: [new TextRun({ text: '', size: 4 })], spacing: { after: 160 } }));
        tableBuffer = [];
      }

      for (const rawLine of lines) {
        const line = rawLine.replace(/\r$/, '');
        const trimmed = line.trim();

        // ``` toggle for code block
        if (trimmed.startsWith('```')) {
          if (state === 'IN_CODE') {
            flushCode();
            state = 'NORMAL';
          } else {
            if (state === 'IN_TABLE') { flushTable(); }
            state = 'IN_CODE';
          }
          continue;
        }

        // Inside code block
        if (state === 'IN_CODE') {
          codeBuffer.push(line);
          continue;
        }

        // Table line?
        if (trimmed.startsWith('|') && trimmed.endsWith('|') && trimmed.length > 1) {
          state = 'IN_TABLE';
          tableBuffer.push(trimmed);
          continue;
        }

        // Exit table state on non-table line
        if (state === 'IN_TABLE') {
          flushTable();
          state = 'NORMAL';
        }

        // Empty line
        if (!trimmed) {
          out.push(new Paragraph({
            children: [new TextRun({ text: '', size: 4 })],
            spacing: { after: 80 }
          }));
          continue;
        }

        // Section label: [3.3.1 ...] or [Label] style
        if (/^\[[^\]]+\]$/.test(trimmed) && trimmed.length < 80 && !/명세\s*필요/.test(trimmed)) {
          const cleanText = trimmed.replace(/^\[|\]$/g, '');
          out.push(new Paragraph({
            children: [new TextRun({
              text: cleanText, font: FONT, size: 22, bold: true, color: '4A5060'
            })],
            spacing: { before: 240, after: 140 },
            border: {
              bottom: { style: BorderStyle.SINGLE, size: 4, color: 'C19A6B', space: 4 }
            }
          }));
          continue;
        }

        // Markdown header: ## or ###
        if (/^#{1,3}\s+/.test(trimmed)) {
          const level = (trimmed.match(/^#+/) || [''])[0].length;
          const txt = trimmed.replace(/^#+\s+/, '');
          out.push(new Paragraph({
            children: [new TextRun({
              text: txt, font: FONT,
              size: level === 1 ? 26 : (level === 2 ? 22 : 20),
              bold: true,
              color: level === 1 ? '1A1D24' : '4A5060'
            })],
            spacing: { before: 240, after: 140 }
          }));
          continue;
        }

        // Bullet
        if (/^[-•*]\s+/.test(trimmed)) {
          const content = trimmed.replace(/^[-•*]\s+/, '');
          out.push(new Paragraph({
            children: makeRuns(content),
            bullet: { level: 0 },
            spacing: { after: 80 }
          }));
          continue;
        }

        // Sub-bullet (indented bullet)
        const subBulletMatch = line.match(/^(\s+)[-•*]\s+(.*)$/);
        if (subBulletMatch) {
          const depth = Math.min(2, Math.floor(subBulletMatch[1].length / 2));
          out.push(new Paragraph({
            children: makeRuns(subBulletMatch[2]),
            bullet: { level: depth },
            spacing: { after: 60 }
          }));
          continue;
        }

        // Numbered list
        if (/^\d+\.\s+/.test(trimmed)) {
          out.push(new Paragraph({
            children: makeRuns(trimmed),
            indent: { left: 360 },
            spacing: { after: 80 }
          }));
          continue;
        }

        // Indented (preserve indent level for sub-content)
        const leadingSpaces = line.length - line.trimStart().length;
        if (leadingSpaces > 0 && trimmed) {
          const indentLevel = Math.min(3, Math.floor(leadingSpaces / 2));
          out.push(new Paragraph({
            children: makeRuns(trimmed),
            indent: { left: 360 + indentLevel * 240 },
            spacing: { after: 70 }
          }));
          continue;
        }

        // Normal paragraph
        out.push(new Paragraph({
          children: makeRuns(line),
          spacing: { after: 100 }
        }));
      }

      // Flush remainders
      if (state === 'IN_CODE') flushCode();
      if (state === 'IN_TABLE') flushTable();

      return out;
    }

    // Body content — always uses fullDraft (the new model is checkbox + memo → AI → fullDraft)
    const content = (fullDraft || '').trim();
    if (content) {
      contentToParagraphs(content).forEach(p => children.push(p));
    } else {
      children.push(new Paragraph({
        children: [new TextRun({ text: '[작성 필요 — 말스펙 작성 탭에서 메모 입력 후 AI 작성을 눌러주세요]', font: FONT, size: 18, italics: true, color: '8B91A2' })],
      }));
    }
    
    const doc = new Document({
      styles: {
        default: {
          document: { run: { font: FONT, size: 20 } }
        }
      },
      sections: [{
        properties: { page: { margin: { top: 1200, right: 1080, bottom: 1200, left: 1080 } } },
        children: children
      }]
    });
    
    try {
      const blob = await Packer.toBlob(doc);
      // Filename format: 개발요청서(FS-TS통합)_{모듈약어}_{프로그램ID}_{프로그램명}_v{버전}_{yymmdd}.docx
      const safeName = (s) => (s || '').toString().trim().replace(/[\\/:*?"<>|]/g, '').replace(/\s+/g, '_');
      const now = new Date();
      const yy = String(now.getFullYear()).slice(-2);
      const mm = String(now.getMonth() + 1).padStart(2, '0');
      const dd = String(now.getDate()).padStart(2, '0');
      const yymmdd = yy + mm + dd;
      const abbrev = currentDomain.abbrev || 'XX';
      const pid = safeName(meta.programId) || 'noID';
      const pname = safeName(meta.programName) || 'untitled';
      const ver = safeName(meta.version) || '0.1';
      const filename = `개발요청서(FS-TS통합)_${abbrev}_${pid}_${pname}_v${ver}_${yymmdd}.docx`;
      window.saveAs(blob, filename);

      // 다운로드 후 자동 리셋: 메모 + 체크박스 초기화 (fullDraft, 메타는 보존)
      setFullNote('');
      const resetChecks = {};
      SECTIONS.filter(s => s.level > 0).forEach(s => { resetChecks[s.id] = true; });
      setSectionChecks(resetChecks);

      showToast('✓ Word 다운로드 완료 — 메모/체크 리셋됨 (Draft·메타 보존)');
    } catch (e) {
      showToast('Word 생성 실패: ' + e.message, true);
    }
  }

  return (
    <div className="app">

        <div className="eyebrow">SAP · Functional Specification</div>
        <h1 className="title" style={{ color: '#3A3F48', display: 'flex', alignItems: 'center', gap: 4 }}>
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"
               style={{ width: 60, height: 60, flexShrink: 0 }}>
            {/* Mane (back, flowing) */}
            <path d="M 22 28 Q 8 35, 10 60 Q 16 78, 32 72 L 38 50 Z" fill="#B5651D"/>
            {/* Head main body (side profile, facing right) */}
            <path d="M 32 25 L 38 8 L 44 22 Q 55 18, 65 24 Q 78 30, 85 42 Q 87 48, 84 52 L 82 56 Q 79 54, 76 58 L 78 66 Q 84 70, 78 74 Q 65 76, 55 73 Q 40 70, 32 60 Q 26 45, 32 25 Z" fill="#E67E22"/>
            {/* Inner ear */}
            <path d="M 36 10 L 40 20 L 38 16 Z" fill="#A05818"/>
            {/* Forelock tuft on forehead */}
            <path d="M 42 18 Q 40 14, 44 14 Q 46 16, 48 14 Q 47 19, 45 22 Z" fill="#B5651D"/>
            {/* Eye - squinting (mid-neigh) */}
            <path d="M 48 32 Q 52 29, 56 32" stroke="#2D1810" strokeWidth="2.5" fill="none" strokeLinecap="round"/>
            {/* Open mouth dark cavity */}
            <ellipse cx="79" cy="63" rx="5" ry="6" fill="#3D1F10"/>
            {/* Top teeth */}
            <rect x="74" y="59" width="9" height="3" fill="#FDFBF6"/>
            {/* Bottom teeth */}
            <rect x="74" y="66" width="9" height="2.5" fill="#FDFBF6"/>
            {/* Tongue */}
            <ellipse cx="79" cy="65" rx="2.5" ry="1.5" fill="#D55858"/>
            {/* Nostril (flared) */}
            <ellipse cx="82" cy="48" rx="2.2" ry="1.6" fill="#3D1F10"/>
            {/* Sound waves indicating neigh */}
            <path d="M 90 55 Q 94 55, 94 60" stroke="#E67E22" strokeWidth="1.8" fill="none" strokeLinecap="round" opacity="0.7"/>
            <path d="M 92 47 Q 97 47, 97 52" stroke="#E67E22" strokeWidth="1.5" fill="none" strokeLinecap="round" opacity="0.5"/>
          </svg>
          <span>
            말<span style={{ fontSize: '0.5em', verticalAlign: '0.3em', color: '#E67E22' }}>스</span>펙
            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: '0.5em', fontWeight: 400, color: '#3A3F48', letterSpacing: '0.05em', marginLeft: 14, verticalAlign: 'middle' }}>
              MAL<span style={{ color: '#E67E22', fontSize: '0.7em' }}>s</span>PEC<span style={{ marginLeft: 6, color: 'var(--ink-muted)' }}>_v0.2</span>
            </span>
          </span>
        </h1>
        <p className="subtitle">러프 메모를 넣고 AI 초안 → 다듬어 Word로 출력합니다</p>
      </div>

      <div className="domain-picker">
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
          <div className="domain-picker-label">시스템 선택</div>
          <button
            className="btn btn-ghost"
            onClick={() => setShowSettings(!showSettings)}
            style={{ fontSize: 11, padding: '4px 10px' }}
          >
            {apiKey ? '⚙️ API 설정' : '⚙️ AI 자동화 설정'}{apiKey && <span style={{ color: 'var(--success)', marginLeft: 6 }}>●</span>}
          </button>
        </div>
        <div className="domain-chips">
          {DOMAINS.map(d => (

      {showSettings && (
        <div className="settings-panel">
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 14 }}>

            <button className="btn btn-ghost" onClick={() => setShowSettings(false)} style={{ fontSize: 11, padding: '4px 8px' }}>닫기</button>

          <span>Draft <strong>{fullDraft.trim() ? '있음' : '비어있음'}</strong></span>
          {savedAt && (
            <span style={{ opacity: 0.7 }}>· 저장됨 <strong>{formatSavedAt(savedAt)}</strong></span>
          )}
        </div>
        <div className="toolbar-actions">
          <button className="btn btn-ghost" onClick={clearFsContent} style={{ color: '#E8DCC8', borderColor: '#5A5A5A' }} title="메타 정보는 유지하고 모든 섹션의 메모/Draft만 삭제">🗑 FS 내용만 지우기</button>
          <button className="btn btn-ghost" onClick={resetAll} style={{ color: '#E8DCC8', borderColor: '#5A5A5A' }}>전체 초기화</button>
          <button className="btn btn-download" onClick={downloadWord}>↓ Word 다운로드</button>
        </div>
      </div>

      {toast && (
        <div className={'toast' + (toast.isError ? ' error' : '')}>{toast.msg}</div>
      )}
    </div>
  );
}

// ============================================
// 비밀번호 게이트 (Password Gate)
// ============================================
// 비밀번호를 바꾸려면:
//   1. 새 비밀번호를 정한다 (예: "myNewPassword2026")
//   2. 터미널에서:  echo -n "myNewPassword2026" | sha256sum
//   3. 출력된 해시값을 아래 PASSWORD_HASH 에 붙여넣기
// 현재 비번: malspec2025
const PASSWORD_HASH = '34b312c1c7abc91f777d299bd9f205362ef26409e3e75248792437dafeedebc0';

async function sha256(text) {
  // 우선 native crypto.subtle 사용 (HTTPS 환경)
  if (typeof crypto !== 'undefined' && crypto.subtle && crypto.subtle.digest) {
    try {
      const buffer = new TextEncoder().encode(text);
      const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
      return Array.from(new Uint8Array(hashBuffer))
        .map(b => b.toString(16).padStart(2, '0'))
        .join('');
    } catch (e) {
      console.warn('crypto.subtle failed, falling back to pure JS:', e);
    }
  }
  // 폴백: 순수 JS SHA-256 (HTTP/iOS Safari 등 secure context 아닐 때)
  return sha256Pure(text);
}

// Pure JS SHA-256 (ASCII 입력 가정 — 비밀번호 용도)
function sha256Pure(ascii) {
  function rightRotate(value, amount) { return (value >>> amount) | (value << (32 - amount)); }
  const mathPow = Math.pow;
  const maxWord = mathPow(2, 32);
  let i, j, result = '';
  const words = [];
  const asciiBitLength = ascii.length * 8;
  let hash = sha256Pure.h = sha256Pure.h || [];
  const k = sha256Pure.k = sha256Pure.k || [];
  let primeCounter = k.length;
  const isComposite = {};
  for (let candidate = 2; primeCounter < 64; candidate++) {
    if (!isComposite[candidate]) {
      for (i = 0; i < 313; i += candidate) isComposite[i] = candidate;
      hash[primeCounter] = (mathPow(candidate, 0.5) * maxWord) | 0;
      k[primeCounter++] = (mathPow(candidate, 1/3) * maxWord) | 0;
    }
  }
  ascii += '\x80';
  while (ascii.length % 64 - 56) ascii += '\x00';
  for (i = 0; i < ascii.length; i++) {
    j = ascii.charCodeAt(i);
    if (j >> 8) return null; // non-ASCII (한글 등) — 비번엔 ASCII 권장
    words[i >> 2] |= j << ((3 - i) % 4) * 8;
  }
  words[words.length] = ((asciiBitLength / maxWord) | 0);
  words[words.length] = (asciiBitLength);
  for (j = 0; j < words.length;) {
    const w = words.slice(j, j += 16);
    const oldHash = hash;
    hash = hash.slice(0, 8);
    for (i = 0; i < 64; i++) {
      const w15 = w[i - 15], w2 = w[i - 2];
      const a = hash[0], e = hash[4];
      const temp1 = hash[7]
        + (rightRotate(e, 6) ^ rightRotate(e, 11) ^ rightRotate(e, 25))
        + ((e & hash[5]) ^ ((~e) & hash[6]))
        + k[i]
        + (w[i] = (i < 16) ? w[i] : (
          w[i - 16]
          + (rightRotate(w15, 7) ^ rightRotate(w15, 18) ^ (w15 >>> 3))
          + w[i - 7]
          + (rightRotate(w2, 17) ^ rightRotate(w2, 19) ^ (w2 >>> 10))
        ) | 0);
      const temp2 = (rightRotate(a, 2) ^ rightRotate(a, 13) ^ rightRotate(a, 22))
        + ((a & hash[1]) ^ (a & hash[2]) ^ (hash[1] & hash[2]));
      hash = [(temp1 + temp2) | 0].concat(hash);
      hash[4] = (hash[4] + temp1) | 0;
    }
    for (i = 0; i < 8; i++) hash[i] = (hash[i] + oldHash[i]) | 0;
  }
  for (i = 0; i < 8; i++) {
    for (j = 3; j + 1; j--) {
      const b = (hash[i] >> (j * 8)) & 255;
      result += ((b < 16) ? 0 : '') + b.toString(16);
    }
  }
  return result;
}

function Gate({ onUnlock }) {
  const [pw, setPw] = useState('');
  const [error, setError] = useState('');
  const [checking, setChecking] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => {
    if (inputRef.current) inputRef.current.focus();
  }, []);

  async function trySubmit(e) {
    if (e) e.preventDefault();
    if (!pw || checking) return;
    setChecking(true);
    setError('');
    try {
      const hash = await sha256(pw);
      if (!hash) {
        setError('해시 계산 실패 (비밀번호에 ASCII 외 문자 포함됨)');
        return;
      }
      if (hash === PASSWORD_HASH) {
        try { sessionStorage.setItem('malspec_unlocked', '1'); } catch (e) { /* ignore */ }
        onUnlock();
      } else {
        setError('비밀번호가 틀렸습니다');
        setPw('');
        if (inputRef.current) inputRef.current.focus();
      }
    } catch (err) {
      console.error('Gate error:', err);
      setError('오류: ' + (err.message || String(err)));
    } finally {
      setChecking(false);
    }
  }

  return (
    <div className="gate">
      <div className="gate-card">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"
             style={{ width: 72, height: 72, marginBottom: 4 }}>
          <path d="M 22 28 Q 8 35, 10 60 Q 16 78, 32 72 L 38 50 Z" fill="#B5651D"/>
          <path d="M 32 25 L 38 8 L 44 22 Q 55 18, 65 24 Q 78 30, 85 42 Q 87 48, 84 52 L 82 56 Q 79 54, 76 58 L 78 66 Q 84 70, 78 74 Q 65 76, 55 73 Q 40 70, 32 60 Q 26 45, 32 25 Z" fill="#E67E22"/>
          <path d="M 36 10 L 40 20 L 38 16 Z" fill="#A05818"/>
          <path d="M 42 18 Q 40 14, 44 14 Q 46 16, 48 14 Q 47 19, 45 22 Z" fill="#B5651D"/>
          <path d="M 48 32 Q 52 29, 56 32" stroke="#2D1810" strokeWidth="2.5" fill="none" strokeLinecap="round"/>
          <ellipse cx="79" cy="63" rx="5" ry="6" fill="#3D1F10"/>
          <rect x="74" y="59" width="9" height="3" fill="#FDFBF6"/>
          <rect x="74" y="66" width="9" height="2.5" fill="#FDFBF6"/>
          <ellipse cx="79" cy="65" rx="2.5" ry="1.5" fill="#D55858"/>
          <ellipse cx="82" cy="48" rx="2.2" ry="1.6" fill="#3D1F10"/>
        </svg>
        <div className="gate-title">
          말<span style={{ fontSize: '0.5em', verticalAlign: '0.3em', color: '#E67E22' }}>스</span>펙
        </div>
        <div className="gate-subtitle">
          MAL<span style={{ color: '#E67E22' }}>s</span>PEC · 비밀번호를 입력하세요
        </div>
        <form onSubmit={trySubmit}>
          <input
            ref={inputRef}
            type="password"
            className="gate-input"
            value={pw}
            onChange={e => setPw(e.target.value)}
            placeholder="비밀번호"
            disabled={checking}
            autoComplete="current-password"
          />
          <button
            type="submit"
            className="gate-btn"
            disabled={!pw || checking}
          >
            {checking ? '확인 중...' : '입장'}
          </button>
        </form>
        {error && <div className="gate-error">{error}</div>}
        <div className="gate-footer">
          접근 권한이 필요하면 관리자에게 문의하세요.
        </div>
      </div>
    </div>
  );
}

function Root() {
  const [unlocked, setUnlocked] = useState(false);
  const [checked, setChecked] = useState(false);

  useEffect(() => {
    try {
      if (sessionStorage.getItem('malspec_unlocked') === '1') setUnlocked(true);
    } catch (e) { /* ignore */ }
    setChecked(true);
  }, []);

  if (!checked) return null;
  if (!unlocked) return <Gate onUnlock={() => setUnlocked(true)} />;
  return <App />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
