            <strong style={{ color: 'var(--ink-soft)' }}>💡 운영 팁</strong><br />
            · 회원 계정 완전 삭제는 <strong>Supabase Dashboard → Authentication → Users</strong> 에서 직접 처리해주세요<br />
            · CSV 다운로드는 현재 필터된 결과만 받습니다 (미팅·영업 자료용)<br />
            · 부적절한 글·댓글은 해당 게시판에서 직접 삭제 가능합니다 (관리자는 모든 글 삭제 권한)
          </div>
        </div>
      )}
    </div>
  );
}

// ===== 자유게시판 컴포넌트 =====
function BoardPage({ user, profile, isLoggedIn, onGoLogin }) {
  const [mode, setMode] = useState('list'); // 'list' | 'write' | 'detail' | 'edit'
  const [posts, setPosts] = useState([]);
  const [selectedPost, setSelectedPost] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState('');
  const [searchQuery, setSearchQuery] = useState('');

  // 좋아요·북마크
  const [likes, setLikes] = useState({}); // {postId: count}
  const [myLikes, setMyLikes] = useState(new Set()); // 내가 좋아요 한 postIds
  const [myBookmarks, setMyBookmarks] = useState(new Set());

  // Write/Edit
  const [writeTitle, setWriteTitle] = useState('');
  const [writeContent, setWriteContent] = useState('');
  const [submitting, setSubmitting] = useState(false);
  const [uploadingImage, setUploadingImage] = useState(false);
  const fileInputRef = useRef(null);

  // Detail
  const [comments, setComments] = useState([]);
  const [newComment, setNewComment] = useState('');
  const [commentSubmitting, setCommentSubmitting] = useState(false);

  useEffect(() => {
    if (mode === 'list') loadPosts();
  }, [mode]);

  async function loadPosts() {
    if (!supabase) { setLoading(false); return; }
    setLoading(true);
    setError('');

    // 안전장치: 30초 타임아웃
    const timeoutId = setTimeout(() => {
      console.warn('[Board] loadPosts 타임아웃');
      setError('로딩 시간 초과. 잠시 후 새로고침해주세요.');
      setLoading(false);
    }, 30000);

    try {
      console.log('[Board] loadPosts 시작 (raw fetch)');

      // 1. posts 가져오기 (raw fetch — Supabase JS SDK 우회)
      const postsData = await rawSupabaseFetch('posts?select=*&order=is_notice.desc,created_at.desc&limit=50');
      console.log('[Board] posts:', postsData?.length || 0);

      // 성공 시 이전 에러 제거
      setError('');

      if (!postsData || postsData.length === 0) {
        setPosts([]);
        return;
      }

      const postIds = postsData.map(p => p.id);
      const authorIds = [...new Set(postsData.map(p => p.author_id).filter(Boolean))];

      // 2. 나머지 쿼리 병렬 (raw fetch)
      const [profilesData, commentsData, likesData, bmData] = await Promise.all([
        authorIds.length > 0
          ? rawSupabaseFetch(`profiles?select=*&id=in.(${authorIds.join(',')})`).catch(() => [])
          : Promise.resolve([]),
        rawSupabaseFetch(`comments?select=post_id&post_id=in.(${postIds.join(',')})`).catch(() => []),
        rawSupabaseFetch(`post_likes?select=post_id,user_id&post_id=in.(${postIds.join(',')})`).catch(() => []),
        user
          ? rawSupabaseFetch(`post_bookmarks?select=post_id&user_id=eq.${user.id}`).catch(() => [])
          : Promise.resolve([]),
      ]);

      // 프로필 매핑
      const profileMap = {};
      (profilesData || []).forEach(p => { profileMap[p.id] = p; });

      // 댓글 카운트
      const commentCounts = {};
      (commentsData || []).forEach(c => {
        commentCounts[c.post_id] = (commentCounts[c.post_id] || 0) + 1;
      });

      // 좋아요 + 내 좋아요
      const likeCounts = {};
      const mine = new Set();
      (likesData || []).forEach(l => {
        likeCounts[l.post_id] = (likeCounts[l.post_id] || 0) + 1;
        if (user && l.user_id === user.id) mine.add(l.post_id);
      });
      setLikes(likeCounts);
      setMyLikes(mine);

      // 북마크
      setMyBookmarks(new Set((bmData || []).map(b => b.post_id)));

      const enriched = postsData.map(p => ({
        ...p,
        author: profileMap[p.author_id] || null,
        comment_count: commentCounts[p.id] || 0,
      }));
      setPosts(enriched);
      console.log('[Board] 완료');
    } catch (e) {
      console.error('[Board] loadPosts 실패:', e);
      setError('글 목록 불러오기 실패: ' + e.message);
    } finally {
      clearTimeout(timeoutId);
      setLoading(false);
    }
  }

  async function loadComments(postId) {
    if (!supabase) return;
    try {
      const { data, error } = await supabase
        .from('comments')
        .select('*')
        .eq('post_id', postId)
        .order('created_at', { ascending: true });
      if (error) throw error;
      const commentsData = data || [];
      // 작성자 프로필 일괄
      const authorIds = [...new Set(commentsData.map(c => c.author_id).filter(Boolean))];
      const profileMap = {};
      if (authorIds.length > 0) {
        const { data: profilesData } = await supabase
          .from('profiles').select('*').in('id', authorIds);
        (profilesData || []).forEach(p => { profileMap[p.id] = p; });
      }
      setComments(commentsData.map(c => ({ ...c, author: profileMap[c.author_id] || null })));
    } catch (e) { console.warn('댓글 로드 실패:', e); }
  }

  async function openPost(post) {
    setSelectedPost(post);
    setMode('detail');
    setComments([]);
    loadComments(post.id);
    // 작성자 정보 없으면 가져오기
    if (!post.author && post.author_id) {
      try {
        const { data } = await supabase.from('profiles').select('*').eq('id', post.author_id).single();
        if (data) setSelectedPost(prev => prev && prev.id === post.id ? { ...prev, author: data } : prev);
      } catch (e) { /* ignore */ }
    }
    // 조회수 증가
    try {
      await supabase.from('posts').update({ view_count: (post.view_count || 0) + 1 }).eq('id', post.id);
    } catch (e) { /* ignore */ }
  }

  async function submitPost() {
    if (!writeTitle.trim()) { setError('제목을 입력해주세요'); return; }
    if (!writeContent.trim()) { setError('내용을 입력해주세요'); return; }
    setSubmitting(true);
    setError('');
    const safetyTimer = setTimeout(() => {
      console.warn('[Board] submitPost 타임아웃');
      setError('💾 작성 내용은 자동 저장돼 있어요. 잠시 후 "글쓰기" 버튼 다시 누르면 이어서 작성 가능합니다.');
      setSubmitting(false);
    }, 30000);
    try {
      console.log('[Board] submitPost 시작', mode);
      if (mode === 'edit' && selectedPost) {
        const { error } = await safeWrite('posts', 'update',
          { title: writeTitle.trim(), content: writeContent.trim(), updated_at: new Date().toISOString() },
          { eq: { id: selectedPost.id } }
        );
        if (error) throw error;
      } else {
        const { error } = await safeWrite('posts', 'insert',
          { author_id: user.id, title: writeTitle.trim(), content: writeContent.trim() }
        );
        if (error) throw error;
      }
      console.log('[Board] submitPost 완료');
      // 작성 완료 — 임시 저장 제거
      try { localStorage.removeItem('board_draft'); } catch (e) {}
      setWriteTitle(''); setWriteContent('');
      setMode('list');
    } catch (e) {
      console.error('[Board] submitPost 실패:', e);
      setError('저장 실패: ' + e.message);
    } finally {
      clearTimeout(safetyTimer);
      setSubmitting(false);
    }
  }

  async function submitComment() {
    if (!newComment.trim()) return;
    setCommentSubmitting(true);
    const safetyTimer = setTimeout(() => {
      console.warn('[Board] submitComment 타임아웃');
      setCommentSubmitting(false);
      alert('댓글 저장 시간 초과. 다시 시도해주세요.');
    }, 30000);
    try {
      const { error } = await safeWrite('comments', 'insert',
        { post_id: selectedPost.id, author_id: user.id, content: newComment.trim() }
      );
      if (error) throw error;
      setNewComment('');
      await loadComments(selectedPost.id);
    } catch (e) {
      alert('댓글 작성 실패: ' + e.message);
    } finally {
      clearTimeout(safetyTimer);
      setCommentSubmitting(false);
    }
  }

  async function deletePost(post) {
    if (!window.confirm('정말 삭제하시겠습니까?')) return;
    try {
      const { error } = await supabase.from('posts').delete().eq('id', post.id);
      if (error) throw error;
      setMode('list');
    } catch (e) { alert('삭제 실패: ' + e.message); }
  }

  async function deleteComment(comment) {
    if (!window.confirm('댓글을 삭제하시겠습니까?')) return;
    try {
      const { error } = await supabase.from('comments').delete().eq('id', comment.id);
      if (error) throw error;
      await loadComments(selectedPost.id);
    } catch (e) { alert('삭제 실패: ' + e.message); }
  }

  async function toggleLike(post) {
    if (!isLoggedIn) { onGoLogin && onGoLogin(); return; }
    const liked = myLikes.has(post.id);
    // Optimistic update
    const newMyLikes = new Set(myLikes);
    const newLikes = { ...likes };
    if (liked) {
      newMyLikes.delete(post.id);
      newLikes[post.id] = Math.max(0, (newLikes[post.id] || 0) - 1);
    } else {
      newMyLikes.add(post.id);
      newLikes[post.id] = (newLikes[post.id] || 0) + 1;
    }
    setMyLikes(newMyLikes);
    setLikes(newLikes);
    try {
      if (liked) {
        await supabase.from('post_likes').delete().eq('post_id', post.id).eq('user_id', user.id);
      } else {
        await supabase.from('post_likes').insert({ post_id: post.id, user_id: user.id });
      }
    } catch (e) { console.warn('좋아요 토글 실패:', e); }
  }

  async function toggleBookmark(post) {
    if (!isLoggedIn) { onGoLogin && onGoLogin(); return; }
    const bookmarked = myBookmarks.has(post.id);
    const newBm = new Set(myBookmarks);
    if (bookmarked) newBm.delete(post.id); else newBm.add(post.id);
    setMyBookmarks(newBm);
    try {
      if (bookmarked) {
        await supabase.from('post_bookmarks').delete().eq('post_id', post.id).eq('user_id', user.id);
      } else {
        await supabase.from('post_bookmarks').insert({ post_id: post.id, user_id: user.id });
      }
    } catch (e) { console.warn('북마크 토글 실패:', e); }
  }

  async function toggleNotice(post) {
    if (!isAdminUser(user, profile)) return;
    const newNoticeState = !post.is_notice;
    try {
      // raw fetch — Supabase JS SDK 우회
      await rawSupabaseFetch(`posts?id=eq.${post.id}`, {
        method: 'PATCH',
        body: { is_notice: newNoticeState },
      });
      // 화면 즉시 갱신
      setSelectedPost({ ...post, is_notice: newNoticeState });
      await loadPosts();
    } catch (e) {
      alert('공지 설정 실패: ' + e.message);
    }
  }

  function startEdit(post) {
    setSelectedPost(post);
    setWriteTitle(post.title);
    setWriteContent(post.content);
    setMode('edit');
    setError('');
  }

  async function handleImageUpload(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    if (!user) { setError('로그인이 필요합니다'); return; }
    setUploadingImage(true);
    setError('');
    try {
      const url = await uploadImage(file, user.id);
      // 텍스트에 이미지 마크다운 삽입
      const imgMd = `\n![${file.name}](${url})\n`;
      setWriteContent(prev => (prev || '') + imgMd);
    } catch (err) {
      setError('이미지 업로드 실패: ' + err.message);
    } finally {
      setUploadingImage(false);
      if (e.target) e.target.value = ''; // reset
    }
  }

  // ===== 렌더링 =====
  const writeButtonHandler = () => {
    if (!isLoggedIn) { onGoLogin && onGoLogin(); return; }
    // 이전 작성 중인 임시 저장 복원
    try {
      const draft = JSON.parse(localStorage.getItem('board_draft') || '{}');
      if (draft.title || draft.content) {
        if (confirm('이전에 작성하던 글이 있어요. 이어서 작성하시겠어요?\n\n제목: ' + (draft.title || '(없음)').substring(0, 30))) {
          setWriteTitle(draft.title || '');
          setWriteContent(draft.content || '');
          setMode('write'); setError('');
          return;
        } else {
          localStorage.removeItem('board_draft');
        }
      }
    } catch (e) { /* ignore */ }
    setWriteTitle(''); setWriteContent(''); setMode('write'); setError('');
    // 사전 워밍업 - Supabase 깨우기 (백그라운드)
    if (supabase) supabase.from('posts').select('id').limit(1).then(() => {}, () => {});
  };

  // 작성 중 내용 자동 저장 (1초마다)
  useEffect(() => {
    if (mode !== 'write') return;
    const timer = setTimeout(() => {
      try {
        if (writeTitle || writeContent) {
          localStorage.setItem('board_draft', JSON.stringify({ title: writeTitle, content: writeContent, savedAt: Date.now() }));
        }
      } catch (e) { /* ignore */ }
    }, 1000);
    return () => clearTimeout(timer);
  }, [writeTitle, writeContent, mode]);

  // 글 목록
  if (mode === 'list') {
    // 검색 필터링
    const q = searchQuery.trim().toLowerCase();
    const filteredPosts = q ? posts.filter(p =>
      (p.title || '').toLowerCase().includes(q) ||
      (p.content || '').toLowerCase().includes(q) ||
      (p.author?.nickname || '').toLowerCase().includes(q) ||
      (p.author?.name || '').toLowerCase().includes(q)
    ) : posts;

    return (
      <div className="board-page">
        <div className="vision-section-title">💬 자유게시판</div>
        <div className="vision-section-subtitle">SAP 컨설턴트·개발자·운영자 자유 소통 공간</div>

        <div style={{ maxWidth: 1100, margin: '0 auto' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16, flexWrap: 'wrap', gap: 10 }}>
            <div style={{ display: 'flex', gap: 8, alignItems: 'center', flex: '1 1 300px' }}>
              <input
                className="input"
                value={searchQuery}
                onChange={e => setSearchQuery(e.target.value)}
                placeholder="🔍 제목·내용·작성자 검색"
                style={{ flex: 1, fontSize: 13, minWidth: 200 }}
              />
              <span style={{ fontSize: 12, color: 'var(--ink-muted)', whiteSpace: 'nowrap' }}>
                {loading ? '...' : (searchQuery ? `${filteredPosts.length}/${posts.length}` : `총 ${posts.length}개`)}
              </span>
            </div>
            <button className="btn btn-primary" onClick={writeButtonHandler} style={{ background: '#E67E22', borderColor: '#E67E22', fontSize: 13 }}>
              ✏️ 글쓰기
            </button>
          </div>

          {error && (
            <div style={{ padding: 12, background: 'rgba(231,76,60,0.08)', border: '1px solid rgba(231,76,60,0.3)', borderRadius: 4, color: '#A02C1F', fontSize: 13, marginBottom: 12 }}>
              ⚠ {error}
            </div>
          )}

          {loading ? (
            <div style={{ padding: 60, textAlign: 'center', color: 'var(--ink-muted)' }}>🦄 불러오는 중...</div>
          ) : filteredPosts.length === 0 ? (
            <div style={{ padding: 60, textAlign: 'center', background: 'rgba(0,0,0,0.02)', border: '1px dashed var(--line)', borderRadius: 8 }}>
              <div style={{ fontSize: 36, marginBottom: 10, opacity: 0.4 }}>{searchQuery ? '🔍' : '📭'}</div>
              <div style={{ fontSize: 14, color: 'var(--ink-muted)' }}>
                {searchQuery ? `"${searchQuery}" 검색 결과 없음` : '아직 글이 없습니다'}
              </div>
              {isLoggedIn && !searchQuery && (
                <button className="btn btn-primary" onClick={writeButtonHandler} style={{ marginTop: 14, background: '#E67E22', borderColor: '#E67E22' }}>첫 글 작성하기</button>
              )}
            </div>
          ) : (
            <table className="board-table">
              <thead>
                <tr>
                  <th className="hide-mobile" style={{ width: 60 }}>No</th>
                  <th style={{ textAlign: 'left', paddingLeft: 14 }}>제목</th>
                  <th style={{ width: 120 }}>글쓴이</th>
                  <th style={{ width: 70 }}>날짜</th>
                  <th className="hide-mobile" style={{ width: 60 }}>조회</th>
                </tr>
              </thead>
              <tbody>
                {filteredPosts.map((p, idx) => (
                  <tr
                    key={p.id}
                    onClick={() => openPost(p)}
                    style={p.is_notice ? { background: 'rgba(230,126,34,0.06)' } : {}}
                  >
                    <td className="col-num">
                      {p.is_notice
                        ? <span style={{ background: '#E67E22', color: 'white', padding: '2px 8px', borderRadius: 3, fontSize: 10, fontWeight: 600, whiteSpace: 'nowrap', display: 'inline-block' }}>공지</span>
                        : (filteredPosts.filter(x => !x.is_notice).length - (idx - filteredPosts.filter(x => x.is_notice && filteredPosts.indexOf(x) < idx).length))
                      }
                    </td>
                    <td className="col-title" style={{ paddingLeft: 14, fontWeight: p.is_notice ? 600 : 400 }}>
                      {p.is_notice && <span style={{ color: '#E67E22', marginRight: 4 }}>📢</span>}
                      {p.title}
                      {p.comment_count > 0 && <span className="comment-count">[{p.comment_count}]</span>}
                    </td>
                    <td className="col-author">{p.author?.nickname || p.author?.name || '익명'}</td>
                    <td className="col-date">{boardDate(p.created_at)}</td>
                    <td className="col-views">{p.view_count || 0}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      </div>
    );
  }

  // 글 작성/수정
  if (mode === 'write' || mode === 'edit') {
    return (
      <div className="board-page">
        <div className="vision-section-title">{mode === 'edit' ? '✏️ 글 수정' : '✏️ 글 작성'}</div>
        <div className="vision-section-subtitle">자유게시판</div>

        <div style={{ maxWidth: 720, margin: '0 auto' }}>
          <div className="meta-card" style={{ marginBottom: 0 }}>
            <div className="field" style={{ marginBottom: 14 }}>
              <label className="label">제목</label>
              <input className="input" value={writeTitle} onChange={e => setWriteTitle(e.target.value)} placeholder="제목을 입력하세요" autoFocus />
            </div>
            <div className="field">
              <label className="label">
                내용
                <span style={{ marginLeft: 10, fontSize: 10, color: 'var(--ink-muted)', fontWeight: 400 }}>
                  💡 이미지는 자동으로 마크다운 형식 <code style={{ background: 'rgba(0,0,0,0.05)', padding: '1px 4px', borderRadius: 2 }}>![alt](url)</code> 로 삽입됩니다
                </span>
              </label>
              <textarea
                className="input"
                value={writeContent}
                onChange={e => setWriteContent(e.target.value)}
                placeholder="내용을 입력하세요. 여러 줄 입력 가능."
                style={{ minHeight: 280, resize: 'vertical', fontFamily: "'IBM Plex Sans KR', sans-serif", fontSize: 14, lineHeight: 1.7 }}
              />
              {/* 이미지 업로드 버튼 */}
              <div style={{ marginTop: 8, display: 'flex', gap: 8, alignItems: 'center' }}>
                <input
                  ref={fileInputRef}
                  type="file"
                  accept="image/jpeg,image/png,image/gif,image/webp"
                  onChange={handleImageUpload}
                  style={{ display: 'none' }}
                />
                <button
                  type="button"
                  onClick={() => fileInputRef.current && fileInputRef.current.click()}
                  disabled={uploadingImage}
                  className="btn btn-ghost"
                  style={{ fontSize: 12 }}
                >
                  {uploadingImage ? <><span className="loader"></span> 업로드 중...</> : '📷 이미지 추가'}
                </button>
                <span style={{ fontSize: 11, color: 'var(--ink-muted)' }}>
                  JPG·PNG·GIF·WEBP · 최대 5MB
                </span>
              </div>
            </div>

            {error && (
              <div style={{ marginTop: 14, padding: 12, background: 'rgba(231,76,60,0.08)', border: '1px solid rgba(231,76,60,0.3)', borderRadius: 4, color: '#A02C1F', fontSize: 13 }}>
                ⚠ {error}
              </div>
            )}

            <div style={{ marginTop: 18, display: 'flex', gap: 8, justifyContent: 'space-between' }}>
              <button className="btn btn-ghost" onClick={() => setMode('list')}>← 취소</button>
              <button className="btn btn-primary" onClick={submitPost} disabled={submitting} style={{ background: '#E67E22', borderColor: '#E67E22' }}>
                {submitting ? <><span className="loader"></span> 저장 중...</> : (mode === 'edit' ? '💾 수정 완료' : '✓ 작성 완료')}
              </button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // 글 상세
  if (mode === 'detail' && selectedPost) {
    const isOwner = user && selectedPost.author_id === user.id;
    return (
      <div className="board-page">
        <div style={{ maxWidth: 1000, margin: '0 auto' }}>
          <button className="btn btn-ghost" onClick={() => setMode('list')} style={{ marginBottom: 16, fontSize: 12 }}>← 목록으로</button>

          <div className="meta-card" style={{ marginBottom: 24 }}>
            {selectedPost.is_notice && (
              <div style={{ background: 'rgba(230,126,34,0.1)', color: '#C9651C', padding: '6px 12px', borderRadius: 4, fontSize: 12, fontWeight: 600, display: 'inline-block', marginBottom: 12 }}>
                📢 공지
              </div>
            )}
            <h2 style={{ fontFamily: "'Noto Serif KR', serif", fontSize: 24, fontWeight: 700, color: 'var(--ink)', margin: '0 0 12px', lineHeight: 1.4 }}>{selectedPost.title}</h2>
            <div style={{ fontSize: 12, color: 'var(--ink-muted)', display: 'flex', gap: 10, flexWrap: 'wrap', marginBottom: 18, paddingBottom: 14, borderBottom: '1px solid var(--line)' }}>
              <span><strong style={{ color: 'var(--ink-soft)' }}>{selectedPost.author?.nickname || selectedPost.author?.name || '익명'}</strong> {selectedPost.author?.company && `· ${selectedPost.author.company}`}</span>
              <span>·</span>
              <span>{relativeTime(selectedPost.created_at)}</span>
              <span>·</span>
              <span>조회 {selectedPost.view_count || 0}</span>
            </div>
            <div style={{ fontSize: 14, lineHeight: 1.8, color: 'var(--ink)', minHeight: 100 }}>{renderBoardContent(selectedPost.content)}</div>

            {/* 좋아요 + 북마크 */}
            <div style={{ marginTop: 18, paddingTop: 14, borderTop: '1px solid var(--line)', display: 'flex', gap: 8, justifyContent: 'center' }}>
              <button
                onClick={() => toggleLike(selectedPost)}
                style={{
                  background: myLikes.has(selectedPost.id) ? 'rgba(231,76,60,0.08)' : 'transparent',
                  border: '1px solid', borderColor: myLikes.has(selectedPost.id) ? '#E74C3C' : 'var(--line)',
                  borderRadius: 20, padding: '6px 14px', cursor: 'pointer', fontSize: 13,
                  color: myLikes.has(selectedPost.id) ? '#C0392B' : 'var(--ink-soft)',
                  fontWeight: myLikes.has(selectedPost.id) ? 600 : 400,
                }}
              >
                {myLikes.has(selectedPost.id) ? '❤️' : '🤍'} 좋아요 {likes[selectedPost.id] || 0}
              </button>
              <button
                onClick={() => toggleBookmark(selectedPost)}
                style={{
                  background: myBookmarks.has(selectedPost.id) ? 'rgba(230,126,34,0.08)' : 'transparent',
                  border: '1px solid', borderColor: myBookmarks.has(selectedPost.id) ? '#E67E22' : 'var(--line)',
                  borderRadius: 20, padding: '6px 14px', cursor: 'pointer', fontSize: 13,
                  color: myBookmarks.has(selectedPost.id) ? '#E67E22' : 'var(--ink-soft)',
                  fontWeight: myBookmarks.has(selectedPost.id) ? 600 : 400,
                }}
              >
                {myBookmarks.has(selectedPost.id) ? '🔖' : '📑'} {myBookmarks.has(selectedPost.id) ? '북마크됨' : '북마크'}
              </button>
            </div>

            {/* 관리자 공지 토글 (관리자만 보임) */}
            {isAdminUser(user, profile) && (
              <div style={{ marginTop: 14, paddingTop: 12, borderTop: '1px dashed var(--line)', display: 'flex', justifyContent: 'center' }}>
                <button
                  onClick={() => toggleNotice(selectedPost)}
                  style={{
                    background: selectedPost.is_notice ? '#E67E22' : 'transparent',
                    color: selectedPost.is_notice ? 'white' : 'var(--ink-soft)',
                    border: '1px solid', borderColor: '#E67E22',
                    borderRadius: 4, padding: '6px 14px', cursor: 'pointer', fontSize: 12,
                    fontWeight: 600,
                  }}
                >
                  {selectedPost.is_notice ? '📢 공지 해제' : '📢 공지로 지정'} <span style={{ fontSize: 10, opacity: 0.8 }}>(관리자)</span>
                </button>
              </div>
            )}

            {isOwner && (
              <div style={{ marginTop: 18, paddingTop: 14, borderTop: '1px solid var(--line)', display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
                <button className="btn btn-ghost" onClick={() => startEdit(selectedPost)} style={{ fontSize: 12 }}>✏️ 수정</button>
                <button className="btn btn-ghost" onClick={() => deletePost(selectedPost)} style={{ fontSize: 12, color: '#E74C3C' }}>🗑 삭제</button>
              </div>
            )}
          </div>

          {/* 댓글 영역 */}
          <div className="meta-card" style={{ marginBottom: 0 }}>
            <h3 style={{ fontFamily: "'Noto Serif KR', serif", fontSize: 16, fontWeight: 600, margin: '0 0 14px', color: 'var(--ink-soft)' }}>💬 댓글 {comments.length}개</h3>

            {comments.length > 0 && (
              <div style={{ marginBottom: 18 }}>
                {comments.map(c => {
                  const isCommentOwner = user && c.author_id === user.id;
                  return (
                    <div key={c.id} style={{ padding: '12px 0', borderTop: '1px solid var(--line)' }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 4 }}>
                        <div style={{ fontSize: 12, color: 'var(--ink-soft)' }}>
                          <strong>{c.author?.nickname || c.author?.name || '익명'}</strong>
                          {c.author?.company && <span style={{ color: 'var(--ink-muted)' }}> · {c.author.company}</span>}
                          <span style={{ color: 'var(--ink-muted)', marginLeft: 8 }}>{relativeTime(c.created_at)}</span>
                        </div>
                        {isCommentOwner && (
                          <button onClick={() => deleteComment(c)} style={{ background: 'none', border: 'none', color: '#E74C3C', fontSize: 11, cursor: 'pointer', padding: 0 }}>삭제</button>
                        )}
                      </div>
                      <div style={{ fontSize: 13, color: 'var(--ink)', lineHeight: 1.6 }}>{renderBoardContent(c.content)}</div>
                    </div>
                  );
                })}
              </div>
            )}

            {isLoggedIn ? (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                <textarea
                  className="input"
                  value={newComment}
                  onChange={e => setNewComment(e.target.value)}
                  placeholder="댓글을 입력하세요"
                  style={{ minHeight: 70, resize: 'vertical', fontSize: 13 }}
                />
                <div style={{ display: 'flex', justifyContent: 'flex-end' }}>
                  <button className="btn btn-primary" onClick={submitComment} disabled={commentSubmitting || !newComment.trim()} style={{ background: '#E67E22', borderColor: '#E67E22', fontSize: 12 }}>
                    {commentSubmitting ? '작성 중...' : '댓글 작성'}
                  </button>
                </div>
              </div>
            ) : (
              <div style={{ padding: 14, background: 'rgba(0,0,0,0.02)', border: '1px dashed var(--line)', borderRadius: 4, textAlign: 'center', fontSize: 13, color: 'var(--ink-muted)' }}>
                댓글 작성은 <button onClick={onGoLogin} style={{ background: 'none', border: 'none', color: 'var(--accent)', textDecoration: 'underline', cursor: 'pointer', fontSize: 13, fontWeight: 600, padding: 0 }}>로그인</button> 후 가능합니다
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  return null;
}

// ===== Q&A 게시판 컴포넌트 =====
function QnAPage({ user, profile, isLoggedIn, onGoLogin }) {
  const [mode, setMode] = useState('list'); // 'list' | 'write' | 'detail' | 'edit'
  const [questions, setQuestions] = useState([]);
  const [selectedQ, setSelectedQ] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState('');
  const [filterModule, setFilterModule] = useState('all');
  const [filterResolved, setFilterResolved] = useState('all'); // all | unresolved | resolved
  const [searchQuery, setSearchQuery] = useState('');

  // 좋아요·북마크
  const [likes, setLikes] = useState({});
  const [myLikes, setMyLikes] = useState(new Set());
  const [myBookmarks, setMyBookmarks] = useState(new Set());

  async function toggleQLike(q) {
    if (!isLoggedIn) { onGoLogin && onGoLogin(); return; }
    const liked = myLikes.has(q.id);
    const newMy = new Set(myLikes);
    const newCounts = { ...likes };
    if (liked) { newMy.delete(q.id); newCounts[q.id] = Math.max(0, (newCounts[q.id] || 0) - 1); }
    else { newMy.add(q.id); newCounts[q.id] = (newCounts[q.id] || 0) + 1; }
    setMyLikes(newMy); setLikes(newCounts);
    try {
      if (liked) await supabase.from('qna_likes').delete().eq('question_id', q.id).eq('user_id', user.id);
      else await supabase.from('qna_likes').insert({ question_id: q.id, user_id: user.id });
    } catch (e) { console.warn(e); }
  }

  async function toggleQBookmark(q) {
    if (!isLoggedIn) { onGoLogin && onGoLogin(); return; }
    const bookmarked = myBookmarks.has(q.id);
    const newBm = new Set(myBookmarks);
    if (bookmarked) newBm.delete(q.id); else newBm.add(q.id);
    setMyBookmarks(newBm);
    try {
      if (bookmarked) await supabase.from('qna_bookmarks').delete().eq('question_id', q.id).eq('user_id', user.id);
      else await supabase.from('qna_bookmarks').insert({ question_id: q.id, user_id: user.id });
    } catch (e) { console.warn(e); }
  }

  // Write
  const [writeTitle, setWriteTitle] = useState('');
  const [writeContent, setWriteContent] = useState('');
  const [writeModule, setWriteModule] = useState('FI');
  const [submitting, setSubmitting] = useState(false);
  const [uploadingImage, setUploadingImage] = useState(false);
  const fileInputRef = useRef(null);

  // Detail / answers
  const [answers, setAnswers] = useState([]);
  const [newAnswer, setNewAnswer] = useState('');
  const [answerSubmitting, setAnswerSubmitting] = useState(false);

  useEffect(() => {
    if (mode === 'list') loadQuestions();
  }, [mode, filterModule, filterResolved]);

  async function loadQuestions() {
    if (!supabase) { setLoading(false); return; }
    setLoading(true);
    setError('');

    const timeoutId = setTimeout(() => {
      console.warn('[QnA] loadQuestions 타임아웃');
      setError('로딩 시간 초과. 잠시 후 새로고침해주세요.');
      setLoading(false);
    }, 30000);

    try {
      console.log('[QnA] loadQuestions 시작 (raw fetch)');

      // 1. questions 가져오기 (raw fetch)
      let qPath = 'qna_questions?select=*&order=created_at.desc&limit=50';
      if (filterModule !== 'all') qPath += `&sap_module=eq.${encodeURIComponent(filterModule)}`;
      if (filterResolved === 'resolved') qPath += '&is_resolved=eq.true';
      if (filterResolved === 'unresolved') qPath += '&is_resolved=eq.false';

      const qData = await rawSupabaseFetch(qPath);
      console.log('[QnA] questions:', qData?.length || 0);

      // 성공 시 이전 에러 제거
      setError('');

      if (!qData || qData.length === 0) {
        setQuestions([]);
        return;
      }

      const qIds = qData.map(q => q.id);
      const authorIds = [...new Set(qData.map(q => q.author_id).filter(Boolean))];

      // 2. 나머지 쿼리 병렬 (raw fetch)
      const [profilesData, answersData, likesData, bmData] = await Promise.all([
        authorIds.length > 0
          ? rawSupabaseFetch(`profiles?select=*&id=in.(${authorIds.join(',')})`).catch(() => [])
          : Promise.resolve([]),
        rawSupabaseFetch(`qna_answers?select=question_id&question_id=in.(${qIds.join(',')})`).catch(() => []),
        rawSupabaseFetch(`qna_likes?select=question_id,user_id&question_id=in.(${qIds.join(',')})`).catch(() => []),
        user
          ? rawSupabaseFetch(`qna_bookmarks?select=question_id&user_id=eq.${user.id}`).catch(() => [])
          : Promise.resolve([]),
      ]);

      // 프로필 매핑
      const profileMap = {};
      (profilesData || []).forEach(p => { profileMap[p.id] = p; });

      // 답변 카운트
      const answerCounts = {};
      (answersData || []).forEach(a => {
        answerCounts[a.question_id] = (answerCounts[a.question_id] || 0) + 1;
      });

      // 좋아요 + 내 좋아요
      const likeCounts = {};
      const mine = new Set();
      (likesData || []).forEach(l => {
        likeCounts[l.question_id] = (likeCounts[l.question_id] || 0) + 1;
        if (user && l.user_id === user.id) mine.add(l.question_id);
      });
      setLikes(likeCounts);
      setMyLikes(mine);

      // 북마크
      setMyBookmarks(new Set((bmData || []).map(b => b.question_id)));

      const enriched = qData.map(q => ({
        ...q,
        author: profileMap[q.author_id] || null,
        answer_count: answerCounts[q.id] || 0,
      }));
      setQuestions(enriched);

      console.log('[QnA] 완료');
    } catch (e) {
      console.error('[QnA] loadQuestions 실패:', e);
      setError('질문 목록 불러오기 실패: ' + e.message);
    } finally {
      clearTimeout(timeoutId);
      setLoading(false);
    }
  }

  async function loadAnswers(questionId) {
    if (!supabase) return;
    try {
      const { data, error } = await supabase
        .from('qna_answers')
        .select('*')
        .eq('question_id', questionId)
        .order('created_at', { ascending: true });
      if (error) throw error;
      const ansData = data || [];
      const authorIds = [...new Set(ansData.map(a => a.author_id).filter(Boolean))];
      const profileMap = {};
      if (authorIds.length > 0) {
        const { data: profilesData } = await supabase
          .from('profiles').select('*').in('id', authorIds);
        (profilesData || []).forEach(p => { profileMap[p.id] = p; });
      }
      setAnswers(ansData.map(a => ({ ...a, author: profileMap[a.author_id] || null })));
    } catch (e) { console.warn('답변 로드 실패:', e); }
  }

  async function openQuestion(q) {
    setSelectedQ(q);
    setMode('detail');
    setAnswers([]);
    loadAnswers(q.id);
    // 작성자 정보 없으면 가져오기
    if (!q.author && q.author_id) {
      try {
        const { data } = await supabase.from('profiles').select('*').eq('id', q.author_id).single();
        if (data) setSelectedQ(prev => prev && prev.id === q.id ? { ...prev, author: data } : prev);
      } catch (e) { /* ignore */ }
    }
    try {
      await supabase.from('qna_questions').update({ view_count: (q.view_count || 0) + 1 }).eq('id', q.id);
    } catch (e) { /* ignore */ }
  }

  async function submitQuestion() {
    if (!writeTitle.trim()) { setError('제목을 입력해주세요'); return; }
    if (!writeContent.trim()) { setError('내용을 입력해주세요'); return; }
    setSubmitting(true);
    setError('');
    const safetyTimer = setTimeout(() => {
      console.warn('[QnA] submitQuestion 타임아웃');
      setError('저장 시간 초과. 잠시 후 다시 시도해주세요.');
      setSubmitting(false);
    }, 30000);
    try {
      console.log('[QnA] submitQuestion 시작', mode);
      if (mode === 'edit' && selectedQ) {
        const { error } = await safeWrite('qna_questions', 'update',
          { title: writeTitle.trim(), content: writeContent.trim(), sap_module: writeModule },
          { eq: { id: selectedQ.id } }
        );
        if (error) throw error;
      } else {
        const { error } = await safeWrite('qna_questions', 'insert',
          { author_id: user.id, title: writeTitle.trim(), content: writeContent.trim(), sap_module: writeModule, category: 'general' }
        );
        if (error) throw error;
      }
      console.log('[QnA] submitQuestion 완료');
      setWriteTitle(''); setWriteContent(''); setWriteModule('FI');
      setMode('list');
    } catch (e) {
      console.error('[QnA] submitQuestion 실패:', e);
      setError('저장 실패: ' + e.message);
    } finally {
      clearTimeout(safetyTimer);
      setSubmitting(false);
    }
  }

  async function submitAnswer() {
    if (!newAnswer.trim()) return;
    setAnswerSubmitting(true);
    const safetyTimer = setTimeout(() => {
      console.warn('[QnA] submitAnswer 타임아웃');
      setAnswerSubmitting(false);
      alert('답변 저장 시간 초과. 다시 시도해주세요.');
    }, 30000);
    try {
      const { error } = await safeWrite('qna_answers', 'insert', {
        question_id: selectedQ.id, author_id: user.id, content: newAnswer.trim()
      });
      if (error) throw error;
      setNewAnswer('');
      await loadAnswers(selectedQ.id);
    } catch (e) {
      alert('답변 작성 실패: ' + e.message);
    } finally {
      clearTimeout(safetyTimer);
      setAnswerSubmitting(false);
    }
  }

  async function toggleResolved() {
    if (!selectedQ) return;
    try {
      const newVal = !selectedQ.is_resolved;
      const { error } = await supabase.from('qna_questions').update({ is_resolved: newVal }).eq('id', selectedQ.id);
      if (error) throw error;
      setSelectedQ({ ...selectedQ, is_resolved: newVal });
    } catch (e) { alert('상태 변경 실패: ' + e.message); }
  }

  async function deleteQuestion(q) {
    if (!window.confirm('질문을 삭제하시겠습니까?')) return;
    try {
      const { error } = await supabase.from('qna_questions').delete().eq('id', q.id);
      if (error) throw error;
      setMode('list');
    } catch (e) { alert('삭제 실패: ' + e.message); }
  }

  async function deleteAnswer(a) {
    if (!window.confirm('답변을 삭제하시겠습니까?')) return;
    try {
      const { error } = await supabase.from('qna_answers').delete().eq('id', a.id);
      if (error) throw error;
      await loadAnswers(selectedQ.id);
    } catch (e) { alert('삭제 실패: ' + e.message); }
  }

  function startEdit(q) {
    setSelectedQ(q);
    setWriteTitle(q.title);
    setWriteContent(q.content);
    setWriteModule(q.sap_module || 'FI');
    setMode('edit');
    setError('');
  }

  async function handleImageUpload(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    if (!user) { setError('로그인이 필요합니다'); return; }
    setUploadingImage(true);
    setError('');
    try {
      const url = await uploadImage(file, user.id);
      const imgMd = `\n![${file.name}](${url})\n`;
      setWriteContent(prev => (prev || '') + imgMd);
    } catch (err) {
      setError('이미지 업로드 실패: ' + err.message);
    } finally {
      setUploadingImage(false);
      if (e.target) e.target.value = '';
    }
  }

  const writeQuestionHandler = () => {
    if (!isLoggedIn) { onGoLogin && onGoLogin(); return; }
    setWriteTitle(''); setWriteContent(''); setWriteModule('FI'); setMode('write'); setError('');
  };

  const SAP_MODULES = ['FI', 'CO', 'MM', 'SD', 'PP', 'HR', 'WM', 'QM', 'PS', 'BASIS', 'ABAP', '기타'];

  // 목록
  if (mode === 'list') {
    // 검색 필터링
    const sq = searchQuery.trim().toLowerCase();
    const filteredQuestions = sq ? questions.filter(q =>
      (q.title || '').toLowerCase().includes(sq) ||
      (q.content || '').toLowerCase().includes(sq) ||
      (q.author?.nickname || '').toLowerCase().includes(sq) ||
      (q.author?.name || '').toLowerCase().includes(sq)
    ) : questions;

    return (
      <div className="board-page">
        <div className="vision-section-title">❓ Q&A 게시판</div>
        <div className="vision-section-subtitle">SAP 관련 질문·답변 · 베테랑 컨설턴트의 도움</div>

        <div style={{ maxWidth: 1100, margin: '0 auto' }}>
          {/* 검색 + 필터 + 글쓰기 */}
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12, flexWrap: 'wrap', gap: 8 }}>
            <input
              className="input"
              value={searchQuery}
              onChange={e => setSearchQuery(e.target.value)}
              placeholder="🔍 질문·내용·작성자 검색"
              style={{ flex: '1 1 220px', minWidth: 180, fontSize: 13 }}
            />
            <button className="btn btn-primary" onClick={writeQuestionHandler} style={{ background: '#E67E22', borderColor: '#E67E22', fontSize: 13 }}>
              ❓ 질문하기
            </button>
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16, flexWrap: 'wrap', gap: 8 }}>
            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', alignItems: 'center' }}>
              <select value={filterModule} onChange={e => setFilterModule(e.target.value)} style={{ fontSize: 12, padding: '6px 10px', border: '1px solid var(--line)', borderRadius: 4, background: 'white' }}>
                <option value="all">전체 모듈</option>
                {SAP_MODULES.map(m => <option key={m} value={m}>{m}</option>)}
              </select>
              <select value={filterResolved} onChange={e => setFilterResolved(e.target.value)} style={{ fontSize: 12, padding: '6px 10px', border: '1px solid var(--line)', borderRadius: 4, background: 'white' }}>
                <option value="all">전체</option>
                <option value="unresolved">미해결</option>
                <option value="resolved">해결됨</option>
              </select>
              <span style={{ fontSize: 12, color: 'var(--ink-muted)' }}>
                {loading ? '...' : (searchQuery ? `${filteredQuestions.length}/${questions.length}` : `${questions.length}건`)}
              </span>
            </div>
          </div>

          {error && (
            <div style={{ padding: 12, background: 'rgba(231,76,60,0.08)', border: '1px solid rgba(231,76,60,0.3)', borderRadius: 4, color: '#A02C1F', fontSize: 13, marginBottom: 12 }}>⚠ {error}</div>
          )}

          {loading ? (
            <div style={{ padding: 60, textAlign: 'center', color: 'var(--ink-muted)' }}>🦄 불러오는 중...</div>
          ) : filteredQuestions.length === 0 ? (
            <div style={{ padding: 60, textAlign: 'center', background: 'rgba(0,0,0,0.02)', border: '1px dashed var(--line)', borderRadius: 8 }}>
              <div style={{ fontSize: 36, marginBottom: 10, opacity: 0.4 }}>{searchQuery ? '🔍' : '📭'}</div>
              <div style={{ fontSize: 14, color: 'var(--ink-muted)' }}>
                {searchQuery ? `"${searchQuery}" 검색 결과 없음` : '아직 질문이 없습니다'}
              </div>
              {isLoggedIn && !searchQuery && (
                <button className="btn btn-primary" onClick={writeQuestionHandler} style={{ marginTop: 14, background: '#E67E22', borderColor: '#E67E22' }}>첫 질문하기</button>
              )}
            </div>
          ) : (
            <table className="board-table">
              <thead>
                <tr>
                  <th className="hide-mobile" style={{ width: 50 }}>No</th>
                  <th style={{ width: 60 }}>모듈</th>
                  <th style={{ width: 70 }}>상태</th>
                  <th style={{ textAlign: 'left', paddingLeft: 14 }}>제목</th>
                  <th style={{ width: 120 }}>글쓴이</th>
                  <th style={{ width: 70 }}>날짜</th>
                  <th className="hide-mobile" style={{ width: 60 }}>조회</th>
                </tr>
              </thead>
              <tbody>
                {filteredQuestions.map((q, idx) => (
                  <tr key={q.id} onClick={() => openQuestion(q)}>
                    <td className="col-num">{filteredQuestions.length - idx}</td>
                    <td className="col-module">
                      {q.sap_module && <span className="board-badge module">{q.sap_module}</span>}
                    </td>
                    <td className="col-status">
                      {q.is_resolved
                        ? <span className="board-badge resolved">✓ 해결</span>
                        : <span className="board-badge unresolved">미해결</span>}
                    </td>
                    <td className="col-title" style={{ paddingLeft: 14 }}>
                      {q.title}
                      {q.answer_count > 0 && <span className="comment-count">[{q.answer_count}]</span>}
                    </td>
                    <td className="col-author">{q.author?.nickname || q.author?.name || '익명'}</td>
                    <td className="col-date">{boardDate(q.created_at)}</td>
                    <td className="col-views">{q.view_count || 0}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      </div>
    );
  }

  // 질문 작성/수정
  if (mode === 'write' || mode === 'edit') {
    return (
      <div className="board-page">
        <div className="vision-section-title">{mode === 'edit' ? '✏️ 질문 수정' : '❓ 질문하기'}</div>
        <div className="vision-section-subtitle">Q&A 게시판</div>

        <div style={{ maxWidth: 720, margin: '0 auto' }}>
          <div className="meta-card" style={{ marginBottom: 0 }}>
            <div className="meta-grid">
              <div className="field">
                <label className="label">SAP 모듈</label>
                <select className="input" value={writeModule} onChange={e => setWriteModule(e.target.value)}>
                  {SAP_MODULES.map(m => <option key={m} value={m}>{m}</option>)}
                </select>
              </div>
              <div className="field" style={{ gridColumn: 'span 2' }}>
                <label className="label">제목</label>
                <input className="input" value={writeTitle} onChange={e => setWriteTitle(e.target.value)} placeholder="구체적이고 명확하게" />
              </div>
            </div>
            <div className="field" style={{ marginTop: 14 }}>
              <label className="label">
                내용 — 상황·문제·시도한 것·기대 결과를 자세히
                <span style={{ marginLeft: 10, fontSize: 10, color: 'var(--ink-muted)', fontWeight: 400 }}>
                  💡 스크린샷 첨부 가능
                </span>
              </label>
              <textarea
                className="input"
                value={writeContent}
                onChange={e => setWriteContent(e.target.value)}
                placeholder="예시:&#10;환경: S/4HANA 2021&#10;문제: F-02 전표 입력 시 오류 메시지 'F5808'&#10;시도한 것: GL 계정 권한 확인 → 정상&#10;기대 결과: 정상 전표 등록"
                style={{ minHeight: 280, resize: 'vertical', fontFamily: "'IBM Plex Sans KR', sans-serif", fontSize: 14, lineHeight: 1.7 }}
              />
              {/* 이미지 업로드 */}
              <div style={{ marginTop: 8, display: 'flex', gap: 8, alignItems: 'center' }}>
                <input
                  ref={fileInputRef}
                  type="file"
                  accept="image/jpeg,image/png,image/gif,image/webp"
                  onChange={handleImageUpload}
                  style={{ display: 'none' }}
                />
                <button
                  type="button"
                  onClick={() => fileInputRef.current && fileInputRef.current.click()}
                  disabled={uploadingImage}
                  className="btn btn-ghost"
                  style={{ fontSize: 12 }}
                >
                  {uploadingImage ? <><span className="loader"></span> 업로드 중...</> : '📷 스크린샷 첨부'}
                </button>
                <span style={{ fontSize: 11, color: 'var(--ink-muted)' }}>
                  JPG·PNG·GIF·WEBP · 최대 5MB
                </span>
              </div>
            </div>

            {error && (
              <div style={{ marginTop: 14, padding: 12, background: 'rgba(231,76,60,0.08)', border: '1px solid rgba(231,76,60,0.3)', borderRadius: 4, color: '#A02C1F', fontSize: 13 }}>⚠ {error}</div>
            )}

            <div style={{ marginTop: 18, display: 'flex', gap: 8, justifyContent: 'space-between' }}>
              <button className="btn btn-ghost" onClick={() => setMode('list')}>← 취소</button>
              <button className="btn btn-primary" onClick={submitQuestion} disabled={submitting} style={{ background: '#E67E22', borderColor: '#E67E22' }}>
                {submitting ? <><span className="loader"></span> 저장 중...</> : (mode === 'edit' ? '💾 수정 완료' : '✓ 질문 등록')}
              </button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // 질문 상세 + 답변
  if (mode === 'detail' && selectedQ) {
    const isOwner = user && selectedQ.author_id === user.id;
    return (
      <div className="board-page">
        <div style={{ maxWidth: 1000, margin: '0 auto' }}>
          <button className="btn btn-ghost" onClick={() => setMode('list')} style={{ marginBottom: 16, fontSize: 12 }}>← 목록으로</button>

          <div className="meta-card" style={{ marginBottom: 24 }}>
            <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap', marginBottom: 10 }}>
              {selectedQ.is_resolved ? (
                <span style={{ fontSize: 11, padding: '3px 10px', borderRadius: 3, background: 'rgba(39,174,96,0.15)', color: '#1E7E36', fontWeight: 700, fontFamily: "'JetBrains Mono', monospace" }}>✓ 해결</span>
              ) : (
                <span style={{ fontSize: 11, padding: '3px 10px', borderRadius: 3, background: 'rgba(231,76,60,0.1)', color: '#C0392B', fontWeight: 700, fontFamily: "'JetBrains Mono', monospace" }}>❓ 미해결</span>
              )}
              {selectedQ.sap_module && (
                <span style={{ fontSize: 11, padding: '3px 10px', borderRadius: 3, background: 'rgba(0,0,0,0.06)', color: 'var(--ink-soft)', fontWeight: 600, fontFamily: "'JetBrains Mono', monospace" }}>{selectedQ.sap_module}</span>
              )}
            </div>
            <h2 style={{ fontFamily: "'Noto Serif KR', serif", fontSize: 22, fontWeight: 700, color: 'var(--ink)', margin: '0 0 12px', lineHeight: 1.4 }}>{selectedQ.title}</h2>
            <div style={{ fontSize: 12, color: 'var(--ink-muted)', display: 'flex', gap: 10, flexWrap: 'wrap', marginBottom: 18, paddingBottom: 14, borderBottom: '1px solid var(--line)' }}>
              <span><strong style={{ color: 'var(--ink-soft)' }}>{selectedQ.author?.nickname || selectedQ.author?.name || '익명'}</strong> {selectedQ.author?.company && `· ${selectedQ.author.company}`}</span>
              <span>·</span>
              <span>{relativeTime(selectedQ.created_at)}</span>
              <span>·</span>
              <span>조회 {selectedQ.view_count || 0}</span>
            </div>
            <div style={{ fontSize: 14, lineHeight: 1.8, color: 'var(--ink)', minHeight: 80 }}>{renderBoardContent(selectedQ.content)}</div>

            {/* 좋아요 + 북마크 */}
            <div style={{ marginTop: 18, paddingTop: 14, borderTop: '1px solid var(--line)', display: 'flex', gap: 8, justifyContent: 'center' }}>
              <button
                onClick={() => toggleQLike(selectedQ)}
                style={{
                  background: myLikes.has(selectedQ.id) ? 'rgba(231,76,60,0.08)' : 'transparent',
                  border: '1px solid', borderColor: myLikes.has(selectedQ.id) ? '#E74C3C' : 'var(--line)',
                  borderRadius: 20, padding: '6px 14px', cursor: 'pointer', fontSize: 13,
                  color: myLikes.has(selectedQ.id) ? '#C0392B' : 'var(--ink-soft)',
                  fontWeight: myLikes.has(selectedQ.id) ? 600 : 400,
                }}
              >
                {myLikes.has(selectedQ.id) ? '❤️' : '🤍'} 좋아요 {likes[selectedQ.id] || 0}
              </button>
              <button
                onClick={() => toggleQBookmark(selectedQ)}
                style={{
                  background: myBookmarks.has(selectedQ.id) ? 'rgba(230,126,34,0.08)' : 'transparent',
                  border: '1px solid', borderColor: myBookmarks.has(selectedQ.id) ? '#E67E22' : 'var(--line)',
                  borderRadius: 20, padding: '6px 14px', cursor: 'pointer', fontSize: 13,
                  color: myBookmarks.has(selectedQ.id) ? '#E67E22' : 'var(--ink-soft)',
                  fontWeight: myBookmarks.has(selectedQ.id) ? 600 : 400,
                }}
              >
                {myBookmarks.has(selectedQ.id) ? '🔖' : '📑'} {myBookmarks.has(selectedQ.id) ? '북마크됨' : '북마크'}
              </button>
            </div>

            {isOwner && (
              <div style={{ marginTop: 18, paddingTop: 14, borderTop: '1px solid var(--line)', display: 'flex', gap: 8, justifyContent: 'flex-end', flexWrap: 'wrap' }}>
                <button className="btn btn-ghost" onClick={toggleResolved} style={{ fontSize: 12 }}>
                  {selectedQ.is_resolved ? '🔄 미해결로 변경' : '✓ 해결 표시'}
                </button>
                <button className="btn btn-ghost" onClick={() => startEdit(selectedQ)} style={{ fontSize: 12 }}>✏️ 수정</button>
                <button className="btn btn-ghost" onClick={() => deleteQuestion(selectedQ)} style={{ fontSize: 12, color: '#E74C3C' }}>🗑 삭제</button>
              </div>
            )}
          </div>

          {/* 답변 영역 */}
          <div className="meta-card" style={{ marginBottom: 0 }}>
            <h3 style={{ fontFamily: "'Noto Serif KR', serif", fontSize: 16, fontWeight: 600, margin: '0 0 14px', color: 'var(--ink-soft)' }}>💡 답변 {answers.length}개</h3>

            {answers.length > 0 && (
              <div style={{ marginBottom: 18 }}>
                {answers.map(a => {
                  const isAnswerOwner = user && a.author_id === user.id;
                  return (
                    <div key={a.id} style={{ padding: '14px 0', borderTop: '1px solid var(--line)' }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 6 }}>
                        <div style={{ fontSize: 12, color: 'var(--ink-soft)' }}>
                          <strong>{a.author?.nickname || a.author?.name || '익명'}</strong>
                          {a.author?.company && <span style={{ color: 'var(--ink-muted)' }}> · {a.author.company}</span>}
                          <span style={{ color: 'var(--ink-muted)', marginLeft: 8 }}>{relativeTime(a.created_at)}</span>
                        </div>
                        {isAnswerOwner && (
                          <button onClick={() => deleteAnswer(a)} style={{ background: 'none', border: 'none', color: '#E74C3C', fontSize: 11, cursor: 'pointer', padding: 0 }}>삭제</button>
                        )}
                      </div>
                      <div style={{ fontSize: 14, color: 'var(--ink)', lineHeight: 1.7, paddingLeft: 4 }}>{renderBoardContent(a.content)}</div>
                    </div>
                  );
                })}
              </div>
            )}

            {isLoggedIn ? (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                <textarea
                  className="input"
                  value={newAnswer}
                  onChange={e => setNewAnswer(e.target.value)}
                  placeholder="답변을 입력하세요. 경험·해결 방법·참고 자료 등 자세할수록 좋아요."
                  style={{ minHeight: 100, resize: 'vertical', fontSize: 13, fontFamily: "'IBM Plex Sans KR', sans-serif", lineHeight: 1.7 }}
                />
                <div style={{ display: 'flex', justifyContent: 'flex-end' }}>
                  <button className="btn btn-primary" onClick={submitAnswer} disabled={answerSubmitting || !newAnswer.trim()} style={{ background: '#E67E22', borderColor: '#E67E22', fontSize: 12 }}>
                    {answerSubmitting ? '작성 중...' : '💡 답변 등록'}
                  </button>
                </div>
              </div>
            ) : (
              <div style={{ padding: 14, background: 'rgba(0,0,0,0.02)', border: '1px dashed var(--line)', borderRadius: 4, textAlign: 'center', fontSize: 13, color: 'var(--ink-muted)' }}>
                답변 작성은 <button onClick={onGoLogin} style={{ background: 'none', border: 'none', color: 'var(--accent)', textDecoration: 'underline', cursor: 'pointer', fontSize: 13, fontWeight: 600, padding: 0 }}>로그인</button> 후 가능합니다
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  return null;
}

// ===== 구해줘잡스 (구인구직) =====
function jobTypeInfo(t) {
  if (t === 'hiring') return { label: '구인', icon: '📢', full: '📢 구인', color: '#E67E22' };
  if (t === 'seeking') return { label: '구직', icon: '🙋', full: '🙋 구직', color: '#3498DB' };
  if (t === 'project') return { label: '프로젝트', icon: '📋', full: '📋 프로젝트정보', color: '#27AE60' };
  return { label: '기타', icon: '📄', full: '📄 기타', color: '#95A5A6' };
}

function JobsPage({ user, profile, isLoggedIn, onGoLogin }) {
  const SAP_MODULES = ['FI', 'CO', 'MM', 'SD', 'PP', 'HR', 'WM', 'QM', 'PS', 'BASIS', 'ABAP', '기타'];
  const [mode, setMode] = useState('list'); // 'list' | 'write' | 'detail' | 'edit'
  const [jobs, setJobs] = useState([]);
  const [selectedJob, setSelectedJob] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState('');
  const [filterType, setFilterType] = useState('all'); // all | hiring | seeking
  const [filterModule, setFilterModule] = useState('all');
  const [searchQuery, setSearchQuery] = useState('');

  // 작성 폼 상태
  const [jobType, setJobType] = useState('hiring');
  const [writeTitle, setWriteTitle] = useState('');
  const [writeContent, setWriteContent] = useState('');
  const [writeCompany, setWriteCompany] = useState('');
  const [writeLocation, setWriteLocation] = useState('');
  const [writeModule, setWriteModule] = useState('FI');
  const [writeExperience, setWriteExperience] = useState('');
  const [writeSalary, setWriteSalary] = useState('');
  const [writeContact, setWriteContact] = useState('');
  const [submitting, setSubmitting] = useState(false);

  useEffect(() => { loadJobs(); }, []);

  async function loadJobs() {
    if (!supabase) { setLoading(false); return; }
    setLoading(true);
    setError('');
    const timeoutId = setTimeout(() => {
      setError('로딩 시간 초과. 잠시 후 새로고침해주세요.');
      setLoading(false);
    }, 30000);
    try {
      console.log('[Jobs] loadJobs 시작 (raw fetch)');
      const jobsData = await rawSupabaseFetch('jobs?select=*&order=created_at.desc&limit=50');
      setError('');
      if (!jobsData || jobsData.length === 0) { setJobs([]); return; }

      const authorIds = [...new Set(jobsData.map(j => j.author_id).filter(Boolean))];
      const profileMap = {};
      if (authorIds.length > 0) {
        const profilesData = await rawSupabaseFetch(`profiles?select=*&id=in.(${authorIds.join(',')})`).catch(() => []);
        (profilesData || []).forEach(p => { profileMap[p.id] = p; });
      }
      setJobs(jobsData.map(j => ({ ...j, author: profileMap[j.author_id] || null })));
      console.log('[Jobs] 완료');
    } catch (e) {
      setError('목록 불러오기 실패: ' + e.message);
    } finally {
      clearTimeout(timeoutId);
      setLoading(false);
    }
  }

  function writeButtonHandler() {
    if (!isLoggedIn) { onGoLogin && onGoLogin(); return; }
    setWriteTitle(''); setWriteContent(''); setWriteCompany('');
    setWriteLocation(''); setWriteModule('FI'); setWriteExperience('');
    setWriteSalary(''); setWriteContact('');
    setJobType('hiring');
    setMode('write');
  }

  function openJob(job) {
    setSelectedJob(job);
    setMode('detail');
    // view_count 증가 (백그라운드)
    supabase.from('jobs').update({ view_count: (job.view_count || 0) + 1 }).eq('id', job.id).then(() => {});
  }

  function startEdit(job) {
    setSelectedJob(job);
    setWriteTitle(job.title || ''); setWriteContent(job.content || '');
    setWriteCompany(job.company || ''); setWriteLocation(job.location || '');
    setWriteModule(job.sap_module || 'FI'); setWriteExperience(job.experience || '');
    setWriteSalary(job.salary_range || ''); setWriteContact(job.contact || '');
    setJobType(job.job_type || 'hiring');
    setMode('edit');
  }

  async function submitJob() {
    if (!writeTitle.trim()) { setError('제목을 입력해주세요'); return; }
    setSubmitting(true);
    setError('');
    const safetyTimer = setTimeout(() => {
      setError('저장 시간 초과. 잠시 후 다시 시도해주세요.');
      setSubmitting(false);
    }, 30000);
    try {
      const payload = {
        job_type: jobType,
        title: writeTitle.trim(),
        content: writeContent.trim(),
        company: writeCompany.trim(),
        location: writeLocation.trim(),
        sap_module: writeModule,
        experience: writeExperience.trim(),
        salary_range: writeSalary.trim(),
        contact: writeContact.trim(),
      };
      if (mode === 'edit' && selectedJob) {
        const { error } = await safeWrite('jobs', 'update', { ...payload, updated_at: new Date().toISOString() }, { eq: { id: selectedJob.id } });
        if (error) throw error;
      } else {
        const { error } = await safeWrite('jobs', 'insert', { ...payload, author_id: user.id });
        if (error) throw error;
      }
      setMode('list');
      await loadJobs();
    } catch (e) {
      setError('저장 실패: ' + e.message);
    } finally {
      clearTimeout(safetyTimer);
      setSubmitting(false);
    }
  }

  async function deleteJob(job) {
    if (!confirm('정말 삭제하시겠어요?')) return;
    try {
      const { error } = await safeWrite('jobs', 'delete', null, { eq: { id: job.id } });
      if (error) throw error;
      setMode('list');
      await loadJobs();
    } catch (e) {
      alert('삭제 실패: ' + e.message);
    }
  }

  async function toggleActive(job) {
    try {
      const { error } = await safeWrite('jobs', 'update', { is_active: !job.is_active }, { eq: { id: job.id } });
      if (error) throw error;
      const updated = { ...job, is_active: !job.is_active };
      setSelectedJob(updated);
      await loadJobs();
    } catch (e) {
      alert('변경 실패: ' + e.message);
    }
  }

  // 작성/수정
  if (mode === 'write' || mode === 'edit') {
    return (
      <div className="board-page">
        <div style={{ maxWidth: 800, margin: '0 auto' }}>
          <div style={{ fontSize: 26, fontWeight: 700, marginBottom: 20, color: 'var(--accent)', fontFamily: "'Noto Serif KR',serif" }}>
            🏃 {mode === 'edit' ? '수정' : '새 글 작성'}
          </div>
          {error && <div className="form-error" style={{ marginBottom: 14 }}>{error}</div>}

          {/* 구인/구직/프로젝트 선택 */}
          <div style={{ display: 'flex', gap: 8, marginBottom: 14, flexWrap: 'wrap' }}>
            <button type="button" onClick={() => setJobType('hiring')} style={{ flex: '1 1 100px', padding: '10px', background: jobType === 'hiring' ? '#E67E22' : 'white', color: jobType === 'hiring' ? 'white' : 'var(--ink-soft)', border: '1px solid', borderColor: jobType === 'hiring' ? '#E67E22' : 'var(--line)', borderRadius: 6, fontWeight: jobType === 'hiring' ? 600 : 400, cursor: 'pointer', fontSize: 13 }}>📢 구인 (모집)</button>
            <button type="button" onClick={() => setJobType('seeking')} style={{ flex: '1 1 100px', padding: '10px', background: jobType === 'seeking' ? '#3498DB' : 'white', color: jobType === 'seeking' ? 'white' : 'var(--ink-soft)', border: '1px solid', borderColor: jobType === 'seeking' ? '#3498DB' : 'var(--line)', borderRadius: 6, fontWeight: jobType === 'seeking' ? 600 : 400, cursor: 'pointer', fontSize: 13 }}>🙋 구직 (찾는중)</button>
            <button type="button" onClick={() => setJobType('project')} style={{ flex: '1 1 100px', padding: '10px', background: jobType === 'project' ? '#27AE60' : 'white', color: jobType === 'project' ? 'white' : 'var(--ink-soft)', border: '1px solid', borderColor: jobType === 'project' ? '#27AE60' : 'var(--line)', borderRadius: 6, fontWeight: jobType === 'project' ? 600 : 400, cursor: 'pointer', fontSize: 13 }}>📋 프로젝트정보</button>
          </div>

          <input className="input" value={writeTitle} onChange={e => setWriteTitle(e.target.value)} placeholder={
            jobType === 'hiring' ? '제목 (예: SAP FI 컨설턴트 모집 - 3년차 이상)' :
            jobType === 'seeking' ? '제목 (예: FI 컨설턴트 새 프로젝트 찾는중)' :
            '제목 (예: A전자 FI 차세대 프로젝트 - 컨설턴트 5명 필요)'
          } style={{ marginBottom: 12, fontSize: 15 }} />

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 12 }}>
            <input className="input" value={writeCompany} onChange={e => setWriteCompany(e.target.value)} placeholder={
              jobType === 'hiring' ? '회사명' :
              jobType === 'seeking' ? '경력 회사 (선택)' :
              '발주처/SI사'
            } />
            <input className="input" value={writeLocation} onChange={e => setWriteLocation(e.target.value)} placeholder={
              jobType === 'project' ? '프로젝트 장소 (서울/판교/원격 등)' : '근무지 (서울/판교/원격 등)'
            } />
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10, marginBottom: 12 }}>
            <input className="input" list="job-module-list" value={writeModule} onChange={e => setWriteModule(e.target.value)} placeholder="모듈 (FI, CO, MM 등)" />
            <datalist id="job-module-list">
              {SAP_MODULES.map(m => <option key={m} value={m} />)}
              <option value="FI/CO" />
              <option value="SD/MM" />

              <span>📅 {boardDate(selectedJob.created_at)}</span>
              <span>👁 {selectedJob.view_count || 0}</span>

            {/* 메타 정보 */}
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: 10, marginBottom: 18, padding: 12, background: 'rgba(0,0,0,0.02)', borderRadius: 6 }}>

              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  // 목록
  const q = searchQuery.trim().toLowerCase();
  const filtered = jobs.filter(j => {
    if (filterType !== 'all' && j.job_type !== filterType) return false;
    if (filterModule !== 'all' && j.sap_module !== filterModule) return false;
    if (q) {
      const text = `${j.title} ${j.content} ${j.company} ${j.location} ${j.author?.nickname || ''} ${j.author?.name || ''}`.toLowerCase();
      if (!text.includes(q)) return false;
    }
    return true;

  return (
    <div className="board-page">
      <div style={{ maxWidth: 1100, margin: '0 auto' }}>

            <option value="all">전체</option>

            <option value="all">전체 모듈</option>
            {[...new Set([...SAP_MODULES, ...jobs.map(j => j.sap_module).filter(Boolean)])].map(m => <option key={m} value={m}>{m}</option>)}
          </select>
          <span style={{ fontSize: 12, color: 'var(--ink-muted)' }}>
            {loading ? '...' : (searchQuery || filterType !== 'all' || filterModule !== 'all' ? `${filtered.length}/${jobs.length}` : `${jobs.length}건`)}
          </span>
        </div>

        {error && <div className="form-error" style={{ marginBottom: 14 }}>{error}</div>}

        {loading ? (
          <div style={{ padding: 60, textAlign: 'center', color: 'var(--ink-muted)' }}>🦄 불러오는 중...</div>
        ) : filtered.length === 0 ? (
          <div style={{ padding: 60, textAlign: 'center', background: 'rgba(0,0,0,0.02)', border: '1px dashed var(--line)', borderRadius: 8 }}>
            <div style={{ fontSize: 36, marginBottom: 10, opacity: 0.4 }}>{searchQuery ? '🔍' : '📭'}</div>
            <div style={{ fontSize: 14, color: 'var(--ink-muted)' }}>
              {searchQuery ? `"${searchQuery}" 검색 결과 없음` : '아직 글이 없습니다'}
            </div>
            {isLoggedIn && !searchQuery && (
              <button className="btn btn-primary" onClick={writeButtonHandler} style={{ marginTop: 14, background: '#E67E22', borderColor: '#E67E22' }}>첫 글 작성하기</button>
            )}
          </div>
        ) : (
          <table className="board-table">
            <thead>
              <tr>
                <th className="hide-mobile" style={{ width: 50 }}>No</th>
                <th style={{ width: 60 }}>유형</th>
                <th style={{ width: 60 }}>모듈</th>
                <th style={{ textAlign: 'left', paddingLeft: 14 }}>제목</th>
                <th style={{ width: 100 }}>회사·근무지</th>
                <th style={{ width: 100 }}>글쓴이</th>
                <th style={{ width: 70 }}>날짜</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map((j, idx) => (
                <tr key={j.id} onClick={() => openJob(j)} style={{ opacity: j.is_active ? 1 : 0.55 }}>
                  <td className="col-num">{filtered.length - idx}</td>
                  <td className="col-status">
                    <span className="board-badge" style={{ background: jobTypeInfo(j.job_type).color, color: 'white', borderColor: 'transparent', fontSize: 10 }}>
                      {jobTypeInfo(j.job_type).label}
                    </span>
                  </td>
                  <td className="col-module">
                    {j.sap_module && <span className="board-badge module">{j.sap_module}</span>}
                  </td>
                  <td className="col-title" style={{ paddingLeft: 14 }}>
                    {!j.is_active && '🔒 '}
                    {j.title}
                  </td>
                  <td className="col-author" style={{ fontSize: 11, color: 'var(--ink-muted)' }}>
                    {[j.company, j.location].filter(Boolean).join(' · ') || '-'}
                  </td>
                  <td className="col-author">{j.author?.nickname || j.author?.name || '익명'}</td>
                  <td className="col-date">{boardDate(j.created_at)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

function ToolPicker({ onSelect, startPage, onStartPageChange, user, profile, isLoggedIn, onLogout, lang, t, onChangeLang }) {

  // startPage prop이 바뀌면 페이지 전환
  useEffect(() => {

    }

  // 로그인 페이지에 있는데 이미 로그인된 상태가 되면 자동으로 이동
  useEffect(() => {
    if (isLoggedIn && (currentPage === 'login' || currentPage === 'signup')) {
      console.log('[Auth] 로그인 감지 → 페이지 이동');
      setLoginSubmitting(false);
      const intended = (() => {
        try { return sessionStorage.getItem('intended_tool'); } catch(e) { return null; }
      })();
      try { sessionStorage.removeItem('intended_tool'); } catch(e) {}
      if (intended) {
        onSelect(intended);
      } else {
        setCurrentPage('home');
      }
    }
  }, [isLoggedIn]);

  // 프로필 편집 모달 (닉네임 변경)
  const [showProfileModal, setShowProfileModal] = useState(false);
  const [editNickname, setEditNickname] = useState('');
  const [profileSaving, setProfileSaving] = useState(false);
  const [profileError, setProfileError] = useState('');

  // 문의 모달
  const [showInquiryModal, setShowInquiryModal] = useState(false);
  const [inquiryName, setInquiryName] = useState('');
  const [inquiryContact, setInquiryContact] = useState('');
  const [inquiryTelegram, setInquiryTelegram] = useState('');
  const [inquiryMessage, setInquiryMessage] = useState('');
  const [inquirySending, setInquirySending] = useState(false);
  const [inquiryError, setInquiryError] = useState('');
  const [inquirySuccess, setInquirySuccess] = useState(false);

  // 문의 모달 열 때 프로필에서 자동 채우기
  function openInquiryModal() {
    setInquiryError('');
    setInquirySuccess(false);
    if (profile) {
      setInquiryName(profile.nickname || profile.name || '');
      setInquiryContact(user?.email || '');
    } else {
      setInquiryName('');
      setInquiryContact('');
    }
    setInquiryTelegram('');
    setInquiryMessage('');
    setShowInquiryModal(true);
  }

  async function sendInquiry() {
    setInquiryError('');
    if (!inquiryMessage.trim()) {
      setInquiryError('문의 내용을 입력해주세요');
      return;
    }
    if (inquiryMessage.length > 2000) {
      setInquiryError('내용은 2000자 이내로 작성해주세요');
      return;
    }
    setInquirySending(true);
    try {
      // 연락처 + 텔레그램 ID 합치기
      const contactInfo = [
        inquiryContact.trim() ? `이메일/전화: ${inquiryContact.trim()}` : null,
        inquiryTelegram.trim() ? `텔레그램: @${inquiryTelegram.trim().replace(/^@/, '')}` : null,
      ].filter(Boolean).join(' · ');

      const res = await fetch('https://green-pine-a45a.admin-noahlabs.workers.dev', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: inquiryName.trim() || '익명',
          contact: contactInfo,
          message: inquiryMessage.trim(),
          source: '말툴스 운영자 직접소통',
        }),
      });
      const data = await res.json();
      if (data.ok === true) {
        setInquirySuccess(true);
        // 2초 후 모달 닫기
        setTimeout(() => {
          setShowInquiryModal(false);
          setInquirySuccess(false);
        }, 2000);
      } else {
        setInquiryError('전송 실패: ' + (data.error || '알 수 없는 오류'));
      }
    } catch (e) {
      setInquiryError('네트워크 오류: ' + e.message);
    } finally {
      setInquirySending(false);
    }
  }

  // 모바일 메뉴 토글
  const [mobileMenuOpen, setMobileMenuOpen] = useState(false);



  function openProfileModal() {
    setEditNickname((profile && profile.nickname) || (profile && profile.name) || '');
    setProfileError('');
    setShowProfileModal(true);
  }

  async function saveProfile() {
    if (!editNickname.trim()) { setProfileError('닉네임을 입력해주세요'); return; }
    if (editNickname.trim().length > 30) { setProfileError('닉네임은 30자 이내'); return; }
    setProfileSaving(true);
    setProfileError('');

    const safetyTimer = setTimeout(() => {
      console.warn('[Profile] saveProfile 타임아웃');
      setProfileError('저장 시간 초과. 다시 시도해주세요.');
      setProfileSaving(false);
    }, 30000);

    try {
      console.log('[Profile] saveProfile 시작:', editNickname.trim());
      const { error } = await supabase
        .from('profiles')
        .update({ nickname: editNickname.trim() })
        .eq('id', user.id);
      if (error) throw error;
      console.log('[Profile] saveProfile 완료');
      clearTimeout(safetyTimer);
      window.location.reload();
    } catch (e) {
      console.error('[Profile] saveProfile 실패:', e);
      clearTimeout(safetyTimer);
      // "column does not exist" 같은 SQL 미실행 에러도 잡기
      const msg = e.message || '';
      if (msg.includes('nickname') && msg.includes('column')) {
        setProfileError('SQL 마이그레이션이 안 됐어요. Supabase에서 nickname 컬럼 추가 SQL을 먼저 실행해주세요.');
      } else {
        setProfileError('저장 실패: ' + msg);
      }
      setProfileSaving(false);
    }
  }

  // 베타 신청 폼 상태 (회원가입으로 사용)

  const [betaNickname, setBetaNickname] = useState('');

  const [betaCompany, setBetaCompany] = useState('');
  const [betaTitle, setBetaTitle] = useState('');
  const [betaModule, setBetaModule] = useState('FI');
  const [betaRole, setBetaRole] = useState('consultant');
  const [betaPassword, setBetaPassword] = useState('');
  const [betaPasswordConfirm, setBetaPasswordConfirm] = useState('');
  const [betaSubmitting, setBetaSubmitting] = useState(false);
  const [betaSubmitted, setBetaSubmitted] = useState(false);
  const [betaError, setBetaError] = useState('');

  // 로그인 상태
  const [loginEmail, setLoginEmail] = useState('');
  const [loginPassword, setLoginPassword] = useState('');
  const [loginSubmitting, setLoginSubmitting] = useState(false);
  const [loginError, setLoginError] = useState('');
  const [authMode, setAuthMode] = useState('login'); // 'login' | 'signup'

  async function handleLogin() {
    setLoginError('');
    if (!loginEmail.trim() || !loginPassword) {
      setLoginError('이메일과 비밀번호를 입력해주세요');
      return;
    }
    setLoginSubmitting(true);
    // 안전장치: 10초 후 강제 해제 (만약 onAuthStateChange가 늦으면 보조)
    const safetyTimer = setTimeout(() => {
      setLoginSubmitting(false);
      console.warn('[Login] 안전 타임아웃 작동');
    }, 30000);
    try {
      await authSignIn(loginEmail.trim(), loginPassword);
      // 성공 시 — onAuthStateChange 콜백이 자동으로 페이지 이동 처리
      // useEffect에서 isLoggedIn=true 감지하면 자동 redirect
      setLoginEmail(''); setLoginPassword('');
    } catch (e) {
      const msg = e.message || '';
      if (msg.includes('Email not confirmed')) {
        setLoginError('이메일 인증이 완료되지 않았습니다. 받은 인증 메일의 링크를 클릭해주세요.');
      } else if (msg.includes('Invalid login')) {
        setLoginError('이메일 또는 비밀번호가 올바르지 않습니다');
      } else {
        setLoginError('로그인 실패: ' + msg);
      }
      setLoginSubmitting(false);
    } finally {
      clearTimeout(safetyTimer);
    }
  }

  async function handleSignup() {
    setBetaError('');
    if (!betaName.trim()) { setBetaError('이름을 입력해주세요'); return; }
    if (!betaEmail.trim() || !betaEmail.includes('@')) { setBetaError('올바른 이메일을 입력해주세요'); return; }
    if (!betaCompany.trim()) { setBetaError('회사명을 입력해주세요'); return; }
    if (!betaPassword || betaPassword.length < 6) { setBetaError('비밀번호는 6자 이상 입력해주세요'); return; }
    if (betaPassword !== betaPasswordConfirm) { setBetaError('비밀번호가 일치하지 않습니다'); return; }

        email: betaEmail.trim(),
        password: betaPassword,
        name: betaName.trim(),
        nickname: betaNickname.trim() || betaName.trim(),
        company: betaCompany.trim(),
        title: betaTitle.trim(),
        sapModule: betaModule,
        role: betaRole,
      });
      setBetaSubmitted(true);

      const msg = e.message || '';

        setBetaError('이미 가입된 이메일입니다. 로그인을 시도해주세요.');

        setBetaError('가입 실패: ' + msg);
      }
    } finally {
      setBetaSubmitting(false);
    }
  }

                  <button type="button" onClick={sendInquiry} disabled={inquirySending || !inquiryMessage.trim()} style={{ background: '#E67E22', border: 'none', color: 'white', padding: '8px 20px', borderRadius: 4, cursor: (inquirySending || !inquiryMessage.trim()) ? 'not-allowed' : 'pointer', fontSize: 13, fontWeight: 600, opacity: (inquirySending || !inquiryMessage.trim()) ? 0.5 : 1 }}>{inquirySending ? '전송 중...' : '📩 전송'}</button>
                </div>
              </div>
            )}

        </div>
      )}

      {/* 프로필 편집 모달 */}
      {showProfileModal && (
        <div
          onClick={() => !profileSaving && setShowProfileModal(false)}
          style={{
            position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
            background: 'rgba(0,0,0,0.4)', zIndex: 1000,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            padding: 20,
          }}
        >
          <div
            onClick={e => e.stopPropagation()}
            style={{
              background: 'var(--paper)', borderRadius: 8, maxWidth: 440, width: '100%',
              padding: 28, boxShadow: '0 12px 48px rgba(0,0,0,0.2)',
            }}
          >
            <h2 style={{ fontFamily: "'Noto Serif KR', serif", fontSize: 20, fontWeight: 700, color: 'var(--ink)', margin: '0 0 8px' }}>👤 프로필 편집</h2>
            <p style={{ fontSize: 12, color: 'var(--ink-muted)', margin: '0 0 20px' }}>게시판·Q&A에 표시될 닉네임을 변경할 수 있습니다.</p>

            <div className="field" style={{ marginBottom: 14 }}>
              <label className="label">실명</label>
              <input className="input" value={profile?.name || ''} disabled style={{ color: 'var(--ink-muted)' }} />
            </div>

            <div className="field" style={{ marginBottom: 14 }}>
              <label className="label">닉네임 <span style={{ fontSize: 10, color: 'var(--ink-muted)' }}>(게시판에 표시)</span></label>
              <input
                className="input"
                value={editNickname}
                onChange={e => setEditNickname(e.target.value)}

                autoFocus
                maxLength={30}

            <div className="field" style={{ marginBottom: 14 }}>
