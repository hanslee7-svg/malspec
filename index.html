              <input className="input" value={user?.email || ''} disabled style={{ color: 'var(--ink-muted)', fontFamily: "'JetBrains Mono', monospace", fontSize: 13 }} />
            </div>

            <div className="field" style={{ marginBottom: 20 }}>
              <label className="label">회사 / 직무</label>
              <input className="input" value={`${profile?.company || ''} · ${profile?.title || ''}`} disabled style={{ color: 'var(--ink-muted)' }} />
            </div>

            {profileError && (
              <div style={{ marginBottom: 14, padding: 10, background: 'rgba(231,76,60,0.08)', border: '1px solid rgba(231,76,60,0.3)', borderRadius: 4, color: '#A02C1F', fontSize: 12 }}>
                ⚠ {profileError}
              </div>
            )}

            <div style={{ display: 'flex', gap: 8, justifyContent: 'space-between' }}>
              <button className="btn btn-ghost" onClick={() => setShowProfileModal(false)} disabled={profileSaving}>취소</button>
              <button
                className="btn btn-primary"
                onClick={saveProfile}
                disabled={profileSaving || !editNickname.trim()}
                style={{ background: '#E67E22', borderColor: '#E67E22' }}
              >
                {profileSaving ? <><span className="loader"></span> 저장 중...</> : '💾 저장'}
              </button>
            </div>

            <p style={{ marginTop: 14, fontSize: 11, color: 'var(--ink-muted)', fontStyle: 'italic', textAlign: 'center' }}>
              ※ 저장 후 페이지가 새로고침됩니다
            </p>
          </div>
        </div>
      )}
    </div>
  );
}

function MalCoding({ onBackHome, user, profile, isLoggedIn, onLogout }) {
  const STORAGE_KEY_MC = 'malcoding_state_v1';

  const [meta, setMeta] = useState({ programName: '', programId: '', devItemId: '' });
  const [specContent, setSpecContent] = useState('');
  const [inputSpec, setInputSpec] = useState('');
  const [outputSpec, setOutputSpec] = useState('');
  const [additionalRequest, setAdditionalRequest] = useState('');
  const [abapCode, setAbapCode] = useState('');
  const [options, setOptions] = useState({
    type: 'REPORT',
    modernAbap: true,
    useAlv: true,
    authorityCheck: true,
    koreanComments: true,
  });
  const [generating, setGenerating] = useState(false);
  const [reviewing, setReviewing] = useState(false);
  const [codeReview, setCodeReview] = useState('');
  const [apiKey, setApiKey] = useState('');
  const [apiModel, setApiModel] = useState('claude-sonnet-4-6');
  // 듀얼 프로바이더 (Anthropic + Google Gemini)
  const [apiProvider, setApiProvider] = useState('anthropic');
  const [googleKey, setGoogleKey] = useState('');
  const [googleModel, setGoogleModel] = useState('gemini-2.5-flash');
  const [restored, setRestored] = useState(false);
  const [toast, setToast] = useState(null);
  const [ioOpen, setIoOpen] = useState(false);
  const [showGuide, setShowGuide] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [testingApi, setTestingApi] = useState(false);
  const [mcTab, setMcTab] = useState('new');         // 'new' | 'modify'
  const [existingAbap, setExistingAbap] = useState('');
  const [modifyRequest, setModifyRequest] = useState('');
  const [archive, setArchive] = useState([]);
  const [showArchive, setShowArchive] = useState(false);

  useEffect(() => {
    (async () => {
      try {
        const saved = await Storage.get(STORAGE_KEY_MC);
        if (saved) {
          if (saved.meta) setMeta(prev => ({ ...prev, ...saved.meta }));
          if (saved.specContent) setSpecContent(saved.specContent);
          if (saved.inputSpec) setInputSpec(saved.inputSpec);
          if (saved.outputSpec) setOutputSpec(saved.outputSpec);
          if (saved.additionalRequest) setAdditionalRequest(saved.additionalRequest);
          if (saved.existingAbap) setExistingAbap(saved.existingAbap);
          if (saved.modifyRequest) setModifyRequest(saved.modifyRequest);
          if (saved.codeReview) setCodeReview(saved.codeReview);
          if (saved.mcTab && (saved.mcTab === 'new' || saved.mcTab === 'modify')) setMcTab(saved.mcTab);
          if (saved.abapCode) setAbapCode(saved.abapCode);
          if (saved.options) setOptions(prev => ({ ...prev, ...saved.options }));
        }
        const apiCfg = await Storage.get(API_CONFIG_KEY);
        if (apiCfg) {
          if (apiCfg.apiKey) setApiKey(apiCfg.apiKey);
          if (apiCfg.apiModel) setApiModel(apiCfg.apiModel);
          if (apiCfg.apiProvider) setApiProvider(apiCfg.apiProvider);
          if (apiCfg.googleKey) setGoogleKey(apiCfg.googleKey);
          if (apiCfg.googleModel) setGoogleModel(apiCfg.googleModel);
        }
      } catch (e) { /* ignore */ }
      // Show guide on first visit only
      try {
        const dismissed = localStorage.getItem('malcoding_guide_dismissed');
        if (!dismissed) setShowGuide(true);
      } catch (e) { /* ignore */ }
      // Load code archive
      try {
        const arr = await Storage.get('malcoding_archive_v1');
        if (Array.isArray(arr)) setArchive(arr);
      } catch (e) { /* ignore */ }
      // Check for handoff from MalOps (one-time consume)
      try {
        const handoff = await Storage.get('malops_to_malcoding_handoff');
        if (handoff && handoff.timestamp) {
          // Pre-fill spec content with ticket context
          const ctx = `[말옵스 티켓 ${handoff.fromTicket || ''} 에서 전달됨]
시스템: ${handoff.sapVersion || ''} / ${handoff.module || ''}
${handoff.errorCode ? `에러 코드: ${handoff.errorCode}` : ''}

## 증상
${handoff.description || ''}

## AI 분석 (말옵스)
${handoff.analysis || ''}

${handoff.asIsState ? `## As-Is\n${handoff.asIsState}\n` : ''}
${handoff.toBeState ? `## To-Be\n${handoff.toBeState}\n` : ''}`;

          if (handoff.isCustomProgram) {
            // Z 프로그램 → 변경 모드로
            setMcTab('modify');
            setModifyRequest(prev => prev || ctx);
          } else {
            // 일반 → 신규 모드 + FS에 추가
            setMcTab('new');
            setSpecContent(prev => prev || ctx);
          }
          // Set meta if module info present
          if (handoff.module && !setMeta._consumed) {
            setMeta(prev => ({
              ...prev,
              devItemId: prev.devItemId || handoff.fromTicket || '',
            }));
          }
          // Clear handoff (one-time consume)
          await Storage.set('malops_to_malcoding_handoff', null);
          // Show notification
          setTimeout(() => {
            setToast({ msg: `✓ 말옵스 티켓 ${handoff.fromTicket || ''} 컨텍스트 가져옴 (${handoff.isCustomProgram ? '변경 모드' : '신규 모드'})` });
            setTimeout(() => setToast(null), 3000);
          }, 100);
        }
      } catch (e) { /* ignore */ }
      setRestored(true);
    })();
  }, []);

  useEffect(() => {
    if (!restored) return;
    const timer = setTimeout(() => {
      Storage.set(STORAGE_KEY_MC, { meta, specContent, inputSpec, outputSpec, additionalRequest, abapCode, options, existingAbap, modifyRequest, mcTab, codeReview });
    }, 600);
    return () => clearTimeout(timer);
  }, [meta, specContent, inputSpec, outputSpec, additionalRequest, abapCode, options, existingAbap, modifyRequest, mcTab, codeReview, restored]);

  // Save API config separately when it changes
  useEffect(() => {
    if (!restored) return;
    Storage.set(API_CONFIG_KEY, { apiKey, apiModel, apiProvider, googleKey, googleModel });
  }, [apiKey, apiModel, apiProvider, googleKey, googleModel, restored]);

  async function testApiKeyMC() {
    const currentKey = apiProvider === 'google' ? googleKey : apiKey;
    if (!currentKey || !currentKey.trim()) {
      showToast(`${AI_PROVIDERS[apiProvider].label} API 키를 입력해주세요`, true);
      return;
    }
    setTestingApi(true);
    try {
      const state = { apiProvider, apiKey, apiModel, googleKey, googleModel };
      await callAI(state, 'ping', { maxTokens: 10 });
      showToast('✓ ' + AI_PROVIDERS[apiProvider].label + ' 연결 성공 — 자동 모드 사용 가능');
    } catch (e) {
      showToast('연결 실패: ' + e.message, true);
    } finally {
      setTestingApi(false);
    }
  }

  function showToast(msg, isError) {
    setToast({ msg, isError });
    setTimeout(() => setToast(null), 2200);
  }

  async function importFromMalSpec() {
    try {
      const saved = await Storage.get(STORAGE_KEY);
      if (saved && saved.fullDraft && saved.fullDraft.trim()) {
        setSpecContent(saved.fullDraft);
        if (saved.meta) {
          setMeta(prev => ({
            ...prev,
            programName: saved.meta.programName || prev.programName,
            programId: saved.meta.programId || prev.programId,
            devItemId: saved.meta.devItemId || prev.devItemId,
          }));
        }
        // Also pull I/O specs if defined in MalSpec
        let pulledIO = false;
        if (saved.inputSpec) { setInputSpec(saved.inputSpec); pulledIO = true; }
        if (saved.outputSpec) { setOutputSpec(saved.outputSpec); pulledIO = true; }
        if (pulledIO) {
          setIoOpen(true);  // expand I/O section since we pulled data into it
          showToast('✓ 말스펙에서 가져오기 완료 (FS + I/O 명세)');
        } else {
          showToast('✓ 말스펙에서 가져오기 완료 (I/O 명세는 없음)');
        }
      } else {
        showToast('말스펙에 작성된 내용이 없습니다', true);
      }
    } catch (e) {
      showToast('가져오기 실패: ' + e.message, true);
    }
  }

  function buildAbapPrompt() {
    const optionsList = [];
    if (options.modernAbap) optionsList.push('- ABAP 7.5+ 최신 문법 사용 (인라인 데이터 선언 @DATA(), CORRESPONDING #(), FOR, REDUCE 등)');
    if (options.useAlv) optionsList.push('- 결과 출력은 CL_SALV_TABLE 또는 CL_GUI_ALV_GRID 사용');
    if (options.authorityCheck) optionsList.push('- 적절한 권한 체크 포함 (AUTHORITY-CHECK OBJECT)');
    if (options.koreanComments) optionsList.push('- 주석은 한국어로 (* 또는 " 형식)');

    return `[SAP ABAP 코드 생성 요청]

## 생성 대상
- 프로그램명: ${meta.programName || '(미지정)'}
- 프로그램 ID: ${meta.programId || '(미지정)'}
- 코드 타입: ${options.type}

## 기능명세서 (FS)
${specContent}

${inputSpec.trim() ? `## Input 명세 (Selection Screen / Parameters / 입력값)
${inputSpec}

` : ''}${outputSpec.trim() ? `## Output 명세 (결과 출력 / ALV / Internal Table 구조)
${outputSpec}

` : ''}${additionalRequest.trim() ? `## 추가 요청사항
${additionalRequest}

` : ''}## 작성 지침
${optionsList.join('\n')}
- 위 FS, Input/Output 명세, 추가 요청사항을 모두 정확히 반영하는 ABAP ${options.type} 코드 작성
- Input 명세가 있으면 정확한 SELECTION-SCREEN / PARAMETERS / SELECT-OPTIONS 구문으로 구현
- Output 명세가 있으면 그에 맞는 Internal Table 구조 + ALV 컬럼/필드 카탈로그 구현
- DDIC 명세, 테이블 구조, BAPI/Function 호출, 처리 흐름 등 모두 코드로 구현
- 에러 처리 포함 (TRY/CATCH, RETURN code 체크)
- 적절한 변수 명명 규칙 (gt_ for global tables, lt_ for local, gs_/ls_ for structures 등)
- 명세에 명확하지 않은 부분은 "* TODO: ..." 또는 "* 명세 필요: ..." 주석으로 표시

## ★ 출력 형식 — ABAP 표준 분할 구조
- 코드를 SAP ABAP의 표준 분할 구조로 출력하세요. 각 파일 시작에 다음 마커 추가:
  \`\`\`
  ===== FILE: <파일명> =====
  \`\`\`
- 파일 분할 원칙 (프로그램 ID 접두사 사용, 예: ${meta.programId || 'ZXXX'}):
  · **메인 프로그램** (REPORT 선언, 이벤트 블록 START-OF-SELECTION 등): \`${meta.programId || 'ZXXX'}\`
  · **TOP include** (TABLES, TYPES, DATA, CONSTANTS, 전역 선언): \`${meta.programId || 'ZXXX'}_TOP\`
  · **F01 include** (FORM ... ENDFORM 서브루틴): \`${meta.programId || 'ZXXX'}_F01\`
  · **CLS include** (Local CLASS DEFINITION + IMPLEMENTATION): \`${meta.programId || 'ZXXX'}_CLS\`
  · **SEL include** (SELECTION-SCREEN 정의): \`${meta.programId || 'ZXXX'}_SEL\` — 짧으면 메인에 포함도 OK
  · **PBO/PAI include** (Module 블록): \`${meta.programId || 'ZXXX'}_O01\`, \`${meta.programId || 'ZXXX'}_I01\`
- 메인 프로그램에서는 위 분할 파일들을 INCLUDE로 정확히 참조 (\`INCLUDE ${meta.programId || 'ZXXX'}_TOP.\` 등)
- 코드가 짧으면(50줄 이하) 분할하지 않고 메인 하나의 파일로만 출력
- 출력 전체를 하나의 \`\`\`abap 코드 블록으로 감싸서, 안에 모든 파일을 마커와 함께 순서대로 출력`;
  }

  function buildModifyPrompt() {
    const optionsList = [];
    if (options.modernAbap) optionsList.push('- ABAP 7.5+ 문법 유지/사용 (변경 부분에 적용)');
    if (options.useAlv) optionsList.push('- ALV 관련 변경 시 CL_SALV_TABLE / CL_GUI_ALV_GRID 활용');
    if (options.authorityCheck) optionsList.push('- 권한 체크 보존/추가 (AUTHORITY-CHECK OBJECT)');
    if (options.koreanComments) optionsList.push('- 변경 부분 주석은 한국어로');

    return `[SAP ABAP 코드 수정 요청]

## 프로그램 정보
- 프로그램명: ${meta.programName || '(미지정)'}
- 프로그램 ID: ${meta.programId || '(미지정)'}
- 코드 타입: ${options.type}

## 기존 ABAP 코드
\`\`\`abap
${existingAbap}
\`\`\`

## 변경 요구사항
${modifyRequest}

${additionalRequest.trim() ? `## 추가 요청사항
${additionalRequest}

` : ''}## 작성 지침
${optionsList.join('\n')}
- 기존 ABAP 코드를 분석하고 변경 요구사항을 반영한 **완성된 수정 코드 전체**를 출력
- **변경되지 않는 부분은 글자 그대로 보존**
- 변경된 부분에는 주석으로 표시: \`* === 변경: <사유> ===\` (시작), \`* === 변경 끝 ===\` (필요 시 종료)
- 추가된 변수/메소드도 동일한 명명 규칙 유지 (gt_, lt_, gs_, ls_ 등)
- 예외 처리, 에러 처리 보강
- 변경 영향이 있는 다른 부분이 있으면 같이 수정 (예: Internal Table 구조 변경 → 사용처 모두 반영)

## ★ 출력 형식 — 분할 구조 유지
- 기존 코드가 이미 \`===== FILE: ... =====\` 마커로 분할되어 있으면, 그 구조를 그대로 유지하면서 수정
- 분할되어 있지 않으면 그대로 단일 파일로 출력 (단, 코드가 50줄 넘으면 표준 분할로 재구성: \`${meta.programId || 'ZXXX'}\` / \`_TOP\` / \`_F01\` / \`_CLS\` / \`_SEL\`)
- 출력은 ABAP 코드만 (인사말, 설명 없이)
- 코드 전체를 \`\`\`abap 코드 블록으로 감싸서 출력해주세요`;
  }

  async function aiGenerateModify() {
    if (!existingAbap.trim()) {
      showToast('기존 ABAP 코드를 입력해주세요', true);
      return;
    }
    if (!modifyRequest.trim()) {
      showToast('변경 요구사항을 입력해주세요', true);
      return;
    }
    const activeApiKey = apiProvider === 'google' ? googleKey : apiKey;
    if (!activeApiKey || !activeApiKey.trim()) {
      showToast(`${AI_PROVIDERS[apiProvider].label} API 키가 등록되지 않았습니다. 말스펙에서 설정해주세요.`, true);
      return;
    }
    setGenerating(true);
    try {
      const text = await callClaudeAbap(buildModifyPrompt());
      setAbapCode(text);
      showToast('✓ ABAP 코드 수정 완료 — 결과는 아래 코드 영역');
    } catch (e) {
      showToast('생성 실패: ' + e.message, true);
    } finally {
      setGenerating(false);
    }
  }

  async function copyModifyPrompt() {
    if (!existingAbap.trim() || !modifyRequest.trim()) {
      showToast('기존 코드와 변경 요구사항을 모두 입력해주세요', true);
      return;
    }
    const prompt = buildModifyPrompt();
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(prompt);
      } else {
        const ta = document.createElement('textarea');

## 검증 지침
위 ABAP 코드를 다음 6개 관점에서 검토하고 결과를 한국어로 작성하세요.

### 1. Syntax / 컴파일 가능성

### 2. 로직 버그
- NULL/INITIAL/SPACE 체크 누락
- Off-by-one 오류

### 3. SAP 베스트 프랙티스
- 변수 명명 규칙 (gt_, lt_, gs_, ls_, gv_, lv_ 등)

### 4. 권한·보안
- AUTHORITY-CHECK 누락 또는 부적절

  // 마커로 분할된 코드를 파일별로 파싱
  function parseAbapFiles(code) {
    const fileMarkerRegex = /={5,}\s*FILE:\s*([^\s=]+)\s*={5,}/g;
    const files = [];
    let lastIndex = 0;
    let lastFilename = null;
    let match;
    while ((match = fileMarkerRegex.exec(code)) !== null) {
      if (lastFilename) {
        const content = code.substring(lastIndex, match.index).trim();
        if (content) files.push({ name: lastFilename, content });
      }
      lastFilename = match[1].replace(/[\\\/:*?"<>|]/g, '');
      lastIndex = match.index + match[0].length;
    }
    if (lastFilename) {
      const content = code.substring(lastIndex).trim();
      if (content) files.push({ name: lastFilename, content });
    }
    return files;
  }

  async function downloadTxt() {
    if (!abapCode.trim()) {
      showToast('생성된 ABAP 코드가 없습니다', true);
      return;
    }
    const safeName = (s) => (s || '').toString().trim().replace(/[\\\/:*?"<>|]/g, '').replace(/\s+/g, '_');
    const pid = safeName(meta.devItemId) || safeName(meta.programId) || 'untitled';
    const pname = safeName(meta.programName) || 'program';
    const yymmdd = new Date().toISOString().slice(2, 10).replace(/-/g, '');

    const files = parseAbapFiles(abapCode);

    if (files.length <= 1) {
      // 마커 없거나 단일 파일 — 그냥 TXT 한 개
      const filename = `${pid}_${pname}_${yymmdd}.abap.txt`;
      const blob = new Blob([abapCode], { type: 'text/plain;charset=utf-8' });
      window.saveAs(blob, filename);
      showToast('✓ TXT 다운로드 완료 (단일 파일)');
      return;
    }

    // 다중 파일 — JSZip으로 묶어서 ZIP 다운로드
    if (typeof JSZip === 'undefined') {
      // 폴백: 단일 TXT
      const filename = `${pid}_${pname}_${yymmdd}.abap.txt`;
      const blob = new Blob([abapCode], { type: 'text/plain;charset=utf-8' });
      window.saveAs(blob, filename);
      showToast('JSZip 미로드 — 단일 TXT로 다운로드', true);
      return;
    }

    try {
      const zip = new JSZip();
      files.forEach(f => {
        const fname = f.name.replace(/\.abap$/i, '') + '.abap.txt';
        zip.file(fname, f.content);
      });
      const blob = await zip.generateAsync({ type: 'blob' });
      const zipName = `${pid}_${pname}_${yymmdd}.zip`;
      window.saveAs(blob, zipName);
      showToast(`✓ ZIP 다운로드 완료 (${files.length}개 파일)`);
    } catch (e) {
      showToast('ZIP 생성 실패: ' + e.message, true);
    }
  }

                <br /><strong>말스펙·말옵스와 공유</strong>되므로 한 곳에서만 등록하면 됩니다.

                  <span style={{ color: 'var(--ink-muted)', fontStyle: 'italic' }}>💰 ABAP 1건 약 70원 / 검증 1건 약 40원 (Sonnet)</span>

function MalOps({ onBackHome, onJumpToCoding, user, profile, isLoggedIn, onLogout }) {
  const STORAGE_KEY_MO = 'malops_state_v1';

  // Screen flow
  const [screen, setScreen] = useState('intake');  // 'intake' | 'analysis' | 'execution'

  // Step 1: System / Module
  const [sapVersion, setSapVersion] = useState('S/4HANA');
  const [module, setModule] = useState('FI');

  // Step 2: Problem types (multi-select)
  const [problemTypes, setProblemTypes] = useState({
    process: false,
    masterData: false,
    standardProgram: false,
    customProgram: false,
  });

  // Step 3 & 4: Error code + description
  const [errorCode, setErrorCode] = useState('');
  const [description, setDescription] = useState('');

  // Analysis result
  const [analysis, setAnalysis] = useState('');
  const [analyzing, setAnalyzing] = useState(false);
  const [ticketId, setTicketId] = useState('');

  // Dispatch (b.2 — 운영자에게 토스)
  const [dispatchEmail, setDispatchEmail] = useState('');
  const [dispatchChannel, setDispatchChannel] = useState('');
  const [dispatched, setDispatched] = useState(false);

  // Execution state
  const [stepStatus, setStepStatus] = useState({});  // {0: true, 1: false}
  const [finalResult, setFinalResult] = useState(''); // 'resolved' | 'failed' | ''
  const [asIsState, setAsIsState] = useState('');
  const [toBeState, setToBeState] = useState('');
  const [reanalyzing, setReanalyzing] = useState(false);

  // Shared
  const [apiKey, setApiKey] = useState('');
  const [apiModel, setApiModel] = useState('claude-sonnet-4-6');
  // 듀얼 프로바이더 (Anthropic + Google Gemini)
  const [apiProvider, setApiProvider] = useState('anthropic');
  const [googleKey, setGoogleKey] = useState('');
  const [googleModel, setGoogleModel] = useState('gemini-2.5-flash');
  const [restored, setRestored] = useState(false);
  const [showGuide, setShowGuide] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [testingApi, setTestingApi] = useState(false);
  const [toast, setToast] = useState(null);
  const [archive, setArchive] = useState([]);
  const [showArchive, setShowArchive] = useState(false);

  useEffect(() => {
    (async () => {
      try {
        const saved = await Storage.get(STORAGE_KEY_MO);
        if (saved) {
          if (saved.sapVersion) setSapVersion(saved.sapVersion);
          if (saved.module) setModule(saved.module);
          if (saved.problemTypes) setProblemTypes(prev => ({ ...prev, ...saved.problemTypes }));
          if (saved.errorCode) setErrorCode(saved.errorCode);
          if (saved.description) setDescription(saved.description);
          if (saved.analysis) setAnalysis(saved.analysis);
          if (saved.ticketId) setTicketId(saved.ticketId);
          if (saved.screen && ['intake', 'analysis', 'execution'].includes(saved.screen)) setScreen(saved.screen);
          if (saved.stepStatus) setStepStatus(saved.stepStatus);
          if (saved.finalResult) setFinalResult(saved.finalResult);
          if (saved.asIsState) setAsIsState(saved.asIsState);
          if (saved.toBeState) setToBeState(saved.toBeState);
          if (saved.dispatched) setDispatched(saved.dispatched);
        }
        const apiCfg = await Storage.get(API_CONFIG_KEY);
        if (apiCfg) {
          if (apiCfg.apiKey) setApiKey(apiCfg.apiKey);
          if (apiCfg.apiModel) setApiModel(apiCfg.apiModel);
          if (apiCfg.apiProvider) setApiProvider(apiCfg.apiProvider);
          if (apiCfg.googleKey) setGoogleKey(apiCfg.googleKey);
          if (apiCfg.googleModel) setGoogleModel(apiCfg.googleModel);
        }
      } catch (e) { /* ignore */ }
      try {
        const dismissed = localStorage.getItem('malops_guide_dismissed');
        if (!dismissed) setShowGuide(true);
      } catch (e) {}
      // Load ticket archive
      try {
        const arr = await Storage.get('malops_ticket_archive_v1');
        if (Array.isArray(arr)) setArchive(arr);
      } catch (e) { /* ignore */ }
      setRestored(true);
    })();
  }, []);

  useEffect(() => {
    if (!restored) return;
    const timer = setTimeout(() => {
      Storage.set(STORAGE_KEY_MO, { sapVersion, module, problemTypes, errorCode, description, analysis, ticketId, screen, stepStatus, finalResult, asIsState, toBeState, dispatched });
    }, 600);
    return () => clearTimeout(timer);
  }, [sapVersion, module, problemTypes, errorCode, description, analysis, ticketId, screen, stepStatus, finalResult, asIsState, toBeState, dispatched, restored]);

  useEffect(() => {
    if (!restored) return;
    Storage.set(API_CONFIG_KEY, { apiKey, apiModel, apiProvider, googleKey, googleModel });
  }, [apiKey, apiModel, apiProvider, googleKey, googleModel, restored]);

  function showToast(msg, isError) {
    setToast({ msg, isError });
    setTimeout(() => setToast(null), 2200);
  }

  function generateTicketId() {
    const yymm = new Date().toISOString().slice(2, 7).replace('-', '');
    const rand = Math.floor(Math.random() * 9000 + 1000);
    return `MO-${yymm}-${rand}`;
  }

  function buildAnalysisPrompt() {
    const types = [];
    if (problemTypes.process) types.push('프로세스 — 업무 흐름·트랜잭션 동작');
    if (problemTypes.masterData) types.push('기준정보 — 마스터 데이터 (고객/자재/BP 등)');
    if (problemTypes.standardProgram) types.push('표준 프로그램 — SAP 표준 T-code 에러');
    if (problemTypes.customProgram) types.push('개발 프로그램 — Z* 커스텀 코드');

    return `[SAP 운영 티켓 분석 요청]

## 티켓 정보
- 시스템: ${sapVersion}
- 모듈: ${module}
- 문제 유형: ${types.length > 0 ? types.join(', ') : '미지정'}
- 에러 코드: ${errorCode || '(없음)'}

## 사용자 설명
${description || '(추가 설명 없음)'}

${asIsState || toBeState ? `## 재분석 자료
${asIsState ? `**As-Is (현재 상태):**\n${asIsState}\n` : ''}
${toBeState ? `**To-Be (기대 상태):**\n${toBeState}\n` : ''}
※ 이전 시도 결과가 기대와 달랐습니다. 위 자료를 바탕으로 재분석해주세요.

` : ''}## 분석 지침
다음 형식으로 한국어 답변 작성:

### 🔍 원인 추정
(에러 코드·증상 기반 가능성 높은 원인 1~3개. 각각 짧게)

### ✅ 권장 해결책 (단계별)
**단계 1**: ...
**단계 2**: ...
**단계 3**: ...
(실행 가능한 구체적 단계. T-code, 메뉴 경로, 입력 값 명시)

### 📚 관련 참고
- 관련 SAP Note: (있으면 번호와 제목, 없으면 "해당 없음")
- 관련 T-code: (조회·수정에 필요한 T-code 목록)
- 관련 테이블: (관련 SAP 테이블)

### 📊 영향도 평가
- 영향도: 🟢 낮음 / 🟡 중간 / 🔴 높음 중 하나
- 사유: 한 줄 설명

### ⏱ 예상 처리 시간
N시간 (또는 N분)

### 💡 후속 조치 (선택)
운영자가 확인하면 좋을 추가 사항 (Z 프로그램 수정 필요 여부, 권한 검토 등)`;
  }

  async function callClaudeOps(prompt) {
    const state = { apiProvider, apiKey, apiModel, googleKey, googleModel };
    return await callAI(state, prompt, { maxTokens: 6000 });
  }

  async function submitTicket() {
    if (!Object.values(problemTypes).some(v => v) && !description.trim() && !errorCode.trim()) {
      showToast('문제 유형, 에러 코드, 또는 설명 중 최소 하나는 입력해주세요', true);
      return;
    }
    const activeApiKey = apiProvider === 'google' ? googleKey : apiKey;
    if (!activeApiKey || !activeApiKey.trim()) {
      showToast(`${AI_PROVIDERS[apiProvider].label} API 키가 등록되지 않았습니다`, true);
      return;
    }
    setAnalyzing(true);
    try {
      const tid = ticketId || generateTicketId();
      setTicketId(tid);
      const result = await callClaudeOps(buildAnalysisPrompt());
      setAnalysis(result);
      setScreen('analysis');
      showToast('✓ AI 분석 완료');
    } catch (e) {
      showToast('분석 실패: ' + e.message, true);
    } finally {
      setAnalyzing(false);
    }
  }

  async function copyAnalysisPrompt() {
    const prompt = buildAnalysisPrompt();
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(prompt);
      }
      showToast('✓ 분석 프롬프트 복사됨');
    } catch (e) { showToast('복사 실패', true); }
  }

  async function reanalyze() {
    if (!asIsState.trim() && !toBeState.trim()) {
      showToast('As-Is 또는 To-Be 자료를 입력해주세요', true);
      return;
    }
    const activeApiKey = apiProvider === 'google' ? googleKey : apiKey;
    if (!activeApiKey || !activeApiKey.trim()) {
      showToast(`${AI_PROVIDERS[apiProvider].label} API 키가 등록되지 않았습니다`, true);
      return;
    }
    setReanalyzing(true);
    try {
      const result = await callClaudeOps(buildAnalysisPrompt());
      setAnalysis(result);
      setStepStatus({});  // reset step progress
      setFinalResult('');
      setScreen('analysis');
      showToast('✓ 재분석 완료 — 새 해결책 확인');
    } catch (e) {
      showToast('재분석 실패: ' + e.message, true);
    } finally {
      setReanalyzing(false);
    }
  }

  async function simulateDispatch() {
    if (!dispatchEmail.trim() && !dispatchChannel.trim()) {
      showToast('이메일 또는 카카오톡 채널을 입력해주세요', true);
      return;
    }

    // 카카오톡 친화적 포맷으로 메시지 생성
    const types = [];
    if (problemTypes.process) types.push('프로세스');
    if (problemTypes.masterData) types.push('기준정보');
    if (problemTypes.standardProgram) types.push('표준프로그램');
    if (problemTypes.customProgram) types.push('개발프로그램');

    const message = `[🎯 SAP 운영 티켓 - 컨설턴트 응답 요청]
━━━━━━━━━━━━━━━━━
티켓 ID: ${ticketId || '(미생성)'}
시스템: ${sapVersion} / ${module}
유형: ${types.join(', ') || '미지정'}
에러: ${errorCode || '없음'}
━━━━━━━━━━━━━━━━━

[증상]
${description || '(설명 없음)'}

[AI 분석 결과]
${analysis || '(분석 없음)'}

━━━━━━━━━━━━━━━━━
⚡ 10분 이내 응답 요청
${dispatchEmail ? `📧 회신: ${dispatchEmail}` : ''}
${dispatchChannel ? `💬 카카오톡: ${dispatchChannel}` : ''}
━━━━━━━━━━━━━━━━━
※ 말옵스 (MAL Ops) 자동 생성`;

    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(message);
      } else {
        const ta = document.createElement('textarea');
        ta.value = message;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
      setDispatched(true);

      // 카카오톡 앱 열기 시도 (모바일에서 작동)
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      if (isMobile) {
        // 카카오톡 친구 채팅 인텐트 (모바일만 동작)
        setTimeout(() => {
          window.location.href = 'kakaotalk://';
        }, 500);
        showToast('✓ 카톡 메시지 복사 + 앱 열림 — 받는 사람 선택 후 붙여넣기');
      } else {
        showToast('✓ 카톡 메시지 복사됨 — 카카오톡 PC/앱에서 붙여넣기 (Ctrl+V)');
      }
    } catch (e) {
      showToast('복사 실패: ' + e.message, true);
    }
  }

  function parseSteps(text) {
    // Extract step lines like "**단계 N**:" or "단계 N:"
    const lines = text.split('\n');
    const steps = [];
    for (const line of lines) {
      const match = line.match(/^\*?\*?\s*단계\s*(\d+)\*?\*?\s*:\s*(.+)$/);
      if (match) {
        steps.push({ num: parseInt(match[1]), text: match[2].trim() });
      }
    }
    return steps;
  }

  function startNewTicket() {
    if (!window.confirm('현재 티켓을 마감하고 새 티켓을 시작합니다. 진행할까요?\n(저장하려면 먼저 💾 보관함에 저장 버튼 사용)')) return;
    setScreen('intake');
    setSapVersion('S/4HANA');
    setModule('FI');
    setProblemTypes({ process: false, masterData: false, standardProgram: false, customProgram: false });
    setErrorCode('');
    setDescription('');
    setAnalysis('');
    setTicketId('');
    setStepStatus({});
    setFinalResult('');
    setAsIsState('');
    setToBeState('');
    setDispatched(false);
    setDispatchEmail('');
    setDispatchChannel('');
    showToast('새 티켓 시작');
  }

  async function saveCurrentToArchive() {
    if (!ticketId && !description.trim() && !errorCode.trim()) {
      showToast('저장할 티켓 내용이 없습니다', true);
      return;
    }
    const tid = ticketId || generateTicketId();
    if (!ticketId) setTicketId(tid);
    const entry = {
      archivedAt: new Date().toISOString(),
      ticketId: tid,
      state: {
        sapVersion, module, problemTypes, errorCode, description,

                            className="btn btn-primary"
                            style={{ fontSize: 11, padding: '5px 12px', background: '#E74C3C', borderColor: '#E74C3C' }}
                            onClick={() => loadFromArchive(entry)}
                          >📂 불러오기</button>
                          <button
                            className="btn btn-ghost"
                            style={{ fontSize: 11, padding: '5px 12px' }}
                            onClick={() => deleteFromArchive(entry.ticketId)}
                          >🗑 삭제</button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      {showSettings && (
        <div className="modal-overlay" onClick={() => setShowSettings(false)}>
          <div className="modal-content" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <h3>🔌 AI 자동 연결 설정</h3>
              <button className="modal-close" onClick={() => setShowSettings(false)}>×</button>
            </div>
            <div className="modal-body">
              <p style={{ fontSize: 13, color: 'var(--ink-soft)', marginBottom: 18, lineHeight: 1.6 }}>
                API 키를 등록하면 자동 분석·재분석이 가능합니다.
                <br /><strong>말스펙·말코딩과 공유</strong>되므로 한 곳에서만 등록하면 됩니다.
              </p>

              <div className="field" style={{ marginBottom: 18 }}>
                <label className="label">AI 제공자 선택</label>
                <div style={{ display: 'flex', gap: 8, marginTop: 6 }}>
                  {Object.entries(AI_PROVIDERS).map(([id, p]) => (
                    <button
                      key={id} type="button"
                      onClick={() => setApiProvider(id)}
                      style={{
                        flex: 1, padding: '10px 14px', border: '2px solid',
                        borderColor: apiProvider === id ? '#E74C3C' : 'var(--line)',
                        borderRadius: 6,
                        background: apiProvider === id ? 'rgba(231,76,60,0.06)' : 'white',
                        color: apiProvider === id ? '#E74C3C' : 'var(--ink-soft)',
                        cursor: 'pointer', fontFamily: "'Noto Serif KR', serif",
                        fontSize: 13, fontWeight: apiProvider === id ? 700 : 500,
                        transition: 'all 0.15s',
                      }}
                    >{id === 'google' ? '🔵 ' : '🟧 '}{p.label}</button>
                  ))}
                </div>
              </div>

              <div className="field" style={{ marginBottom: 14 }}>
                <label className="label">{AI_PROVIDERS[apiProvider].label} API Key</label>
                <input
                  className="input" type="password"
                  value={apiProvider === 'google' ? googleKey : apiKey}
                  onChange={e => apiProvider === 'google' ? setGoogleKey(e.target.value) : setApiKey(e.target.value)}
                  placeholder={AI_PROVIDERS[apiProvider].keyPlaceholder}
                  style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 13 }}
                />
              </div>
              <div className="field" style={{ marginBottom: 18 }}>
                <label className="label">Model</label>
                <select
                  value={apiProvider === 'google' ? googleModel : apiModel}
                  onChange={e => apiProvider === 'google' ? setGoogleModel(e.target.value) : setApiModel(e.target.value)}
                  className="input" style={{ fontSize: 13 }}
                >
                  {AI_PROVIDERS[apiProvider].models.map(m => (
                    <option key={m.id} value={m.id}>{m.label}</option>
                  ))}
                </select>
              </div>
              <div style={{ display: 'flex', gap: 8, justifyContent: 'space-between', alignItems: 'center' }}>
                <button className="btn btn-accent" onClick={testApiKeyMO} disabled={!(apiProvider === 'google' ? googleKey : apiKey).trim() || testingApi}>
                  {testingApi ? <><span className="loader"></span> 테스트 중...</> : '🔌 연결 테스트'}
                </button>
                <button className="btn btn-primary" onClick={() => setShowSettings(false)}>저장 후 닫기</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {toast && (
        <div className={'toast' + (toast.isError ? ' toast-error' : '')}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

// ===== 💬 말톡 floating 버튼 (별도 창 열기) =====
function ChatWidget({ user, profile, isLoggedIn }) {
  if (!isLoggedIn) return null;

  function openMalTalk() {
    const w = 420, h = 700;
    const left = window.screen.width - w - 40;
    const top = 40;
    // 단순화된 features (브라우저 호환성 ↑)
    const features = `width=${w},height=${h},left=${left},top=${top}`;
    // 캐시 무력화 + 매번 새 창 (이름 동적)
    const popup = window.open('maltalk.html?t=' + Date.now(), '_blank', features);
    if (popup) {
      popup.focus();
    } else {
      alert('팝업이 차단되었습니다. 브라우저에서 이 사이트의 팝업을 허용해주세요.');
    }
  }

  return (
    <button
      onClick={openMalTalk}
      style={{
        position: 'fixed', bottom: 24, right: 24,
        width: 56, height: 56, borderRadius: '50%',
        background: 'linear-gradient(135deg, #E67E22, #D35400)',
        color: 'white', border: 'none', cursor: 'pointer',
        fontSize: 22, fontWeight: 700,
        boxShadow: '0 4px 16px rgba(230,126,34,0.4)',
        zIndex: 998,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        transition: 'transform 0.2s',
      }}
      onMouseEnter={e => e.target.style.transform = 'scale(1.08)'}
      onMouseLeave={e => e.target.style.transform = 'scale(1)'}
      title="💬 말톡 열기 (별도 창)"
    >
      💬
    </button>
  );
}

function Root() {
  const [selectedTool, setSelectedTool] = useState(null);
  const [user, setUser] = useState(null);
  // 프로필 캐시 즉시 복원 (관리자 메뉴 등 즉시 표시)
  const [profile, setProfile] = useState(() => {
    try {
      const cached = localStorage.getItem('cached_profile');
      if (cached) {
        const p = JSON.parse(cached);
        // 캐시가 7일 이내면 사용
        if (p && p._cachedAt && (Date.now() - p._cachedAt < 7 * 24 * 60 * 60 * 1000)) {
          const { _cachedAt, ...profile } = p;
          return profile;
        }
      }
    } catch (e) {}
    return null;
  });
  const [startPage, setStartPage] = useState('home');
  const [lang, setLang] = useState(getInitialLang());
  const t = makeT(lang);

  // profile 변경 시 자동 캐시
  useEffect(() => {
    try {
      if (profile && profile.id) {
        localStorage.setItem('cached_profile', JSON.stringify({ ...profile, _cachedAt: Date.now() }));
      } else if (profile === null) {
        localStorage.removeItem('cached_profile');
      }
    } catch (e) {}
  }, [profile]);

  // 언어 변경 시 localStorage에 저장
  function changeLang(newLang) {
    setLang(newLang);
    try { localStorage.setItem('maltools_lang', newLang); } catch (e) {}
  }

  // URL hash 기반 네비게이션 (브라우저 뒤로가기 지원)
  useEffect(() => {
    const applyHash = () => {
      const hash = window.location.hash.slice(1);
      if (hash === 'malspec' || hash === 'malcoding' || hash === 'malops' || hash === 'malcontract') {
        setSelectedTool(hash);
      } else {
        setSelectedTool(null);
        if (hash) setStartPage(hash);
        else setStartPage('home');
      }
    };
    applyHash(); // 초기 로드 시 hash 적용
    window.addEventListener('hashchange', applyHash);
    return () => window.removeEventListener('hashchange', applyHash);
  }, []);

  // 상태 변경 시 hash 업데이트
  useEffect(() => {
    let newHash = '';
    if (selectedTool) newHash = selectedTool;
    else if (startPage && startPage !== 'home') newHash = startPage;

    const currentHash = window.location.hash.slice(1);
    if (currentHash !== newHash) {
      if (newHash) {
        window.location.hash = newHash;
      } else {
        // 해시 제거 (스크롤 방지)
        history.pushState('', document.title, window.location.pathname + window.location.search);
      }
    }
  }, [selectedTool, startPage]);

  useEffect(() => {
    let cancelled = false;
    let subscription = null;

    // 즉시 Supabase 워밍업 — 다른 작업 시작하기 전에 서버 깨우기
    if (supabase) {
      console.log('[Root] Supabase 즉시 워밍업');
      supabase.from('posts').select('id').limit(1).then(
        () => console.log('[Root] 워밍업 완료'),
        () => { /* 무시 */ }
      );
    }

    // 백그라운드에서 인증 정보 가져오기 (UI는 즉시 렌더링)
    async function init() {
      try {
        if (!supabase) return;
        console.log('[Root] auth init 시작');
        const u = await authGetUser();
        if (cancelled) return;
        console.log('[Root] authGetUser 결과:', u ? `로그인됨 (${u.email})` : '비로그인');
        if (u) {
          setUser(u);
          // 캐시된 프로필이 다른 사용자라면 초기화
          try {
            const cached = JSON.parse(localStorage.getItem('cached_profile') || 'null');
            if (cached && cached.id !== u.id) {
              localStorage.removeItem('cached_profile');
              setProfile(null);
            }
          } catch (e) {}
          try {
            const p = await authGetProfile(u.id);
            if (!cancelled && p) setProfile(p);
          } catch (e) { console.warn('profile load failed', e); }
        } else {
          // 비로그인 — 캐시도 정리
          try { localStorage.removeItem('cached_profile'); } catch (e) {}
          setProfile(null);
        }
      } catch (e) {
        console.warn('[Root] auth init 실패 (무시):', e);
      }
    }
    init();

    // Auth state 구독
    try {
      if (supabase && supabase.auth && typeof supabase.auth.onAuthStateChange === 'function') {
        const result = supabase.auth.onAuthStateChange(async (event, session) => {
          if (cancelled) return;
          console.log('[Root] auth event:', event);
          if (session && session.user) {
            setUser(session.user);
            try {
              const p = await authGetProfile(session.user.id);
              if (!cancelled) setProfile(p);
            } catch (e) { console.warn('profile reload failed', e); }
          } else {
            setUser(null);
            setProfile(null);
          }
        });
        subscription = result && result.data && result.data.subscription;
      }
    } catch (e) { console.warn('auth subscribe failed', e); }

    // 페이지 포커스 시 profile 새로고침 (다른 탭에서 권한 변경 시 자동 반영)
    let lastFocusTime = 0;
    const onFocus = async () => {
      if (cancelled) return;
      // 1분 이내 중복 호출 방지
      const now = Date.now();
      if (now - lastFocusTime < 60000) return;
      lastFocusTime = now;

      const u = await authGetUser();
      if (u && !cancelled) {
        try {
          const p = await authGetProfile(u.id);
          if (!cancelled && p) setProfile(p);
        } catch (e) { /* ignore */ }
      }
    };
    window.addEventListener('focus', onFocus);

    // Keep-Alive: Supabase 가 잠들지 않도록 90초마다 가벼운 핑
    const keepAliveInterval = setInterval(() => {
      if (cancelled || !supabase) return;
      // 가장 가벼운 쿼리 — 결과 무시
      supabase.from('posts').select('id').limit(1).then(
        () => { console.log('[KeepAlive] ping OK'); },
        () => { /* 실패해도 무시 */ }
      );
    }, 90000); // 90초

    return () => {
      cancelled = true;
      window.removeEventListener('focus', onFocus);
      clearInterval(keepAliveInterval);
      if (subscription && typeof subscription.unsubscribe === 'function') {
        try { subscription.unsubscribe(); } catch (e) { /* ignore */ }
      }
    };
  }, []);

  // 로딩 화면 제거 — 즉시 렌더링. user는 백그라운드에서 채워짐.
  const isLoggedIn = !!user;
  const authProps = {
    user, profile, isLoggedIn,
    onLogout: async () => {
      console.log('[Root] 로그아웃 시작');
      // 즉시 UI 반영 (Supabase 응답 기다리지 않음)
      setUser(null);
      setProfile(null);
      setSelectedTool(null);
      // 백그라운드에서 Supabase 세션 정리
      try {
        await Promise.race([
          authSignOut(),
          new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 3000)),
        ]);
        console.log('[Root] 로그아웃 완료');
      } catch (e) {
        console.warn('[Root] Supabase signOut 실패 (UI는 이미 로그아웃됨):', e);
      }
    },
  };

  // 페이지 렌더링 결정
  let pageContent;

  // Step 1: Tool picker (homepage)
  if (!selectedTool) {
    pageContent = <ToolPicker
      onSelect={(toolId) => {
        // 모든 도구 로그인 필수
        if ((toolId === 'malspec' || toolId === 'malcoding' || toolId === 'malops') && !isLoggedIn) {
          setStartPage('login');
          try { sessionStorage.setItem('intended_tool', toolId); } catch (e) {}
          return;
        }
        setSelectedTool(toolId);
      }}
      startPage={startPage}
      onStartPageChange={setStartPage}
      lang={lang}
      t={t}
      onChangeLang={changeLang}
      {...authProps}
    />;
  }
  // 말스펙
  else if (selectedTool === 'malspec') {
    if (!isLoggedIn) {
      setTimeout(() => {
        setSelectedTool(null);
        setStartPage('login');
        try { sessionStorage.setItem('intended_tool', 'malspec'); } catch (e) {}
      }, 0);
      pageContent = null;
    } else {
      pageContent = <App onBackHome={() => setSelectedTool(null)} {...authProps} />;
    }
  }
  // 말코딩
  else if (selectedTool === 'malcoding') {
    if (!isLoggedIn) {
      setTimeout(() => {
        setSelectedTool(null);
        setStartPage('login');
        try { sessionStorage.setItem('intended_tool', 'malcoding'); } catch (e) {}
      }, 0);
      pageContent = null;
    } else {
      pageContent = <MalCoding onBackHome={() => setSelectedTool(null)} {...authProps} />;
    }
  }
  // 말옵스
  else if (selectedTool === 'malops') {
    if (!isLoggedIn) {
      setTimeout(() => {
        setSelectedTool(null);
        setStartPage('login');
        try { sessionStorage.setItem('intended_tool', 'malops'); } catch (e) {}
      }, 0);
      pageContent = null;
    } else {
      pageContent = <MalOps
        onBackHome={() => setSelectedTool(null)}
        onJumpToCoding={() => setSelectedTool('malcoding')}
        {...authProps}
      />;
    }
  }
  // 말계약 (독립 전자계약 — 로그인 불필요)
  else if (selectedTool === 'malcontract') {
    pageContent = <MalContract onBackHome={() => setSelectedTool(null)} />;
  }
  // Other tools — under construction
  else {
    pageContent = <UnderConstruction toolName={selectedTool} onBack={() => setSelectedTool(null)} />;
  }

  // ⭐ 모든 페이지에 채팅 위젯 추가 (로그인 시만 표시됨)
  return (
    <React.Fragment>
      {pageContent}
      <ChatWidget user={user} profile={profile} isLoggedIn={isLoggedIn} />
    </React.Fragment>
  );
}

function MalContract({ onBackHome }) {
  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', background: 'var(--paper)' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 18px', borderBottom: '1px solid var(--line)', background: 'rgba(252,247,236,0.96)', position: 'sticky', top: 0, zIndex: 10, backdropFilter: 'blur(10px)' }}>
        <button onClick={onBackHome} style={{ background: 'transparent', border: '1px solid var(--line)', borderRadius: 6, padding: '6px 12px', cursor: 'pointer', fontSize: 13, color: 'var(--ink-soft)', fontFamily: 'inherit' }}>← 말툴스</button>
        <span style={{ fontFamily: "'Noto Serif KR',serif", fontWeight: 700, color: 'var(--ink)', fontSize: 15 }}>✍️ 말계약 <span style={{ fontSize: 11, color: 'var(--accent)', fontFamily: "'JetBrains Mono',monospace" }}>MAL Contract</span></span>
      </div>
      <iframe
        src="malcontract.html?embed=1"
        title="말계약"
        allow="microphone; clipboard-write"
        style={{ flex: 1, width: '100%', border: 'none', minHeight: 'calc(100vh - 52px)' }}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
